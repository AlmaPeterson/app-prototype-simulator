<div class="page" style="padding-bottom:80px;">
    <button class="btn btn-secondary btn-sm mb-4" onclick="loadPage('jobs')">&larr; Jobs</button>

    <!-- Job Header -->
    <div id="job-detail-header" style="padding:18px; margin-bottom:16px; border:1px solid #e2e8f0;"></div>

    <!-- Quick Actions -->
    <div class="section-header">
        <span class="section-title">Quick Actions</span>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:16px;">
        <button class="btn btn-secondary" style="margin:0;" onclick="openFieldClock()">Clock In</button>
        <button class="btn btn-secondary" style="margin:0;" onclick="openSchedule()">Schedule</button>
        <button class="btn btn-secondary" style="margin:0;" onclick="openKits()">Kits</button>
    </div>

    <!-- Bid / Finance -->
    <div class="section-header">
        <span class="section-title">Bid &amp; Finance</span>
        <button class="section-action" onclick="openBid()">View Bid</button>
    </div>

    <div id="job-detail-finance" class="card" style="cursor:default; margin-bottom:16px;"></div>

    <!-- Team -->
    <div class="section-header">
        <span class="section-title">Assigned Team</span>
        <button class="section-action" onclick="jdToggleAddMember()">+ Add</button>
    </div>

    <div id="jd-add-member" class="card" style="cursor:default; margin-bottom:8px; display:none;"></div>

    <div id="job-detail-team" class="card" style="cursor:default; margin-bottom:16px;"></div>
</div>

<script>
(function () {
    var jobId = state.currentJobId;
    var job = jobId ? DB.getById('jobs', jobId) : null;
    if (!job) {
        document.getElementById('job-detail-header').innerHTML = '<div class="alert">No job selected.</div>';
        document.getElementById('job-detail-finance').innerHTML = '';
        document.getElementById('job-detail-team').innerHTML = '';
        return;
    }

    var addr = job.address_id ? DB.getById('addresses', job.address_id) : null;
    var bid = job.bid_id ? DB.getById('bids', job.bid_id) : null;
    var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    function fmtDate(iso) {
        if (!iso) return '';
        var d = new Date(iso);
        return months[d.getUTCMonth()] + ' ' + d.getUTCDate();
    }
    var dateRange = fmtDate(job.scheduled_start) + (job.scheduled_end ? ' – ' + fmtDate(job.scheduled_end) : '');
    var shortCode = 'JOB-' + job.id.replace(/[^A-Za-z0-9]/g, '').slice(0, 4).toUpperCase();

    document.getElementById('job-detail-header').innerHTML =
        '<div style="font-size:1.2rem; font-weight:700; margin-bottom:6px;">' + job.name + '</div>' +
        '<div class="flex-between mb-2">' +
            '<span class="badge">' + shortCode + '</span>' +
            '<span class="badge badge-gray">' + job.status.charAt(0).toUpperCase() + job.status.slice(1) + '</span>' +
        '</div>' +
        '<div style="font-size:0.82rem;">' + (addr ? addr.street + ', ' + addr.city + ' ' + addr.state : 'No address on file') + '</div>' +
        '<div style="font-size:0.82rem; margin-top:2px;">' + (dateRange || 'Not scheduled') + '</div>' +
        '<div class="progress-bar mt-4">' +
            // No real per-job completion tracking exists yet (no task/phase
            // rollup wired to jobs in this phase) — static placeholder value.
            '<div style="width:65%; height:100%; border-radius:99px;"></div>' +
        '</div>' +
        '<div style="font-size:0.72rem; margin-top:4px;">65% complete</div>';

    var expenses = DB.find('expense_entries', function (e) { return e.job_id === job.id; });
    var laborTotal = expenses.filter(function (e) { return e.category === 'employee'; }).reduce(function (s, e) { return s + e.amount; }, 0);
    var materialTotal = expenses.filter(function (e) { return e.category === 'material'; }).reduce(function (s, e) { return s + e.amount; }, 0);

    document.getElementById('job-detail-finance').innerHTML =
        '<div class="list-item" style="padding:8px 0;">' +
            '<div class="list-item-body"><div class="list-item-title">Estimated Value</div></div>' +
            '<div class="list-item-right"><div class="list-item-value">' + (bid ? '$' + bid.total_cost.toLocaleString() : 'No Bid') + '</div></div>' +
        '</div>' +
        '<div class="list-item" style="padding:8px 0;">' +
            '<div class="list-item-body"><div class="list-item-title">Labour to Date</div></div>' +
            '<div class="list-item-right"><div class="list-item-value">$' + laborTotal.toLocaleString() + '</div></div>' +
        '</div>' +
        '<div class="list-item" style="padding:8px 0; border-bottom:none;">' +
            '<div class="list-item-body"><div class="list-item-title">Materials Used</div></div>' +
            '<div class="list-item-right"><div class="list-item-value">$' + materialTotal.toLocaleString() + '</div></div>' +
        '</div>';

    function renderTeam() {
    var assignments = DB.find('job_assignments', function (a) { return a.job_id === job.id; });
    var teamHtml = assignments.map(function (a, i) {
        var user = DB.getById('users', a.user_id);
        if (!user) return '';
        var initials = user.full_name.split(' ').map(function (p) { return (p.replace(/[^A-Za-z]/g, '')[0] || ''); }).join('').toUpperCase().slice(0, 2);
        var level = window.LEVELS.find(function (l) { return l.slug === user.global_level; });
        var roleLabel = a.role_on_job === 'lead' ? 'Lead' : 'Team Member';
        var openEntry = DB.findOne('time_entries', function (t) { return t.user_id === user.id && t.job_id === job.id && !t.clock_out_at; });
        var statusLabel = openEntry ? 'Clocked In' : 'Off Site';
        var isLast = i === assignments.length - 1;
        return '<div class="list-item" style="padding:8px 0;' + (isLast ? ' border-bottom:none;' : '') + ' cursor:pointer;" onclick="openScorecard(\'' + user.id + '\')">' +
            '<div class="leaderboard-avatar">' + initials + '</div>' +
            '<div class="list-item-body" style="margin-left:10px;">' +
                '<div class="list-item-title">' + user.full_name + '</div>' +
                '<div class="list-item-sub">' + roleLabel + ' &bull; <span class="badge badge-gray" style="font-size:0.6rem;">' + (level ? level.name : user.global_level) + '</span></div>' +
            '</div>' +
            '<span class="badge badge-gray">' + statusLabel + '</span>' +
            '<span class="card-arrow">&#8250;</span>' +
        '</div>';
    }).join('');
    document.getElementById('job-detail-team').innerHTML = teamHtml ||
        '<div class="list-item" style="padding:8px 0; border-bottom:none;"><div class="list-item-body" style="color:#94a3b8;">Unassigned</div></div>';
    }

    // "+ Add" — inline picker of company members not yet on this job.
    function renderAddMemberPicker() {
        var assignedIds = DB.find('job_assignments', function (a) { return a.job_id === job.id; })
            .map(function (a) { return a.user_id; });
        var candidates = companyMemberUsers(state.currentCompanyId).filter(function (u) {
            return assignedIds.indexOf(u.id) === -1;
        });
        var box = document.getElementById('jd-add-member');
        box.innerHTML = candidates.map(function (u, i) {
            var isLast = i === candidates.length - 1;
            return '<div class="list-item" style="padding:8px 0;' + (isLast ? ' border-bottom:none;' : '') + ' cursor:pointer;" onclick="jdAddMember(\'' + u.id + '\')">' +
                '<div class="list-item-body"><div class="list-item-title">' + u.full_name + '</div>' +
                '<div class="list-item-sub">Tap to add to this job</div></div>' +
                '<span class="badge">+ Add</span>' +
            '</div>';
        }).join('') ||
            '<div class="list-item" style="padding:8px 0; border-bottom:none;"><div class="list-item-body" style="color:#94a3b8;">Everyone in the company is already on this job.</div></div>';
    }

    window.jdToggleAddMember = function () {
        var box = document.getElementById('jd-add-member');
        var show = box.style.display === 'none';
        if (show) renderAddMemberPicker();
        box.style.display = show ? 'block' : 'none';
    };

    window.jdAddMember = function (userId) {
        DB.insert('job_assignments', {
            company_id: state.currentCompanyId,
            job_id: job.id,
            user_id: userId,
            role_on_job: 'member',
            assigned_at: new Date().toISOString(),
        });
        renderTeam();
        renderAddMemberPicker();
    };

    renderTeam();
})();
</script>
