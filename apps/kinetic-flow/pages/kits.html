<div class="page" style="padding-bottom:80px;">
    <div class="mb-2">
        <div class="page-title">Kits &amp; Tools</div>
        <div class="page-subtitle">Browse kits by category to see tools, materials, and training videos.</div>
    </div>
    <button class="btn btn-outline btn-sm mb-4" onclick="loadPage('label-generator')">Labels</button>

    <div class="kit-search-row">
        <button class="icon-btn" onclick="openKitDrawer()" aria-label="Browse kit categories">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>
        <input class="search-bar" type="text" id="kit-search" placeholder="Search kits..." oninput="filterKits(this.value)">
    </div>

    <div class="kit-content" id="kit-content"></div>
</div>

<div class="kit-drawer-overlay" id="kit-drawer-overlay" onclick="handleKitDrawerOverlayClick(event)">
    <div class="kit-drawer">
        <div class="kit-drawer-header">
            <span class="section-title">Kit Categories</span>
            <button class="kit-drawer-close" onclick="closeKitDrawer()" aria-label="Close">&times;</button>
        </div>
        <div class="kit-drawer-list" id="kit-drawer-list"></div>
    </div>
</div>

<script>
(function () {

    // Group real inventory_kits rows (this company's, not soft-deleted) by
    // their `category` column.
    function loadCategories() {
        var kits = DB.find('inventory_kits', function (k) {
            return k.company_id === state.currentCompanyId && !k.deleted_at;
        });
        var byCat = {};
        var order = [];
        kits.forEach(function (k) {
            var cat = k.category || 'Uncategorized';
            if (!byCat[cat]) { byCat[cat] = []; order.push(cat); }
            byCat[cat].push(k);
        });
        return order.map(function (name) { return { name: name, kits: byCat[name] }; });
    }

    var CATEGORIES = loadCategories();

    var appState = { expandedCat: null, selected: null, searchQuery: '' };

    function clearSearchInput() {
        var search = document.getElementById('kit-search');
        if (search) search.value = '';
    }

    function renderDrawer() {
        var el = document.getElementById('kit-drawer-list');
        el.innerHTML = CATEGORIES.map(function (cat, i) {
            var expanded = appState.expandedCat === i;
            var html = '<div class="kit-drawer-cat">' +
                '<button class="kit-drawer-cat-btn' + (expanded ? ' expanded' : '') + '" onclick="toggleKitDrawerCategory(' + i + ')">' +
                '<span>' + cat.name + '</span>' +
                '<span class="kit-drawer-chevron">' + (expanded ? '&#9660;' : '&#9654;') + '</span>' +
                '</button>';
            if (expanded) {
                html += '<div class="kit-drawer-kits">' + cat.kits.map(function (k, ki) {
                    var isSelected = !!(appState.selected && appState.selected.ci === i && appState.selected.ki === ki);
                    return '<button class="kit-drawer-kit' + (isSelected ? ' active' : '') + '" onclick="selectKit(' + i + ',' + ki + ')">' + k.name + '</button>';
                }).join('') + '</div>';
            }
            html += '</div>';
            return html;
        }).join('');
    }

    function itemLabel(row) {
        return row.quantity && row.quantity !== 1 ? (row.name + ' (' + row.quantity + ')') : row.name;
    }

    function listSection(title, kind, rows, addHandler) {
        var html = '<div class="section-header mt-4"><span class="section-title">' + title + '</span>' +
            (addHandler ? '<button class="section-action" onclick="' + addHandler + '">+ Add</button>' : '') +
            '</div>';
        if (!rows || rows.length === 0) {
            html += '<div class="kit-empty">No ' + title.toLowerCase() + ' listed.</div>';
            return html;
        }
        html += '<div class="card" style="cursor:default; padding:0 14px;">';
        html += rows.map(function (r) {
            return '<div class="kit-detail-item" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;" ' +
                'onclick="openKitItemEditor(\'' + kind + '\',\'' + r.id + '\')">' +
                '<span>' + itemLabel(r) + '</span><span class="card-arrow">&rsaquo;</span></div>';
        }).join('');
        html += '</div>';
        return html;
    }

    function kitDetailHtml(cat, kit) {
        var tools = DB.find('kit_tools', function (t) { return t.kit_id === kit.id && !t.deleted_at; })
            .sort(function (a, b) { return (a.sort_order || 0) - (b.sort_order || 0); });
        var materials = DB.find('kit_items', function (i) { return i.kit_id === kit.id && !i.deleted_at; })
            .sort(function (a, b) { return (a.sort_order || 0) - (b.sort_order || 0); });

        var html = '<div class="page-title-sm">' + kit.name + '</div>';
        html += '<div class="page-subtitle mb-4">' + cat.name + '</div>';
        html += listSection('Tools', 'tool', tools, 'addKitEntry(\'tool\')');
        html += listSection('Materials', 'material', materials, 'addKitEntry(\'material\')');
        html += '<div class="section-header mt-4"><span class="section-title">Videos</span>' +
            '<button class="section-action" onclick="addKitEntry(\'video\')">+ Add</button></div>';
        var videos = [{ title: kit.name + ' &mdash; Overview', subtitle: 'Training video placeholder' }]
            .concat((kit.videos || []).map(function (v) { return { title: v.title, subtitle: 'Training video placeholder (added)' }; }));
        html += videos.map(function (v) {
            return '<div class="card" onclick="alert(\'Demo — the training video would play here.\')">' +
                '<div class="card-row"><div class="card-body">' +
                '<div class="card-title">' + v.title + '</div>' +
                '<div class="card-subtitle">' + v.subtitle + '</div>' +
                '</div><span class="card-arrow">&#9654;</span></div></div>';
        }).join('');
        return html;
    }

    function emptyStateHtml() {
        // No kits at all is a different situation from none selected — offer
        // the create flow instead of a drawer that would open empty.
        if (CATEGORIES.length === 0) {
            return '<div class="kit-noselect">' +
                '<div class="kit-noselect-title">No kits yet</div>' +
                '<div class="kit-noselect-sub">Create your company’s first kit to start tracking tools and materials.</div>' +
                '<button class="btn btn-primary btn-sm" style="margin-top:14px;" onclick="openCreateKit()">+ Create a Kit</button>' +
                '</div>';
        }
        return '<div class="kit-noselect">' +
            '<div class="kit-noselect-title">No kit selected</div>' +
            '<div class="kit-noselect-sub">Expand a category to choose a kit.</div>' +
            '<button class="btn btn-primary btn-sm" style="margin-top:14px;" onclick="openKitDrawer()">Browse Categories</button>' +
            '</div>';
    }

    window.openCreateKit = function () {
        var existing = document.getElementById('kit-create-panel');
        if (existing) existing.remove();
        var modal = document.createElement('div');
        modal.id = 'kit-create-panel';
        modal.className = 'modal-overlay';
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div class="page-title-sm mb-2">New Kit</div>' +
                '<div class="form-group"><label>Kit Name</label><input type="text" id="kc-name" placeholder="e.g. Basic Electrical Kit"></div>' +
                '<div class="form-group"><label>Category</label><input type="text" id="kc-category" placeholder="e.g. Electrical"></div>' +
                '<button class="btn btn-primary mt-2" onclick="saveNewKit()">Create Kit</button>' +
                '<button class="btn btn-secondary" onclick="document.getElementById(\'kit-create-panel\').remove()">Cancel</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
        document.getElementById('phone').appendChild(modal);
    };

    window.saveNewKit = function () {
        var name = (document.getElementById('kc-name').value || '').trim();
        if (!name) { alert('Enter a kit name.'); return; }
        var category = (document.getElementById('kc-category').value || '').trim() || 'Uncategorized';
        var kit = DB.insert('inventory_kits', {
            company_id: state.currentCompanyId, name: name, description: '',
            image_url: null, location: 'shop', division_number: null, category: category,
        });
        document.getElementById('kit-create-panel').remove();
        CATEGORIES = loadCategories();
        // Select the new kit so the user lands ready to add tools/materials.
        CATEGORIES.forEach(function (cat, ci) {
            cat.kits.forEach(function (k, ki) {
                if (k.id === kit.id) appState.selected = { ci: ci, ki: ki };
            });
        });
        if (appState.selected) appState.expandedCat = appState.selected.ci;
        render();
    };

    function searchResultsHtml(query) {
        var q = query.toLowerCase();
        var results = [];
        CATEGORIES.forEach(function (cat, ci) {
            cat.kits.forEach(function (k, ki) {
                if (k.name.toLowerCase().indexOf(q) !== -1) results.push({ cat: cat, ci: ci, k: k, ki: ki });
            });
        });
        var html = '<div class="section-header"><span class="section-title">Search Results</span>' +
            '<span class="kit-row-count">' + results.length + ' found</span></div>';
        if (results.length === 0) {
            html += '<div class="kit-empty">No kits match &quot;' + query + '&quot;.</div>';
            return html;
        }
        html += '<div class="card" style="cursor:default; padding:0 14px;">';
        html += results.map(function (r) {
            return '<div class="kit-row" onclick="selectKit(' + r.ci + ',' + r.ki + ')">' +
                '<span class="kit-row-name">' + r.k.name + '<br><span style="font-size:0.7rem; font-weight:500; color:#94a3b8;">' + r.cat.name + '</span></span>' +
                '<span class="card-arrow">&rsaquo;</span></div>';
        }).join('');
        html += '</div>';
        return html;
    }

    function render() {
        renderDrawer();
        var content = document.getElementById('kit-content');
        if (appState.searchQuery) {
            content.innerHTML = searchResultsHtml(appState.searchQuery);
        } else if (appState.selected) {
            content.innerHTML = kitDetailHtml(CATEGORIES[appState.selected.ci], CATEGORIES[appState.selected.ci].kits[appState.selected.ki]);
        } else {
            content.innerHTML = emptyStateHtml();
        }
    }

    window.openKitDrawer = function () {
        document.getElementById('kit-drawer-overlay').classList.add('open');
        renderDrawer();
    };

    window.closeKitDrawer = function () {
        document.getElementById('kit-drawer-overlay').classList.remove('open');
    };

    window.handleKitDrawerOverlayClick = function (e) {
        if (e.target.id === 'kit-drawer-overlay') closeKitDrawer();
    };

    window.toggleKitDrawerCategory = function (i) {
        appState.expandedCat = (appState.expandedCat === i) ? null : i;
        renderDrawer();
    };

    window.selectKit = function (ci, ki) {
        appState.selected = { ci: ci, ki: ki };
        appState.expandedCat = ci;
        appState.searchQuery = '';
        clearSearchInput();
        closeKitDrawer();
        render();
    };

    // One shared "add to kit" sheet for tools, materials, and (fake) videos —
    // the kind is just which table/field the name lands in. The detail view
    // re-queries kit_tools/kit_items live on every render, and kit.videos is
    // the same row object held by the CATEGORIES snapshot, so a plain
    // render() shows the new entry immediately.
    window.addKitEntry = function (kind) {
        if (!appState.selected) return;
        var existing = document.getElementById('kit-add-panel');
        if (existing) existing.remove();
        var labels = { tool: 'New Tool', material: 'New Material', video: 'New Training Video' };
        var modal = document.createElement('div');
        modal.id = 'kit-add-panel';
        modal.className = 'modal-overlay';
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div class="page-title-sm mb-2">' + labels[kind] + '</div>' +
                '<div class="form-group"><label>' + (kind === 'video' ? 'Video Title' : 'Name') + '</label>' +
                    '<input type="text" id="ka-name" placeholder="' + (kind === 'video' ? 'e.g. Panel Swap Walkthrough' : 'e.g. Torpedo Level') + '"></div>' +
                (kind !== 'video'
                    ? '<div class="form-group"><label>Quantity</label><input type="number" id="ka-qty" min="1" step="1" value="1"></div>'
                    : '') +
                '<button class="btn btn-primary mt-2" onclick="saveKitEntry(\'' + kind + '\')">Add</button>' +
                '<button class="btn btn-secondary" onclick="document.getElementById(\'kit-add-panel\').remove()">Cancel</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
        document.getElementById('phone').appendChild(modal);
    };

    window.saveKitEntry = function (kind) {
        var name = (document.getElementById('ka-name').value || '').trim();
        if (!name) { alert('Enter a name.'); return; }
        var kit = CATEGORIES[appState.selected.ci].kits[appState.selected.ki];
        if (kind === 'tool') {
            var toolQty = parseInt(document.getElementById('ka-qty').value, 10) || 1;
            var maxTool = DB.find('kit_tools', function (t) { return t.kit_id === kit.id; }).length;
            DB.insert('kit_tools', { company_id: kit.company_id, kit_id: kit.id, name: name, quantity: toolQty, sort_order: maxTool });
        } else if (kind === 'material') {
            var qty = parseInt(document.getElementById('ka-qty').value, 10) || 1;
            var maxItem = DB.find('kit_items', function (i) { return i.kit_id === kit.id; }).length;
            DB.insert('kit_items', {
                company_id: kit.company_id, kit_id: kit.id, material_id: null,
                name: name, quantity: qty, image_url: null, sort_order: maxItem,
            });
        } else {
            DB.update('inventory_kits', kit.id, { videos: (kit.videos || []).concat([{ title: name }]) });
        }
        document.getElementById('kit-add-panel').remove();
        render();
    };

    // Tap a tool/material row → edit sheet: rename, change quantity, or
    // remove (soft delete via deleted_at, matching the list queries above).
    function kindTable(kind) { return kind === 'tool' ? 'kit_tools' : 'kit_items'; }

    window.openKitItemEditor = function (kind, id) {
        var row = DB.getById(kindTable(kind), id);
        if (!row) return;
        var existing = document.getElementById('kit-edit-panel');
        if (existing) existing.remove();
        var modal = document.createElement('div');
        modal.id = 'kit-edit-panel';
        modal.className = 'modal-overlay';
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div class="page-title-sm mb-2">' + (kind === 'tool' ? 'Edit Tool' : 'Edit Material') + '</div>' +
                '<div class="form-group"><label>Name</label><input type="text" id="ke-name"></div>' +
                '<div class="form-group"><label>Quantity</label><input type="number" id="ke-qty" min="1" step="1"></div>' +
                '<button class="btn btn-primary mt-2" onclick="saveKitItemEdit(\'' + kind + '\',\'' + id + '\')">Save</button>' +
                '<button class="btn btn-outline" style="color:#dc2626; border-color:#fca5a5;" onclick="removeKitItem(\'' + kind + '\',\'' + id + '\')">Remove from Kit</button>' +
                '<button class="btn btn-secondary" onclick="document.getElementById(\'kit-edit-panel\').remove()">Cancel</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
        document.getElementById('phone').appendChild(modal);
        // Set values via the DOM (not the HTML string) so names with quotes render intact.
        document.getElementById('ke-name').value = row.name || '';
        document.getElementById('ke-qty').value = row.quantity || 1;
    };

    window.saveKitItemEdit = function (kind, id) {
        var name = (document.getElementById('ke-name').value || '').trim();
        if (!name) { alert('Enter a name.'); return; }
        var qty = parseInt(document.getElementById('ke-qty').value, 10);
        if (!qty || qty < 1) qty = 1;
        DB.update(kindTable(kind), id, { name: name, quantity: qty });
        document.getElementById('kit-edit-panel').remove();
        render();
    };

    window.removeKitItem = function (kind, id) {
        var row = DB.getById(kindTable(kind), id);
        if (!confirm('Remove "' + (row ? row.name : 'this item') + '" from the kit?')) return;
        DB.update(kindTable(kind), id, { deleted_at: new Date().toISOString() });
        document.getElementById('kit-edit-panel').remove();
        render();
    };

    window.filterKits = function (query) {
        appState.searchQuery = query.trim();
        if (appState.searchQuery) {
            appState.selected = null;
            closeKitDrawer();
        }
        render();
    };

    render();
})();
</script>
