<div class="page" style="padding-bottom:80px;">
    <div class="mb-2">
        <div class="page-title">Kits &amp; Tools</div>
        <div class="page-subtitle">Browse kits by category to see tools, materials, and training videos.</div>
    </div>
    <button class="btn btn-outline btn-sm mb-4" onclick="loadPage('label-generator')">Generate Labels</button>

    <div class="kit-search-row">
        <button class="icon-btn" onclick="openKitDrawer()" aria-label="Browse kit categories">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>
        <input class="search-bar" type="text" id="kit-search" placeholder="Search kits..." oninput="filterKits(this.value)">
    </div>

    <div class="kit-content" id="kit-content"></div>
</div>

<div class="kit-drawer-overlay" id="kit-drawer-overlay" onclick="handleKitDrawerOverlayClick(event)">
    <div class="kit-drawer">
        <div class="kit-drawer-header">
            <span class="section-title">Kit Categories</span>
            <button class="kit-drawer-close" onclick="closeKitDrawer()" aria-label="Close">&times;</button>
        </div>
        <div class="kit-drawer-list" id="kit-drawer-list"></div>
    </div>
</div>

<script>
(function () {

    // Group real inventory_kits rows (this company's, not soft-deleted) by
    // their `category` column.
    function loadCategories() {
        var kits = DB.find('inventory_kits', function (k) {
            return k.company_id === state.currentCompanyId && !k.deleted_at;
        });
        var byCat = {};
        var order = [];
        kits.forEach(function (k) {
            var cat = k.category || 'Uncategorized';
            if (!byCat[cat]) { byCat[cat] = []; order.push(cat); }
            byCat[cat].push(k);
        });
        return order.map(function (name) { return { name: name, kits: byCat[name] }; });
    }

    var CATEGORIES = loadCategories();

    var appState = { expandedCat: null, selected: null, searchQuery: '' };

    function clearSearchInput() {
        var search = document.getElementById('kit-search');
        if (search) search.value = '';
    }

    function renderDrawer() {
        var el = document.getElementById('kit-drawer-list');
        el.innerHTML = CATEGORIES.map(function (cat, i) {
            var expanded = appState.expandedCat === i;
            var html = '<div class="kit-drawer-cat">' +
                '<button class="kit-drawer-cat-btn' + (expanded ? ' expanded' : '') + '" onclick="toggleKitDrawerCategory(' + i + ')">' +
                '<span>' + cat.name + '</span>' +
                '<span class="kit-drawer-chevron">' + (expanded ? '&#9660;' : '&#9654;') + '</span>' +
                '</button>';
            if (expanded) {
                html += '<div class="kit-drawer-kits">' + cat.kits.map(function (k, ki) {
                    var isSelected = !!(appState.selected && appState.selected.ci === i && appState.selected.ki === ki);
                    return '<button class="kit-drawer-kit' + (isSelected ? ' active' : '') + '" onclick="selectKit(' + i + ',' + ki + ')">' + k.name + '</button>';
                }).join('') + '</div>';
            }
            html += '</div>';
            return html;
        }).join('');
    }

    function listSection(title, items) {
        var html = '<div class="section-header mt-4"><span class="section-title">' + title + '</span></div>';
        if (!items || items.length === 0) {
            html += '<div class="kit-empty">No ' + title.toLowerCase() + ' listed.</div>';
            return html;
        }
        html += '<div class="card" style="cursor:default; padding:0 14px;">';
        html += items.map(function (i) { return '<div class="kit-detail-item">' + i + '</div>'; }).join('');
        html += '</div>';
        return html;
    }

    function kitDetailHtml(cat, kit) {
        var tools = DB.find('kit_tools', function (t) { return t.kit_id === kit.id; })
            .sort(function (a, b) { return (a.sort_order || 0) - (b.sort_order || 0); })
            .map(function (t) { return t.name; });
        var materials = DB.find('kit_items', function (i) { return i.kit_id === kit.id; })
            .sort(function (a, b) { return (a.sort_order || 0) - (b.sort_order || 0); })
            .map(function (i) { return i.quantity && i.quantity !== 1 ? (i.name + ' (' + i.quantity + ')') : i.name; });

        var html = '<div class="page-title-sm">' + kit.name + '</div>';
        html += '<div class="page-subtitle mb-4">' + cat.name + '</div>';
        html += listSection('Tools', tools);
        html += listSection('Materials', materials);
        html += '<div class="section-header mt-4"><span class="section-title">Videos</span></div>';
        html += '<div class="card" onclick="alert(\'Training video placeholder\')">' +
            '<div class="card-row"><div class="card-body">' +
            '<div class="card-title">' + kit.name + ' &mdash; Overview</div>' +
            '<div class="card-subtitle">Training video placeholder</div>' +
            '</div><span class="card-arrow">&#9654;</span></div></div>';
        return html;
    }

    function emptyStateHtml() {
        return '<div class="kit-noselect">' +
            '<div class="kit-noselect-title">No kit selected</div>' +
            '<div class="kit-noselect-sub">Expand a category to choose a kit.</div>' +
            '<button class="btn btn-primary btn-sm" style="margin-top:14px;" onclick="openKitDrawer()">Browse Categories</button>' +
            '</div>';
    }

    function searchResultsHtml(query) {
        var q = query.toLowerCase();
        var results = [];
        CATEGORIES.forEach(function (cat, ci) {
            cat.kits.forEach(function (k, ki) {
                if (k.name.toLowerCase().indexOf(q) !== -1) results.push({ cat: cat, ci: ci, k: k, ki: ki });
            });
        });
        var html = '<div class="section-header"><span class="section-title">Search Results</span>' +
            '<span class="kit-row-count">' + results.length + ' found</span></div>';
        if (results.length === 0) {
            html += '<div class="kit-empty">No kits match &quot;' + query + '&quot;.</div>';
            return html;
        }
        html += '<div class="card" style="cursor:default; padding:0 14px;">';
        html += results.map(function (r) {
            return '<div class="kit-row" onclick="selectKit(' + r.ci + ',' + r.ki + ')">' +
                '<span class="kit-row-name">' + r.k.name + '<br><span style="font-size:0.7rem; font-weight:500; color:#94a3b8;">' + r.cat.name + '</span></span>' +
                '<span class="card-arrow">&rsaquo;</span></div>';
        }).join('');
        html += '</div>';
        return html;
    }

    function render() {
        renderDrawer();
        var content = document.getElementById('kit-content');
        if (appState.searchQuery) {
            content.innerHTML = searchResultsHtml(appState.searchQuery);
        } else if (appState.selected) {
            content.innerHTML = kitDetailHtml(CATEGORIES[appState.selected.ci], CATEGORIES[appState.selected.ci].kits[appState.selected.ki]);
        } else {
            content.innerHTML = emptyStateHtml();
        }
    }

    window.openKitDrawer = function () {
        document.getElementById('kit-drawer-overlay').classList.add('open');
        renderDrawer();
    };

    window.closeKitDrawer = function () {
        document.getElementById('kit-drawer-overlay').classList.remove('open');
    };

    window.handleKitDrawerOverlayClick = function (e) {
        if (e.target.id === 'kit-drawer-overlay') closeKitDrawer();
    };

    window.toggleKitDrawerCategory = function (i) {
        appState.expandedCat = (appState.expandedCat === i) ? null : i;
        renderDrawer();
    };

    window.selectKit = function (ci, ki) {
        appState.selected = { ci: ci, ki: ki };
        appState.expandedCat = ci;
        appState.searchQuery = '';
        clearSearchInput();
        closeKitDrawer();
        render();
    };

    window.filterKits = function (query) {
        appState.searchQuery = query.trim();
        if (appState.searchQuery) {
            appState.selected = null;
            closeKitDrawer();
        }
        render();
    };

    render();
})();
</script>
