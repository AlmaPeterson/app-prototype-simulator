<div class="page" style="padding-bottom:80px;">
    <div class="mb-2">
        <div class="page-title">Kits &amp; Tools</div>
        <div class="page-subtitle">Browse kits by category to see tools, materials, and training videos.</div>
    </div>
    <button class="btn btn-outline btn-sm mb-4" onclick="loadPage('label-generator')">Labels</button>

    <div class="kit-search-row">
        <button class="icon-btn" onclick="openKitDrawer()" aria-label="Browse kit categories">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>
        <input class="search-bar" type="text" id="kit-search" placeholder="Search kits..." oninput="filterKits(this.value)">
    </div>

    <div class="kit-content" id="kit-content"></div>
</div>

<div class="kit-drawer-overlay" id="kit-drawer-overlay" onclick="handleKitDrawerOverlayClick(event)">
    <div class="kit-drawer">
        <div class="kit-drawer-header">
            <span class="section-title">Kit Categories</span>
            <button class="kit-drawer-close" onclick="closeKitDrawer()" aria-label="Close">&times;</button>
        </div>
        <div class="kit-drawer-list" id="kit-drawer-list"></div>
    </div>
</div>

<script>
(function () {

    // Group real inventory_kits rows (this company's, not soft-deleted) by
    // their `category` column.
    function loadCategories() {
        var kits = DB.find('inventory_kits', function (k) {
            return k.company_id === state.currentCompanyId && !k.deleted_at;
        });
        var byCat = {};
        var order = [];
        kits.forEach(function (k) {
            var cat = k.category || 'Uncategorized';
            if (!byCat[cat]) { byCat[cat] = []; order.push(cat); }
            byCat[cat].push(k);
        });
        return order.map(function (name) { return { name: name, kits: byCat[name] }; });
    }

    // Tools/materials that aren't part of any kit — e.g. big shelf tools kept
    // on a trailer (drills, band saw, batteries) rather than bundled into a
    // job kit. They still live in the `materials` table (Inventory owns
    // editing them); this just makes them browsable from the Kits tab too.
    function loadStandaloneMaterials() {
        return DB.find('materials', function (m) {
            return m.company_id === state.currentCompanyId && !m.deleted_at && !m.kit_id;
        });
    }

    function locationLabel(loc) {
        return loc.replace(/_/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
    }

    var CATEGORIES = loadCategories();

    // appState.selected is either {ci, ki} (a real kit) or the sentinel
    // string 'standalone' (the Standalone Tools view below).
    var appState = { expandedCat: null, selected: null, searchQuery: '' };

    function clearSearchInput() {
        var search = document.getElementById('kit-search');
        if (search) search.value = '';
    }

    function renderDrawer() {
        var el = document.getElementById('kit-drawer-list');
        var standaloneHtml = '<div class="kit-drawer-cat">' +
            '<button class="kit-drawer-cat-btn' + (appState.selected === 'standalone' ? ' expanded' : '') + '" onclick="selectStandalone()">' +
            '<span>Standalone Tools</span><span class="kit-drawer-chevron">&#9654;</span>' +
            '</button></div>';
        el.innerHTML = standaloneHtml + CATEGORIES.map(function (cat, i) {
            var expanded = appState.expandedCat === i;
            var html = '<div class="kit-drawer-cat">' +
                '<button class="kit-drawer-cat-btn' + (expanded ? ' expanded' : '') + '" onclick="toggleKitDrawerCategory(' + i + ')">' +
                '<span>' + cat.name + '</span>' +
                '<span class="kit-drawer-chevron">' + (expanded ? '&#9660;' : '&#9654;') + '</span>' +
                '</button>';
            if (expanded) {
                html += '<div class="kit-drawer-kits">' + cat.kits.map(function (k, ki) {
                    var isSelected = !!(appState.selected && appState.selected.ci === i && appState.selected.ki === ki);
                    return '<button class="kit-drawer-kit' + (isSelected ? ' active' : '') + '" onclick="selectKit(' + i + ',' + ki + ')">' + k.name + '</button>';
                }).join('') + '</div>';
            }
            html += '</div>';
            return html;
        }).join('');
    }

    function itemLabel(row) {
        return row.stock_qty && row.stock_qty !== 1 ? (row.name + ' (' + row.stock_qty + ')') : row.name;
    }

    // Same two-tier photo source as Inventory: a user-uploaded image_asset_id
    // (IndexedDB) wins over a seed-provided image_url (a static path shipped
    // with the app).
    function thumbHtml(row) {
        var style = 'width:32px; height:32px; border-radius:7px; object-fit:cover; background:#f1f5f9; flex-shrink:0; margin-right:10px;';
        if (row.image_asset_id) return '<img data-asset-id="' + row.image_asset_id + '" style="' + style + '" alt="">';
        if (row.image_url) return '<img src="' + esc(row.image_url) + '" style="' + style + '" alt="">';
        return '<div style="' + style + '"></div>';
    }

    function listSection(title, kind, rows, addHandler) {
        var html = '<div class="section-header mt-4"><span class="section-title">' + title + '</span>' +
            (addHandler ? '<button class="section-action" onclick="' + addHandler + '">+ Add</button>' : '') +
            '</div>';
        if (!rows || rows.length === 0) {
            html += '<div class="kit-empty">No ' + title.toLowerCase() + ' listed.</div>';
            return html;
        }
        html += '<div class="card" style="cursor:default; padding:0 14px;">';
        html += rows.map(function (r) {
            return '<div class="kit-detail-item" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;" ' +
                'onclick="openKitItemEditor(\'' + kind + '\',\'' + r.id + '\')">' +
                '<span style="display:flex; align-items:center;">' + thumbHtml(r) + itemLabel(r) + '</span><span class="card-arrow">&rsaquo;</span></div>';
        }).join('');
        html += '</div>';
        return html;
    }

    function kitDetailHtml(cat, kit) {
        var tools = DB.find('materials', function (m) { return m.kit_id === kit.id && m.item_type === 'tool' && !m.deleted_at; });
        var materials = DB.find('materials', function (m) { return m.kit_id === kit.id && m.item_type === 'material' && !m.deleted_at; });

        var html = '<div class="flex-between">' +
            '<div class="page-title-sm">' + esc(kit.name) + '</div>' +
            '<button class="btn btn-outline btn-sm" onclick="openEditKit(\'' + kit.id + '\')">Edit Kit</button>' +
            '</div>';
        html += '<div class="page-subtitle mb-2">' + esc(cat.name) + (kit.location ? ' &bull; ' + esc(locationLabel(kit.location)) : '') + '</div>';
        if (kit.description) html += '<div style="font-size:0.82rem; color:#475569; margin-bottom:14px;">' + esc(kit.description) + '</div>';
        html += listSection('Tools', 'tool', tools, 'addKitEntry(\'tool\')');
        html += listSection('Materials', 'material', materials, 'addKitEntry(\'material\')');
        html += '<div class="section-header mt-4"><span class="section-title">Videos</span>' +
            '<button class="section-action" onclick="addKitEntry(\'video\')">+ Add</button></div>';
        var videos = kit.videos || [];
        if (videos.length === 0) {
            html += '<div class="kit-empty">No videos uploaded.</div>';
        } else {
            html += '<div class="card" style="cursor:default; padding:0 14px;">';
            html += videos.map(function (v) {
                return '<div class="kit-detail-item" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;" ' +
                    'onclick="openKitVideo(\'' + jsArg(v.video_asset_id) + '\')"><span>' + esc(v.title) + '</span><span class="card-arrow">&#9654;</span></div>';
            }).join('');
            html += '</div>';
        }
        return html;
    }

    function standaloneDetailHtml() {
        var materials = loadStandaloneMaterials();
        var byLoc = {};
        var order = [];
        materials.forEach(function (m) {
            var loc = m.location || 'shop';
            if (!byLoc[loc]) { byLoc[loc] = []; order.push(loc); }
            byLoc[loc].push(m);
        });
        order.sort();

        var html = '<div class="page-title-sm">Standalone Tools</div>';
        html += '<div class="page-subtitle mb-4">Shelf tools not bundled into a kit &mdash; edited from Inventory.</div>';
        if (order.length === 0) {
            html += '<div class="kit-empty">No standalone tools yet.</div>';
            return html;
        }
        order.forEach(function (loc) {
            html += '<div class="section-header mt-4"><span class="section-title">' + locationLabel(loc) + '</span></div>';
            html += '<div class="card" style="cursor:default; padding:0 14px;">';
            html += byLoc[loc].map(function (m) {
                return '<div class="kit-detail-item" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;" ' +
                    'onclick="openStandaloneTool(\'' + m.id + '\')"><span style="display:flex; align-items:center;">' +
                    thumbHtml(m) + m.name + (m.video_asset_id ? ' &#127916;' : '') +
                    '</span><span class="card-arrow">&rsaquo;</span></div>';
            }).join('');
            html += '</div>';
        });
        return html;
    }

    window.selectStandalone = function () {
        appState.selected = 'standalone';
        appState.searchQuery = '';
        clearSearchInput();
        closeKitDrawer();
        render();
    };

    window.openStandaloneTool = function (materialId) {
        var m = DB.getById('materials', materialId);
        if (!m) return;
        var existing = document.getElementById('kit-standalone-panel');
        if (existing) existing.remove();
        var modal = document.createElement('div');
        modal.id = 'kit-standalone-panel';
        modal.className = 'modal-overlay';
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">' +
                    (m.image_asset_id || m.image_url
                        ? '<img ' + (m.image_asset_id ? 'data-asset-id="' + m.image_asset_id + '"' : 'src="' + esc(m.image_url) + '"') +
                            ' style="width:56px; height:56px; border-radius:10px; object-fit:cover; background:#f1f5f9;" alt="">'
                        : '') +
                    '<div><div class="page-title-sm">' + m.name + '</div><div class="page-subtitle">' + locationLabel(m.location || 'shop') + '</div></div>' +
                '</div>' +
                (m.video_asset_id ? '<button class="btn btn-outline mt-2" onclick="watchStandaloneVideo(\'' + m.id + '\')">&#9654; Watch Video</button>' : '') +
                (!m.video_asset_id && m.reference_url ? '<a class="btn btn-outline mt-2" href="' + esc(m.reference_url) + '" target="_blank" rel="noopener" style="display:block; text-align:center; text-decoration:none;">&#128279; Reference Video (YouTube)</a>' : '') +
                '<button class="btn btn-primary mt-2" onclick="editStandaloneInInventory(\'' + m.id + '\')">Edit in Inventory</button>' +
                '<button class="btn btn-secondary" onclick="document.getElementById(\'kit-standalone-panel\').remove()">Close</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
        document.getElementById('phone').appendChild(modal);
        hydrateAssetMedia(modal);
    };

    // The quick-view sheet is appended to #phone, outside #main — loadPage()
    // only swaps #main, so it has to be removed explicitly before navigating
    // away or it's left floating over whichever page loads next.
    function closeStandalonePanel() {
        var p = document.getElementById('kit-standalone-panel');
        if (p) p.remove();
    }

    window.watchStandaloneVideo = function (materialId) {
        closeStandalonePanel();
        state.materialVideoId = materialId;
        loadPage('material-video');
    };

    window.editStandaloneInInventory = function (materialId) {
        closeStandalonePanel();
        state.inventoryEditMaterialId = materialId;
        loadPage('inventory');
    };

    function emptyStateHtml() {
        // No kits at all is a different situation from none selected — offer
        // the create flow instead of a drawer that would open empty.
        if (CATEGORIES.length === 0) {
            return '<div class="kit-noselect">' +
                '<div class="kit-noselect-title">No kits yet</div>' +
                '<div class="kit-noselect-sub">Create your company’s first kit to start tracking tools and materials.</div>' +
                '<button class="btn btn-primary btn-sm" style="margin-top:14px;" onclick="openCreateKit()">+ Create a Kit</button>' +
                '</div>';
        }
        return '<div class="kit-noselect">' +
            '<div class="kit-noselect-title">No kit selected</div>' +
            '<div class="kit-noselect-sub">Expand a category to choose a kit.</div>' +
            '<button class="btn btn-primary btn-sm" style="margin-top:14px;" onclick="openKitDrawer()">Browse Categories</button>' +
            '</div>';
    }

    window.openCreateKit = function () {
        var existing = document.getElementById('kit-create-panel');
        if (existing) existing.remove();
        var modal = document.createElement('div');
        modal.id = 'kit-create-panel';
        modal.className = 'modal-overlay';
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div class="page-title-sm mb-2">New Kit</div>' +
                '<div class="form-group"><label>Kit Name</label><input type="text" id="kc-name" placeholder="e.g. Basic Electrical Kit"></div>' +
                '<div class="form-group"><label>Category</label><input type="text" id="kc-category" placeholder="e.g. Electrical"></div>' +
                '<div class="form-group"><label>Description</label><input type="text" id="kc-description" placeholder="What this kit is for"></div>' +
                '<div class="form-group"><label>Location</label><input type="text" id="kc-location" list="kc-location-list" value="shop" placeholder="Search or type a new location"><datalist id="kc-location-list">' +
                    companyLocations(state.currentCompanyId).map(function (l) { return '<option value="' + esc(l.name) + '">'; }).join('') +
                    '</datalist></div>' +
                '<button class="btn btn-primary mt-2" onclick="saveNewKit()">Create Kit</button>' +
                '<button class="btn btn-secondary" onclick="document.getElementById(\'kit-create-panel\').remove()">Cancel</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
        document.getElementById('phone').appendChild(modal);
    };

    window.saveNewKit = function () {
        var name = (document.getElementById('kc-name').value || '').trim();
        if (!name) { alert('Enter a kit name.'); return; }
        var category = (document.getElementById('kc-category').value || '').trim() || 'Uncategorized';
        var description = (document.getElementById('kc-description').value || '').trim();
        var locationName = (document.getElementById('kc-location').value || '').trim() || 'shop';
        var kit = DB.insert('inventory_kits', {
            company_id: state.currentCompanyId, name: name, description: description,
            image_url: null, location: findOrCreateLocation(state.currentCompanyId, locationName).name,
            division_number: null, category: category,
        });
        document.getElementById('kit-create-panel').remove();
        CATEGORIES = loadCategories();
        // Select the new kit so the user lands ready to add tools/materials.
        CATEGORIES.forEach(function (cat, ci) {
            cat.kits.forEach(function (k, ki) {
                if (k.id === kit.id) appState.selected = { ci: ci, ki: ki };
            });
        });
        if (appState.selected) appState.expandedCat = appState.selected.ci;
        render();
    };

    // Kit-level photo staged in the edit sheet, held here until Save so
    // Cancel never orphans a blob — separate from pendingKitItemImageFile
    // below (that one's for an individual tool/material row, not the kit
    // itself, and both sheets can't be open at once but keep them distinct
    // for clarity).
    var pendingKitImageFile = null;
    var pendingKitImageRemoved = false;

    window.handleKitPhotoChange = function (input) {
        var file = input.files && input.files[0];
        if (!file) return;
        pendingKitImageFile = file;
        pendingKitImageRemoved = false;
        var preview = document.getElementById('kf-photo-preview');
        preview.removeAttribute('data-asset-id');
        preview.src = URL.createObjectURL(file);
    };

    window.clearKitPhoto = function () {
        pendingKitImageFile = null;
        pendingKitImageRemoved = true;
        var preview = document.getElementById('kf-photo-preview');
        preview.removeAttribute('data-asset-id');
        preview.removeAttribute('src');
    };

    // Edit the kit shell itself (name/category/description/location/photo) —
    // separate from addKitEntry/openKitItemEditor above, which only ever
    // touch the tools/materials *inside* a kit. Until this existed, a kit's
    // own fields were fixed at creation with no way to fix a typo or add a
    // description/photo/location later.
    window.openEditKit = function (kitId) {
        var kit = DB.getById('inventory_kits', kitId);
        if (!kit) return;
        pendingKitImageFile = null;
        pendingKitImageRemoved = false;
        var existing = document.getElementById('kit-edit-shell-panel');
        if (existing) existing.remove();
        var modal = document.createElement('div');
        modal.id = 'kit-edit-shell-panel';
        modal.className = 'modal-overlay';
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div class="page-title-sm mb-2">Edit Kit</div>' +
                '<div class="form-group"><label>Photo</label>' +
                    '<div style="display:flex; align-items:center; gap:10px;">' +
                        '<img id="kf-photo-preview" ' + (kit.image_asset_id ? 'data-asset-id="' + kit.image_asset_id + '"' : (kit.image_url ? 'src="' + esc(kit.image_url) + '"' : '')) +
                            ' style="width:56px; height:56px; border-radius:10px; object-fit:cover; background:#f1f5f9;" alt="">' +
                        '<button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById(\'kf-photo-input\').click()">Choose Photo</button>' +
                        (kit.image_asset_id || kit.image_url ? '<button type="button" class="btn btn-outline btn-sm" style="color:#dc2626;" onclick="clearKitPhoto()">Remove</button>' : '') +
                    '</div>' +
                    '<input type="file" id="kf-photo-input" accept="image/*" style="display:none;" onchange="handleKitPhotoChange(this)">' +
                '</div>' +
                '<div class="form-group"><label>Kit Name</label><input type="text" id="kf-name" value="' + esc(kit.name) + '"></div>' +
                '<div class="form-group"><label>Category</label><input type="text" id="kf-category" value="' + esc(kit.category || '') + '"></div>' +
                '<div class="form-group"><label>Description</label><input type="text" id="kf-description" value="' + esc(kit.description || '') + '" placeholder="What this kit is for"></div>' +
                '<div class="form-group"><label>Location</label><input type="text" id="kf-location" list="kf-location-list" value="' + esc(kit.location || 'shop') + '" placeholder="Search or type a new location"><datalist id="kf-location-list">' +
                    companyLocations(state.currentCompanyId).map(function (l) { return '<option value="' + esc(l.name) + '">'; }).join('') +
                    '</datalist></div>' +
                '<button class="btn btn-primary mt-2" onclick="saveEditKit(\'' + kit.id + '\')">Save Changes</button>' +
                '<button class="btn btn-outline" style="color:#dc2626; border-color:#fca5a5;" onclick="removeKit(\'' + kit.id + '\')">Delete Kit</button>' +
                '<button class="btn btn-secondary" onclick="document.getElementById(\'kit-edit-shell-panel\').remove()">Cancel</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
        document.getElementById('phone').appendChild(modal);
        hydrateAssetMedia(modal);
    };

    function closeEditKitPanel() {
        var p = document.getElementById('kit-edit-shell-panel');
        if (p) p.remove();
    }

    window.saveEditKit = function (kitId) {
        var name = (document.getElementById('kf-name').value || '').trim();
        if (!name) { alert('Enter a kit name.'); return; }
        var category = (document.getElementById('kf-category').value || '').trim() || 'Uncategorized';
        var description = (document.getElementById('kf-description').value || '').trim();
        var locationName = (document.getElementById('kf-location').value || '').trim() || 'shop';
        var patch = {
            name: name, category: category, description: description,
            location: findOrCreateLocation(state.currentCompanyId, locationName).name,
        };

        function finish(imageAssetId) {
            if (imageAssetId !== undefined) patch.image_asset_id = imageAssetId;
            DB.update('inventory_kits', kitId, patch);
            closeEditKitPanel();
            CATEGORIES = loadCategories();
            CATEGORIES.forEach(function (cat, ci) {
                cat.kits.forEach(function (k, ki) {
                    if (k.id === kitId) appState.selected = { ci: ci, ki: ki };
                });
            });
            if (appState.selected) appState.expandedCat = appState.selected.ci;
            render();
        }

        if (pendingKitImageFile) {
            Assets.save(pendingKitImageFile).then(function (asset) { finish(asset.id); });
        } else if (pendingKitImageRemoved) {
            finish(null);
        } else {
            finish(undefined);
        }
    };

    // Deleting a kit shell shouldn't take its tools/materials down with it —
    // someone may want to fold them into a different kit or just leave them
    // on the shelf. So this releases them to standalone stock instead of
    // deleting: kit_id cleared (the same "no kit" state as anything added
    // straight from Inventory) and location changed from the kit's id
    // (kit-owned rows are keyed to it, see materials/kits unification notes)
    // to the kit's own last known physical location, so they land wherever
    // the kit itself was rather than defaulting blindly to the shop.
    window.removeKit = function (kitId) {
        var kit = DB.getById('inventory_kits', kitId);
        if (!confirm('Delete "' + (kit ? kit.name : 'this kit') + '"? Its tools and materials will move to Standalone Tools, not be deleted.')) return;
        var releaseLocation = (kit && kit.location) || 'shop';
        DB.find('materials', function (m) { return m.kit_id === kitId && !m.deleted_at; }).forEach(function (m) {
            DB.update('materials', m.id, { kit_id: null, location: releaseLocation });
        });
        DB.softDelete('inventory_kits', kitId);
        closeEditKitPanel();
        CATEGORIES = loadCategories();
        appState.selected = null;
        appState.expandedCat = null;
        render();
    };

    function searchResultsHtml(query) {
        var q = query.toLowerCase();
        var results = [];
        CATEGORIES.forEach(function (cat, ci) {
            cat.kits.forEach(function (k, ki) {
                if (k.name.toLowerCase().indexOf(q) !== -1) results.push({ cat: cat, ci: ci, k: k, ki: ki });
            });
        });
        var html = '<div class="section-header"><span class="section-title">Search Results</span>' +
            '<span class="kit-row-count">' + results.length + ' found</span></div>';
        if (results.length === 0) {
            html += '<div class="kit-empty">No kits match &quot;' + query + '&quot;.</div>';
            return html;
        }
        html += '<div class="card" style="cursor:default; padding:0 14px;">';
        html += results.map(function (r) {
            return '<div class="kit-row" onclick="selectKit(' + r.ci + ',' + r.ki + ')">' +
                '<span class="kit-row-name">' + r.k.name + '<br><span style="font-size:0.7rem; font-weight:500; color:#94a3b8;">' + r.cat.name + '</span></span>' +
                '<span class="card-arrow">&rsaquo;</span></div>';
        }).join('');
        html += '</div>';
        return html;
    }

    function render() {
        renderDrawer();
        var content = document.getElementById('kit-content');
        if (appState.searchQuery) {
            content.innerHTML = searchResultsHtml(appState.searchQuery);
        } else if (appState.selected === 'standalone') {
            content.innerHTML = standaloneDetailHtml();
        } else if (appState.selected) {
            content.innerHTML = kitDetailHtml(CATEGORIES[appState.selected.ci], CATEGORIES[appState.selected.ci].kits[appState.selected.ki]);
        } else {
            content.innerHTML = emptyStateHtml();
        }
        hydrateAssetMedia(content);
    }

    window.openKitDrawer = function () {
        document.getElementById('kit-drawer-overlay').classList.add('open');
        renderDrawer();
    };

    window.closeKitDrawer = function () {
        document.getElementById('kit-drawer-overlay').classList.remove('open');
    };

    window.handleKitDrawerOverlayClick = function (e) {
        if (e.target.id === 'kit-drawer-overlay') closeKitDrawer();
    };

    window.toggleKitDrawerCategory = function (i) {
        appState.expandedCat = (appState.expandedCat === i) ? null : i;
        renderDrawer();
    };

    window.selectKit = function (ci, ki) {
        appState.selected = { ci: ci, ki: ki };
        appState.expandedCat = ci;
        appState.searchQuery = '';
        clearSearchInput();
        closeKitDrawer();
        render();
    };

    // One shared "add to kit" sheet for tools, materials, and (fake) videos —
    // for tools/materials, kind just becomes the new materials row's
    // item_type. The detail view re-queries materials live on every render,
    // and kit.videos is the same row object held by the CATEGORIES snapshot,
    // so a plain render() shows the new entry immediately.
    window.addKitEntry = function (kind) {
        if (!appState.selected) return;
        var existing = document.getElementById('kit-add-panel');
        if (existing) existing.remove();
        var labels = { tool: 'New Tool', material: 'New Material', video: 'New Training Video' };
        var modal = document.createElement('div');
        modal.id = 'kit-add-panel';
        modal.className = 'modal-overlay';
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div class="page-title-sm mb-2">' + labels[kind] + '</div>' +
                '<div class="form-group"><label>' + (kind === 'video' ? 'Video Title (optional)' : 'Name') + '</label>' +
                    '<input type="text" id="ka-name" placeholder="' + (kind === 'video' ? 'e.g. Panel Swap Walkthrough' : 'e.g. Torpedo Level') + '"></div>' +
                (kind !== 'video'
                    ? '<div class="form-group"><label>Brand</label><input type="text" id="ka-brand" placeholder="e.g. Milwaukee"></div>' +
                      '<div class="form-group"><label>Quantity</label><input type="number" id="ka-qty" min="1" step="1" value="1"></div>'
                    : '<div class="form-group"><label>Video File</label><input type="file" id="ka-video-file" accept="video/*"></div>') +
                '<button class="btn btn-primary mt-2" onclick="saveKitEntry(\'' + kind + '\')">Add</button>' +
                '<button class="btn btn-secondary" onclick="document.getElementById(\'kit-add-panel\').remove()">Cancel</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
        document.getElementById('phone').appendChild(modal);
    };

    window.saveKitEntry = function (kind) {
        var name = (document.getElementById('ka-name').value || '').trim();
        var kit = CATEGORIES[appState.selected.ci].kits[appState.selected.ki];
        if (kind === 'tool' || kind === 'material') {
            if (!name) { alert('Enter a name.'); return; }
            var qty = parseInt(document.getElementById('ka-qty').value, 10) || 1;
            var brand = (document.getElementById('ka-brand').value || '').trim();
            DB.insert('materials', {
                company_id: kit.company_id, name: name, sku: null, unit: 'each', unit_cost: 0,
                stock_qty: qty, reorder_qty: 0, location: kit.id, kit_id: kit.id, item_type: kind,
                image_asset_id: null, video_asset_id: null, brand: brand || null, image_url: null, reference_url: null,
            });
            document.getElementById('kit-add-panel').remove();
            render();
        } else {
            var file = document.getElementById('ka-video-file').files[0];
            if (!file) { alert('Choose a video file.'); return; }
            Assets.save(file).then(function (asset) {
                DB.update('inventory_kits', kit.id, {
                    videos: (kit.videos || []).concat([{ title: name || file.name, video_asset_id: asset.id }]),
                });
                document.getElementById('kit-add-panel').remove();
                render();
            });
        }
    };

    // A kit can have multiple videos (unlike a material's single
    // video_asset_id), so the handoff needs both which kit and which video
    // entry — video_asset_id is already unique per upload, so it doubles as
    // the entry identifier without a separate id field. kitVideoReturnKitId
    // lets kits.html re-select this kit when the video page navigates back,
    // same as material-video.html's material-id handoff but round-trip.
    window.openKitVideo = function (videoAssetId) {
        var kit = CATEGORIES[appState.selected.ci].kits[appState.selected.ki];
        state.kitVideoId = kit.id;
        state.kitVideoEntryId = videoAssetId;
        state.kitVideoReturnKitId = kit.id;
        loadPage('kit-video');
    };

    // Tap a tool/material row → edit sheet: rename, change quantity, or
    // remove (soft delete via deleted_at, matching the list queries above).
    // Both kinds are `materials` rows now — `kind` only picks the sheet's
    // label and, on remove/re-add, doesn't change which table is touched.

    // Photo staged for the tool/material row currently open in the edit
    // sheet — held here until Save so Cancel never orphans a blob.
    var pendingKitItemImageFile = null;
    var pendingKitItemImageRemoved = false;

    window.handleKitItemPhotoChange = function (input) {
        var file = input.files && input.files[0];
        if (!file) return;
        pendingKitItemImageFile = file;
        pendingKitItemImageRemoved = false;
        var preview = document.getElementById('ke-photo-preview');
        preview.removeAttribute('data-asset-id');
        preview.src = URL.createObjectURL(file);
    };

    window.clearKitItemPhoto = function () {
        pendingKitItemImageFile = null;
        pendingKitItemImageRemoved = true;
        var preview = document.getElementById('ke-photo-preview');
        preview.removeAttribute('data-asset-id');
        preview.removeAttribute('src');
    };

    window.openKitItemEditor = function (kind, id) {
        var row = DB.getById('materials', id);
        if (!row) return;
        pendingKitItemImageFile = null;
        pendingKitItemImageRemoved = false;
        var existing = document.getElementById('kit-edit-panel');
        if (existing) existing.remove();
        var modal = document.createElement('div');
        modal.id = 'kit-edit-panel';
        modal.className = 'modal-overlay';
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div class="page-title-sm mb-2">' + (kind === 'tool' ? 'Edit Tool' : 'Edit Material') + '</div>' +
                '<div class="form-group"><label>Photo</label>' +
                    '<div style="display:flex; align-items:center; gap:10px;">' +
                        '<img id="ke-photo-preview" ' + (row.image_asset_id ? 'data-asset-id="' + row.image_asset_id + '"' : '') +
                            ' style="width:56px; height:56px; border-radius:10px; object-fit:cover; background:#f1f5f9;" alt="">' +
                        '<button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById(\'ke-photo-input\').click()">Choose Photo</button>' +
                        (row.image_asset_id ? '<button type="button" class="btn btn-outline btn-sm" style="color:#dc2626;" onclick="clearKitItemPhoto()">Remove</button>' : '') +
                    '</div>' +
                    '<input type="file" id="ke-photo-input" accept="image/*" style="display:none;" onchange="handleKitItemPhotoChange(this)">' +
                '</div>' +
                '<div class="form-group"><label>Name</label><input type="text" id="ke-name"></div>' +
                '<div class="form-group"><label>Brand</label><input type="text" id="ke-brand" placeholder="e.g. Milwaukee"></div>' +
                '<div class="form-group"><label>Quantity</label><input type="number" id="ke-qty" min="1" step="1"></div>' +
                '<button class="btn btn-primary mt-2" onclick="saveKitItemEdit(\'' + kind + '\',\'' + id + '\')">Save</button>' +
                '<button class="btn btn-outline" style="color:#dc2626; border-color:#fca5a5;" onclick="removeKitItem(\'' + kind + '\',\'' + id + '\')">Remove from Kit</button>' +
                '<button class="btn btn-secondary" onclick="document.getElementById(\'kit-edit-panel\').remove()">Cancel</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
        document.getElementById('phone').appendChild(modal);
        hydrateAssetMedia(modal);
        // Set values via the DOM (not the HTML string) so names with quotes render intact.
        document.getElementById('ke-name').value = row.name || '';
        document.getElementById('ke-brand').value = row.brand || '';
        document.getElementById('ke-qty').value = row.stock_qty || 1;
    };

    window.saveKitItemEdit = function (kind, id) {
        var name = (document.getElementById('ke-name').value || '').trim();
        if (!name) { alert('Enter a name.'); return; }
        var qty = parseInt(document.getElementById('ke-qty').value, 10);
        if (!qty || qty < 1) qty = 1;
        var brand = (document.getElementById('ke-brand').value || '').trim();
        var patch = { name: name, stock_qty: qty, brand: brand || null };

        function finish(imageAssetId) {
            if (imageAssetId !== undefined) patch.image_asset_id = imageAssetId;
            DB.update('materials', id, patch);
            document.getElementById('kit-edit-panel').remove();
            render();
        }

        if (pendingKitItemImageFile) {
            Assets.save(pendingKitItemImageFile).then(function (asset) { finish(asset.id); });
        } else if (pendingKitItemImageRemoved) {
            finish(null);
        } else {
            finish(undefined);
        }
    };

    window.removeKitItem = function (kind, id) {
        var row = DB.getById('materials', id);
        if (!confirm('Remove "' + (row ? row.name : 'this item') + '" from the kit?')) return;
        DB.softDelete('materials', id);
        document.getElementById('kit-edit-panel').remove();
        render();
    };

    window.filterKits = function (query) {
        appState.searchQuery = query.trim();
        if (appState.searchQuery) {
            appState.selected = null;
            closeKitDrawer();
        }
        render();
    };

    // Landed here from kit-video.html navigating back (see openKitVideo
    // above) — re-select the kit the user was viewing instead of the bare
    // "no kit selected" state, same idea as inventory.html's
    // inventoryEditMaterialId handoff.
    if (state.kitVideoReturnKitId) {
        var returnKitId = state.kitVideoReturnKitId;
        state.kitVideoReturnKitId = null;
        CATEGORIES.forEach(function (cat, ci) {
            cat.kits.forEach(function (k, ki) {
                if (k.id === returnKitId) { appState.selected = { ci: ci, ki: ki }; appState.expandedCat = ci; }
            });
        });
    }
    render();
})();
</script>
