<div class="page" style="padding-bottom:80px;">
    <button class="btn btn-secondary btn-sm mb-4" onclick="loadPage('companies')">&larr; Companies</button>
    <div class="flex-between mb-4">
        <div>
            <div class="page-title">Jobs</div>
            <div class="page-subtitle">Kinetic Solutions LLC</div>
        </div>
        <button class="fab" style="position:static; margin:0;" onclick="createJob()">+</button>
    </div>

    <input class="search-bar" type="text" placeholder="Search jobs...">

    <div id="job-list"></div>
</div>

<script>
(function () {
    var jobs = DB.find('jobs', function (j) { return j.company_id === state.currentCompanyId && !j.deleted_at; });
    var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    function fmtDate(iso) {
        if (!iso) return '';
        var d = new Date(iso);
        return months[d.getUTCMonth()] + ' ' + d.getUTCDate();
    }
    document.getElementById('job-list').innerHTML = jobs.map(function (j) {
        var bid = j.bid_id ? DB.getById('bids', j.bid_id) : null;
        var addr = j.address_id ? DB.getById('addresses', j.address_id) : null;
        var lead = DB.findOne('job_assignments', function (a) { return a.job_id === j.id && a.role_on_job === 'lead'; });
        var leadUser = lead ? DB.getById('users', lead.user_id) : null;
        var costLabel = bid ? '$' + bid.total_cost.toLocaleString() : 'No Bid';
        return '<div class="card" onclick="openJob(\'' + j.id + '\')">' +
            '<div class="flex-between mb-1">' +
                '<div class="card-title" style="margin:0;">' + j.name + '</div>' +
                '<span style="font-size:0.78rem; color:#64748b; text-align:right;">' + costLabel + '</span>' +
            '</div>' +
            '<div class="card-subtitle">' + (addr ? addr.street : '') + ' &bull; ' + fmtDate(j.scheduled_start) + '</div>' +
            '<div style="font-size:0.75rem; color:#94a3b8; margin-top:4px;">' +
                (j.job_type || 'General') + ' &bull; ' + (j.priority || 'normal').replace(/^./, function (c) { return c.toUpperCase(); }) + ' &bull; ' +
                (leadUser ? leadUser.full_name : 'Unassigned') +
            '</div>' +
        '</div>';
    }).join('');
})();
</script>
