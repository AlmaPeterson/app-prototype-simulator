<div class="page" style="padding-bottom:80px;">
    <div class="page-title">Scoreboard</div>
    <div class="page-subtitle mb-4" id="sb-subtitle">Leaderboard</div>

    <div class="tab-bar">
        <button class="tab-btn active">Monthly</button>
        <button class="tab-btn">Weekly</button>
        <button class="tab-btn">All Time</button>
    </div>

    <div class="hero-stat" style="margin-bottom:16px;">
        <div style="font-size:0.78rem; opacity:0.7;">Your Ranking</div>
        <div class="hero-stat-value" id="sb-your-rank">#-</div>
        <div style="font-size:0.82rem; opacity:0.8; margin-top:4px;" id="sb-your-points"></div>
    </div>

    <div class="section-header">
        <span class="section-title">Top Performers</span>
    </div>

    <div id="sb-leaderboard"></div>

    <div class="section-header mt-4">
        <span class="section-title">Your Stats</span>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="sb-jobs-done">0</div>
            <div class="stat-label">Jobs Done</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">98%</div>
            <div class="stat-label">On-Time</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">4.8</div>
            <div class="stat-label">Cust. Rating</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="sb-hrs-week">0</div>
            <div class="stat-label">Hrs This Wk</div>
        </div>
    </div>
</div>

<script>
(function () {
    var company = DB.getById('companies', state.currentCompanyId);
    document.getElementById('sb-subtitle').textContent = (company ? company.name : 'Kinetic Flow') + ' Leaderboard';

    var users = DB.find('users', function (u) { return !u.deleted_at && u.company_id === state.currentCompanyId; });
    var ranked = users.map(function (u) {
        var entries = DB.find('scorecard_entries', function (s) { return s.user_id === u.id; });
        var points = entries.reduce(function (sum, e) { return sum + (e.total_score || 0); }, 0);
        var level = window.LEVELS.find(function (l) { return l.slug === u.global_level; });
        return { user: u, points: points, levelName: level ? level.name : u.global_level };
    }).sort(function (a, b) { return b.points - a.points; });

    var leaderboardHtml = ranked.slice(0, 5).map(function (r, i) {
        var initials = r.user.full_name.split(' ').map(function (p) { return (p.replace(/[^A-Za-z]/g, '')[0] || ''); }).join('').toUpperCase().slice(0, 2);
        var isYou = r.user.id === state.currentUserId;
        return '<div class="leaderboard-item"' + (isYou ? ' style="border:1px solid #e2e8f0;"' : '') + '>' +
            '<div class="leaderboard-rank">' + (i + 1) + '</div>' +
            '<div class="leaderboard-avatar">' + initials + '</div>' +
            '<div style="flex:1;">' +
                '<div class="leaderboard-name">' + r.user.full_name + (isYou ? ' <span class="badge badge-gray" style="font-size:0.6rem;">You</span>' : '') + '</div>' +
                '<div class="leaderboard-role">' + r.levelName + '</div>' +
            '</div>' +
            '<div class="leaderboard-score">' + r.points + ' pts</div>' +
        '</div>';
    }).join('');
    document.getElementById('sb-leaderboard').innerHTML = leaderboardHtml ||
        '<div class="alert">No scorecards recorded yet.</div>';

    var yourRank = ranked.findIndex(function (r) { return r.user.id === state.currentUserId; });
    var yourPoints = yourRank >= 0 ? ranked[yourRank].points : 0;
    document.getElementById('sb-your-rank').textContent = yourRank >= 0 ? '#' + (yourRank + 1) : '#-';
    document.getElementById('sb-your-points').textContent = yourPoints + ' pts';

    var myEntries = DB.find('time_entries', function (t) { return t.user_id === state.currentUserId; });
    var doneEntries = myEntries.filter(function (t) { return t.status !== 'active'; });
    var distinctJobs = {};
    doneEntries.forEach(function (t) { distinctJobs[t.job_id] = true; });
    document.getElementById('sb-jobs-done').textContent = Object.keys(distinctJobs).length;

    // "This week" is awkward against seed data whose dates sit in the past —
    // simplify to a sum across all of the signed-in user's time_entries,
    // matching the same judgment call made on review-time.html.
    var totalHrs = myEntries.reduce(function (sum, t) {
        var end = t.clock_out_at ? new Date(t.clock_out_at) : new Date();
        var hrs = Math.max(0, (end - new Date(t.clock_in_at)) / 3600000 - (t.unpaid_break_minutes || 0) / 60);
        return sum + hrs;
    }, 0);
    document.getElementById('sb-hrs-week').textContent = totalHrs.toFixed(1);
})();
</script>
