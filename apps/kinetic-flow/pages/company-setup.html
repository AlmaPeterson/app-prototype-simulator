<div class="page">
    <div class="page-header">
        <div class="page-title">Company Setup</div>
        <div class="page-subtitle">Configure your company before inviting team members.</div>
    </div>

    <div class="alert mb-4">Company created! Complete the setup below.</div>

    <!-- Positions -->
    <div class="section-header">
        <span class="section-title">Employee Positions</span>
        <button class="section-action" onclick="addPosition()">+ Add</button>
    </div>

    <div id="position-chips" style="display:flex; flex-wrap:wrap; margin-bottom:16px;"></div>

    <!-- Branches -->
    <div class="section-header">
        <span class="section-title">Branches / Divisions</span>
        <button class="section-action" onclick="addBranch()">+ Add</button>
    </div>

    <div id="branch-list" style="margin-bottom:16px;"></div>

    <!-- Company Configuration -->
    <div class="section-header">
        <span class="section-title">Company Configuration</span>
    </div>

    <div class="card" style="margin-bottom:8px;" onclick="openCompanyDivisions()">
        <div class="list-item" style="padding:0; border-bottom:none;">
            <div class="list-item-body">
                <div class="list-item-title">Bid Divisions</div>
                <div class="list-item-sub" id="division-count-sub"></div>
            </div>
            <span class="card-arrow">&#8250;</span>
        </div>
    </div>

    <div class="card" style="margin-bottom:8px;" onclick="openCompanyLevels()">
        <div class="list-item" style="padding:0; border-bottom:none;">
            <div class="list-item-body">
                <div class="list-item-title">Guild Levels</div>
                <div class="list-item-sub" id="level-count-sub"></div>
            </div>
            <span class="card-arrow">&#8250;</span>
        </div>
    </div>

    <div class="card" style="margin-bottom:16px;" onclick="openCompanyCompetencyLevels()">
        <div class="list-item" style="padding:0; border-bottom:none;">
            <div class="list-item-body">
                <div class="list-item-title">Competency Levels</div>
                <div class="list-item-sub" id="competency-count-sub"></div>
            </div>
            <span class="card-arrow">&#8250;</span>
        </div>
    </div>

    <!-- Permissions -->
    <div class="section-header">
        <span class="section-title">Permissions</span>
    </div>
    <div class="page-subtitle mb-2" style="font-size:0.78rem;">Tap a position to set what it can do.</div>

    <div class="card" id="permission-list" style="cursor:default; margin-bottom:16px;"></div>

    <!-- Invite -->
    <div class="section-header">
        <span class="section-title">Invite Team Members</span>
    </div>

    <div class="form-group">
        <label>Email Addresses</label>
        <textarea placeholder="jane@example.com&#10;bob@example.com&#10;...one per line"></textarea>
    </div>

    <button class="btn btn-primary" onclick="continueFromSetup()">Continue to Jobs &rarr;</button>
    <button class="btn btn-secondary" onclick="continueFromSetup()">Skip for Now</button>
</div>

<script>
(function () {
    var activeDivisions = window.DIVISIONS.filter(function (d) { return d.isActive; }).length;
    document.getElementById('division-count-sub').textContent = activeDivisions + ' of ' + window.DIVISIONS.length + ' active';
    document.getElementById('level-count-sub').textContent = window.LEVELS.length + ' configured';
    document.getElementById('competency-count-sub').textContent = window.COMPETENCY_LEVELS.length + ' configured';

    // ── Positions & Permissions (both views over the same roles rows) ──
    function companyRoles() {
        return DB.find('roles', function (r) { return r.company_id === state.currentCompanyId && !r.deleted_at; });
    }
    function displayName(role) {
        return role.name.replace(/\b[a-z]/g, function (ch) { return ch.toUpperCase(); });
    }
    function financeLabel(perms) {
        var f = (perms && perms.finance) || 'none';
        return f === 'none' ? 'No finance access' : 'Finance: ' + f;
    }
    function renderPositions() {
        var roles = companyRoles();
        document.getElementById('position-chips').innerHTML = roles.map(function (r) {
            return '<span class="chip selected" onclick="openPositionPanel(\'' + r.id + '\')">' + displayName(r) + '</span>';
        }).join('') || '<div class="page-subtitle" style="font-size:0.78rem;">No positions yet — tap + Add.</div>';
        document.getElementById('permission-list').innerHTML = roles.map(function (r, i) {
            var perms = r.permissions || {};
            var summary = [financeLabel(perms),
                perms.manage_users ? 'manage users' : null,
                perms.manage_bids ? 'manage bids' : null].filter(Boolean).join(' • ');
            return '<div class="list-item" style="padding:8px 0;' + (i === roles.length - 1 ? ' border-bottom:none;' : '') + '" onclick="openPositionPanel(\'' + r.id + '\')">' +
                '<div class="list-item-body">' +
                    '<div class="list-item-title">' + displayName(r) + '</div>' +
                    '<div class="list-item-sub">' + summary + '</div>' +
                '</div>' +
                '<span class="card-arrow">&#8250;</span>' +
            '</div>';
        }).join('') || '<div class="page-subtitle" style="font-size:0.78rem; padding:8px 0;">No positions yet.</div>';
    }
    renderPositions();

    function closePanel() {
        var m = document.getElementById('position-panel');
        if (m) m.remove();
    }

    window.addPosition = function () {
        openPanelFor(null);
    };

    window.openPositionPanel = function (roleId) {
        openPanelFor(DB.getById('roles', roleId));
    };

    function openPanelFor(role) {
        closePanel();
        var perms = (role && role.permissions) || { finance: 'none', manage_users: false, manage_bids: false };
        var modal = document.createElement('div');
        modal.id = 'position-panel';
        modal.className = 'modal-overlay';
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div class="page-title-sm mb-2">' + (role ? 'Edit Position' : 'New Position') + '</div>' +
                '<div class="form-group">' +
                    '<label>Position Name</label>' +
                    '<input type="text" id="pp-name" value="' + (role ? displayName(role) : '') + '" placeholder="e.g. Estimator">' +
                '</div>' +
                '<div class="form-group">' +
                    '<label>Finance Access</label>' +
                    '<select id="pp-finance">' +
                        ['none', 'job', 'branch', 'nationwide'].map(function (f) {
                            var sel = ((perms.finance || 'none') === f) ? ' selected' : '';
                            return '<option value="' + f + '"' + sel + '>' + f.charAt(0).toUpperCase() + f.slice(1) + '</option>';
                        }).join('') +
                    '</select>' +
                '</div>' +
                '<div class="list-item" style="padding:8px 0;">' +
                    '<div class="list-item-body"><div class="list-item-title">Manage users</div></div>' +
                    '<div class="toggle-switch' + (perms.manage_users ? ' on' : '') + '" id="pp-users" onclick="this.classList.toggle(\'on\')"><div class="toggle-switch-knob"></div></div>' +
                '</div>' +
                '<div class="list-item" style="padding:8px 0; border-bottom:none;">' +
                    '<div class="list-item-body"><div class="list-item-title">Manage bids</div></div>' +
                    '<div class="toggle-switch' + (perms.manage_bids ? ' on' : '') + '" id="pp-bids" onclick="this.classList.toggle(\'on\')"><div class="toggle-switch-knob"></div></div>' +
                '</div>' +
                '<button class="btn btn-primary mt-4" onclick="savePosition(' + (role ? '\'' + role.id + '\'' : 'null') + ')">' + (role ? 'Save Position' : 'Add Position') + '</button>' +
                (role && role.name !== 'admin'
                    ? '<button class="btn btn-secondary" style="color:#dc2626;" onclick="removePosition(\'' + role.id + '\')">Remove Position</button>'
                    : '') +
                '<button class="btn btn-secondary" onclick="closePositionPanel()">Cancel</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) closePanel(); });
        document.getElementById('phone').appendChild(modal);
    }

    window.closePositionPanel = closePanel;

    window.savePosition = function (roleId) {
        var nameEl = document.getElementById('pp-name');
        var name = (nameEl.value || '').trim().toLowerCase();
        if (!name) { alert('Enter a position name.'); return; }
        var perms = {
            finance: document.getElementById('pp-finance').value,
            manage_users: document.getElementById('pp-users').classList.contains('on'),
            manage_bids: document.getElementById('pp-bids').classList.contains('on'),
        };
        if (roleId) {
            DB.update('roles', roleId, { name: name, permissions: perms });
        } else {
            DB.insert('roles', { company_id: state.currentCompanyId, name: name, permissions: perms });
        }
        closePanel();
        renderPositions();
    };

    window.removePosition = function (roleId) {
        var assigned = DB.find('user_roles', function (ur) { return ur.role_id === roleId; }).length;
        if (assigned && !confirm(assigned + ' team member' + (assigned === 1 ? ' holds' : 's hold') + ' this position. Remove it anyway?')) return;
        DB.softDelete('roles', roleId);
        closePanel();
        renderPositions();
    };

    function renderBranches() {
        var branches = DB.find('branches', function (b) { return b.company_id === state.currentCompanyId && !b.deleted_at; });
        document.getElementById('branch-list').innerHTML = branches.map(function (b) {
            var addr = b.address_id ? DB.getById('addresses', b.address_id) : null;
            var badge = b.is_primary
                ? '<span class="badge badge-gray">Primary</span>'
                : '<button class="text-link" style="font-size:0.75rem;" onclick="event.stopPropagation(); removeBranch(\'' + b.id + '\')">Remove</button>';
            return '<div class="card" style="margin-bottom:8px;" onclick="openBranch(\'' + b.id + '\')">' +
                '<div class="flex-between">' +
                    '<div>' +
                        '<div class="card-title">' + b.name + '</div>' +
                        '<div class="card-subtitle">' + (addr ? addr.street + ', ' + addr.city + ', ' + addr.state : '') + '</div>' +
                    '</div>' +
                    badge +
                '</div>' +
            '</div>';
        }).join('') || '<div class="page-subtitle" style="font-size:0.78rem;">No branches yet — tap + Add.</div>';
    }
    renderBranches();

    window.addBranch = function () {
        var existing = document.getElementById('branch-panel');
        if (existing) existing.remove();
        var modal = document.createElement('div');
        modal.id = 'branch-panel';
        modal.className = 'modal-overlay';
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div class="page-title-sm mb-2">New Branch</div>' +
                '<div class="form-group"><label>Branch Name</label><input type="text" id="nb-name" placeholder="e.g. Edmonton Branch"></div>' +
                '<div class="form-group"><label>Street Address</label><input type="text" id="nb-street" placeholder="123 Main St"></div>' +
                '<div class="form-row">' +
                    '<div class="form-group"><label>City</label><input type="text" id="nb-city" placeholder="Calgary"></div>' +
                    '<div class="form-group"><label>Province / State</label><input type="text" id="nb-state" placeholder="AB"></div>' +
                '</div>' +
                '<button class="btn btn-primary mt-2" onclick="saveNewBranch()">Add Branch</button>' +
                '<button class="btn btn-secondary" onclick="document.getElementById(\'branch-panel\').remove()">Cancel</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
        document.getElementById('phone').appendChild(modal);
    };

    window.saveNewBranch = function () {
        var name = (document.getElementById('nb-name').value || '').trim();
        if (!name) { alert('Enter a branch name.'); return; }
        var address = DB.insert('addresses', {
            company_id: state.currentCompanyId,
            street: (document.getElementById('nb-street').value || '').trim(),
            city: (document.getElementById('nb-city').value || '').trim(),
            state: (document.getElementById('nb-state').value || '').trim(),
            zip: '', lat: null, lng: null,
        });
        var isFirst = DB.find('branches', function (b) { return b.company_id === state.currentCompanyId && !b.deleted_at; }).length === 0;
        DB.insert('branches', {
            company_id: state.currentCompanyId,
            name: name,
            address_id: address.id,
            manager_id: state.currentUserId,
            is_primary: isFirst,
        });
        document.getElementById('branch-panel').remove();
        renderBranches();
    };

    window.removeBranch = function (branchId) {
        var branch = DB.getById('branches', branchId);
        if (!branch || branch.is_primary) return;
        var memberCount = DB.find('users', function (u) { return u.branch_id === branchId && !u.deleted_at; }).length;
        var msg = 'Remove ' + branch.name + '?' + (memberCount ? ' ' + memberCount + ' team member' + (memberCount === 1 ? '' : 's') + ' will be unassigned.' : '');
        if (!confirm(msg)) return;
        DB.softDelete('branches', branchId);
        DB.find('users', function (u) { return u.branch_id === branchId; }).forEach(function (u) {
            DB.update('users', u.id, { branch_id: null });
        });
        renderBranches();
    };
})();
</script>
