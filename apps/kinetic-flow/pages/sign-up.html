<div class="page-title-sm mb-2">Request an Account</div>

<div class="form-row">
    <div class="form-group">
        <label>First Name</label>
        <input type="text" id="signup-first" placeholder="John">
    </div>
    <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="signup-last" placeholder="Doe">
    </div>
</div>

<div class="form-group">
    <label>Email Address</label>
    <input type="email" id="signup-email" placeholder="you@example.com">
</div>

<div class="form-group">
    <label>Phone Number</label>
    <input type="tel" id="signup-phone" placeholder="(555) 000-0000">
</div>

<div class="form-group">
    <label>Requested Position</label>
    <!-- Options are the company's real positions, filled by showSignUp()
         (this fragment's scripts never execute — it's injected via innerHTML). -->
    <select id="signup-role">
        <option value="">Select a position...</option>
    </select>
</div>

<div class="form-group">
    <label>Notes / Why you need access</label>
    <textarea id="signup-notes" placeholder="Briefly describe your role..."></textarea>
</div>

<div class="alert">
    An admin will review your request and can adjust the position you're given. You'll receive an email once approved.
</div>

<button class="btn btn-primary" onclick="submitAccount()">Submit Request</button>
<button class="btn btn-secondary" onclick="closeSignUp()">Cancel</button>
