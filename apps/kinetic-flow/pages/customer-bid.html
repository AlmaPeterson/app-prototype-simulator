<div class="page" style="padding-bottom:80px;">
    <div class="page-title">Bid Proposal</div>
    <div class="page-subtitle mb-4" id="cb-subtitle">&nbsp;</div>

    <div class="flex-between mb-4">
        <span class="badge badge-gray" id="cb-status">&nbsp;</span>
        <span style="font-size:0.75rem; color:#94a3b8;" id="cb-signed-date"></span>
    </div>

    <div style="border:1px solid #e2e8f0; padding:12px; margin-bottom:16px; font-size:0.82rem;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px 16px;">
            <div><span style="color:#64748b; font-size:0.72rem; display:block;">SENT</span><strong id="cb-sent-date">&nbsp;</strong></div>
            <div><span style="color:#64748b; font-size:0.72rem; display:block;">CUSTOMER</span><strong id="cb-customer">&nbsp;</strong></div>
            <div><span style="color:#64748b; font-size:0.72rem; display:block;">LEAD CRAFTSMAN</span><strong id="cb-lead">&nbsp;</strong></div>
            <div><span style="color:#64748b; font-size:0.72rem; display:block;">SITE ADDRESS</span><strong id="cb-address">&nbsp;</strong></div>
        </div>
    </div>

    <div class="section-header">
        <span class="section-title">Included Divisions</span>
    </div>
    <div id="cb-divisions" style="border:1px solid #e2e8f0; padding:0 14px; margin-bottom:8px;"></div>

    <div style="display:flex; justify-content:space-between; align-items:center; border-top:2px solid #0f172a; padding:8px 0; margin-bottom:16px;">
        <strong>Grand Total</strong>
        <strong style="font-size:1.1rem; color:#0f172a;" id="cb-total">$0.00</strong>
    </div>

    <div class="section-header">
        <span class="section-title">Schedule of Payments</span>
    </div>
    <div id="cb-payments" style="border:1px solid #e2e8f0; padding:0 14px; margin-bottom:16px;"></div>
</div>

<script>
(function () {
    function fmt(n) { return '$' + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function fmtDate(iso) { return iso ? new Date(iso).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : 'TBD'; }

    // See CUSTOMER_DEMO_JOB_ID in app.js — all three customer pages anchor to
    // the same seeded job so this bid matches customer-home/customer-invoice.
    var job = DB.getById('jobs', CUSTOMER_DEMO_JOB_ID);
    var bid = job && job.bid_id ? DB.getById('bids', job.bid_id) : null;
    var customer = job ? DB.getById('customers', job.customer_id) : null;
    var address = job && job.address_id ? DB.getById('addresses', job.address_id) : null;
    var lead = job && job.lead_id ? DB.getById('users', job.lead_id) : null;

    document.getElementById('cb-subtitle').textContent = job ? job.name + (bid ? ' • Bid #' + bid.id.slice(0, 8) : '') : 'No job found';

    if (!bid) {
        document.getElementById('cb-status').textContent = 'No bid yet';
        return;
    }

    document.getElementById('cb-status').textContent = bid.status === 'signed' ? 'Accepted'
        : bid.status === 'sent' ? 'Awaiting Signature' : 'Draft';
    document.getElementById('cb-signed-date').textContent = bid.signed_at ? 'Signed ' + fmtDate(bid.signed_at) : '';
    document.getElementById('cb-sent-date').textContent = fmtDate(bid.sent_at);
    document.getElementById('cb-customer').textContent = customer ? customer.full_name : 'Unknown';
    document.getElementById('cb-lead').textContent = lead ? lead.full_name : 'Unassigned';
    document.getElementById('cb-address').textContent = address ? address.street : 'Unknown';

    var divisions = DB.find('bid_divisions', function (d) { return d.bid_id === bid.id && !d.deleted_at; });
    document.getElementById('cb-divisions').innerHTML = divisions.map(function (d, i) {
        var isLast = i === divisions.length - 1;
        var lineTotal = (d.labor_cost || 0) + (d.material_cost || 0);
        return '<div class="list-item"' + (isLast ? ' style="border-bottom:none;"' : '') + '>' +
            '<div class="list-item-body">' +
                '<div class="list-item-title">Div ' + d.division_number + ' &mdash; ' + d.division_name + '</div>' +
            '</div>' +
            '<div class="list-item-right"><div class="list-item-value">' + fmt(lineTotal) + '</div></div>' +
        '</div>';
    }).join('') || '<div class="list-item" style="border-bottom:none;"><div class="list-item-body" style="color:#94a3b8;">No divisions on this bid.</div></div>';

    document.getElementById('cb-total').textContent = fmt(bid.total_cost);

    var sched = computeSyntheticPaymentSchedule(bid.total_cost);
    var isSigned = bid.status === 'signed';
    var rows = [
        { label: 'Deposit — 50%', amount: sched.deposit, detail: isSigned ? 'Paid' : 'Due on signing' },
        { label: 'Progress Draw 1 — 20%', amount: sched.draw1, detail: isSigned ? 'Paid' : 'Due at rough-in' },
        { label: 'Progress Draw 2 — 20%', amount: sched.draw2, detail: isSigned ? 'Due at rough-in' : 'Not yet issued' },
        { label: 'Final Balance — 10%', amount: sched.final, detail: 'Due at completion' },
    ];
    document.getElementById('cb-payments').innerHTML = rows.map(function (r, i) {
        var isLast = i === rows.length - 1;
        return '<div class="list-item"' + (isLast ? ' style="border-bottom:none;"' : '') + '>' +
            '<div class="list-item-body"><div class="list-item-title">' + r.label + '</div></div>' +
            '<div class="list-item-right"><div class="list-item-value">' + fmt(r.amount) + '</div><div class="list-item-detail">' + r.detail + '</div></div>' +
        '</div>';
    }).join('');
})();
</script>
