<div class="page" style="padding-bottom:80px;">
    <div class="page-title">Home Details</div>
    <div class="page-subtitle mb-4" id="ch-subtitle">&nbsp;</div>

    <div class="section-header">
        <span class="section-title">Floor Plan</span>
    </div>
    <div id="ch-floorplan" style="border:1px solid #e2e8f0; padding:24px; margin-bottom:16px; text-align:center; color:#94a3b8; font-size:0.82rem;"></div>

    <div class="section-header">
        <span class="section-title">Paint by Room</span>
    </div>
    <div id="ch-paint" style="border:1px solid #e2e8f0; padding:0 14px; margin-bottom:16px;"></div>

    <div class="section-header">
        <span class="section-title">Materials Used</span>
    </div>
    <div id="ch-materials" style="border:1px solid #e2e8f0; padding:0 14px; margin-bottom:16px;"></div>
</div>

<script>
(function () {
    function titleCase(key) {
        return key.replace(/_/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
    }

    function renderKeyValueList(containerId, obj, emptyMessage) {
        var keys = Object.keys(obj || {});
        document.getElementById(containerId).innerHTML = keys.map(function (key, i) {
            var isLast = i === keys.length - 1;
            return '<div class="list-item"' + (isLast ? ' style="border-bottom:none;"' : '') + '>' +
                '<div class="list-item-body"><div class="list-item-title">' + titleCase(key) + '</div></div>' +
                '<div class="list-item-right"><div class="list-item-value">' + obj[key] + '</div></div>' +
            '</div>';
        }).join('') || '<div class="list-item" style="border-bottom:none;"><div class="list-item-body" style="color:#94a3b8;">' + emptyMessage + '</div></div>';
    }

    // Customers have no session — see CUSTOMER_DEMO_JOB_ID in app.js for why
    // this and customer-bid.html/customer-invoice.html all anchor to the same
    // seeded job (simulating an already-opened tokenized property link).
    var job = DB.getById('jobs', CUSTOMER_DEMO_JOB_ID);
    var customer = job ? DB.getById('customers', job.customer_id) : null;
    var address = job && job.address_id ? DB.getById('addresses', job.address_id) : null;
    var property = DB.findOne('property_records', function (p) { return p.job_id === CUSTOMER_DEMO_JOB_ID; });

    document.getElementById('ch-subtitle').textContent =
        (address ? address.street : '') + (customer ? ' • ' + customer.full_name : '');

    document.getElementById('ch-floorplan').textContent = property && property.floor_plan_url
        ? 'Floor plan on file — ' + property.floor_plan_url
        : 'No floor plan on file yet.';

    renderKeyValueList('ch-paint', property ? property.paint_colors : {}, 'No paint selections recorded yet.');
    renderKeyValueList('ch-materials', property ? property.materials_used : {}, 'No materials recorded yet.');
})();
</script>
