<div class="page">
    <button class="btn btn-secondary btn-sm mb-4" onclick="if(!goBack())loadPage('manage-users')">&larr; Branches</button>

    <div class="page-header">
        <div class="flex-between mb-1">
            <div class="page-title" id="branch-name" style="margin:0;">Branch</div>
            <span class="badge badge-gray" id="branch-primary-badge" style="display:none;">Primary</span>
        </div>
        <div class="page-subtitle" id="branch-address">&nbsp;</div>
    </div>

    <div class="card" style="cursor:default; margin-bottom:16px;">
        <div class="list-item" style="padding:8px 0;">
            <div class="list-item-body"><div class="list-item-title">Branch Manager</div></div>
            <div class="list-item-right"><div class="list-item-value" id="branch-manager"></div></div>
        </div>
        <div class="list-item" style="padding:8px 0;">
            <div class="list-item-body"><div class="list-item-title">Phone</div></div>
            <div class="list-item-right"><div class="list-item-value" id="branch-phone"></div></div>
        </div>
        <div class="list-item" style="padding:8px 0; border-bottom:none;">
            <div class="list-item-body"><div class="list-item-title">Active Jobs</div></div>
            <div class="list-item-right"><div class="list-item-value" id="branch-jobs"></div></div>
        </div>
    </div>

    <!-- Members -->
    <div class="section-header">
        <span class="section-title">Branch Members</span>
        <span class="section-action" id="branch-member-count" style="cursor:default;"></span>
    </div>

    <div class="form-group" style="margin-bottom:8px;">
        <div class="account-search">
            <input type="text" id="bd-member-search" placeholder="Search company users to add..." autocomplete="off"
                onfocus="filterBranchUsers()" oninput="filterBranchUsers()" onblur="hideBranchUserSearch()">
            <div class="account-search-list" id="bd-search-results"></div>
        </div>
    </div>

    <div class="card" id="bd-member-list" style="cursor:default; margin-bottom:16px;"></div>

    <div class="section-header">
        <span class="section-title">Branch Actions</span>
    </div>

    <button class="btn btn-primary" onclick="editBranch()">Edit Branch</button>
    <button class="btn btn-secondary" onclick="loadPage('jobs')">View Jobs at This Branch</button>
    <button class="btn btn-secondary" onclick="loadPage('finance')">View Finance for This Branch</button>
</div>

<script>
(function () {
    var branch = state.currentBranchId ? DB.getById('branches', state.currentBranchId) : null;
    if (!branch) {
        document.getElementById('branch-name').textContent = 'No Branch Selected';
        return;
    }

    function renderHeader() {
        var addr = branch.address_id ? DB.getById('addresses', branch.address_id) : null;
        var manager = branch.manager_id ? DB.getById('users', branch.manager_id) : null;
        var activeJobs = DB.find('jobs', function (j) { return j.branch_id === branch.id && !j.deleted_at; }).length;
        document.getElementById('branch-name').textContent = branch.name;
        document.getElementById('branch-address').textContent = addr ? (addr.street + ', ' + addr.city + ', ' + addr.state) : '';
        document.getElementById('branch-manager').textContent = manager ? manager.full_name : 'Unassigned';
        document.getElementById('branch-phone').textContent = manager ? (manager.phone || '') : '';
        document.getElementById('branch-jobs').textContent = activeJobs;
        document.getElementById('branch-primary-badge').style.display = branch.is_primary ? 'inline-block' : 'none';
    }

    function members() {
        return DB.find('users', function (u) { return u.branch_id === branch.id && !u.deleted_at; });
    }

    function renderMembers() {
        var rows = members();
        document.getElementById('branch-member-count').textContent = rows.length + ' member' + (rows.length === 1 ? '' : 's');
        document.getElementById('bd-member-list').innerHTML = rows.map(function (u, i) {
            return '<div class="list-item" style="padding:8px 0;' + (i === rows.length - 1 ? ' border-bottom:none;' : '') + '">' +
                '<div class="list-item-body">' +
                    '<div class="list-item-title">' + u.full_name + '</div>' +
                    '<div class="list-item-sub">' + (u.global_level || '') + '</div>' +
                '</div>' +
                '<button class="text-link" style="font-size:0.75rem;" onclick="removeBranchMember(\'' + u.id + '\')">Remove</button>' +
            '</div>';
        }).join('') || '<div class="page-subtitle" style="font-size:0.78rem; padding:8px 0;">No members assigned to this branch.</div>';
    }

    renderHeader();
    renderMembers();

    // Same focus-opens / type-to-filter / mousedown-to-pick dropdown as the
    // sign-in email account picker (reuses its .account-search styles).
    window.filterBranchUsers = function () {
        var q = (document.getElementById('bd-member-search').value || '').trim().toLowerCase();
        var list = document.getElementById('bd-search-results');
        var candidates = companyMemberUsers(branch.company_id).filter(function (u) {
            if (u.branch_id === branch.id) return false;
            return !q || u.full_name.toLowerCase().indexOf(q) !== -1
                || (u.email || '').toLowerCase().indexOf(q) !== -1;
        });
        list.innerHTML = candidates.length ? candidates.map(function (u) {
            return '<div class="account-search-item" onmousedown="addBranchMember(\'' + u.id + '\')">' +
                '<div class="account-search-name">' + u.full_name + '<span class="account-search-position">+ Add</span></div>' +
                '<div class="account-search-email">' + (u.email || '') + '</div>' +
            '</div>';
        }).join('') : '<div class="account-search-empty">No matching users</div>';
        list.classList.add('open');
    };

    window.hideBranchUserSearch = function () {
        // Delay so an item's onmousedown selection lands before the list closes.
        setTimeout(function () {
            var list = document.getElementById('bd-search-results');
            if (list) list.classList.remove('open');
        }, 150);
    };

    window.addBranchMember = function (userId) {
        DB.update('users', userId, { branch_id: branch.id });
        document.getElementById('bd-member-search').value = '';
        var list = document.getElementById('bd-search-results');
        list.innerHTML = '';
        list.classList.remove('open');
        renderMembers();
    };

    window.removeBranchMember = function (userId) {
        DB.update('users', userId, { branch_id: null });
        renderMembers();
    };

    window.editBranch = function () {
        var existing = document.getElementById('branch-edit-panel');
        if (existing) existing.remove();
        var addr = branch.address_id ? DB.getById('addresses', branch.address_id) : null;
        var companyUsers = companyMemberUsers(branch.company_id);
        var modal = document.createElement('div');
        modal.id = 'branch-edit-panel';
        modal.className = 'modal-overlay';
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div class="page-title-sm mb-2">Edit Branch</div>' +
                '<div class="form-group"><label>Branch Name</label><input type="text" id="eb-name" value="' + branch.name + '"></div>' +
                '<div class="form-group"><label>Street Address</label><input type="text" id="eb-street" value="' + (addr ? addr.street : '') + '"></div>' +
                '<div class="form-row">' +
                    '<div class="form-group"><label>City</label><input type="text" id="eb-city" value="' + (addr ? addr.city : '') + '"></div>' +
                    '<div class="form-group"><label>Province / State</label><input type="text" id="eb-state" value="' + (addr ? addr.state : '') + '"></div>' +
                '</div>' +
                '<div class="form-group"><label>Branch Manager</label>' +
                    '<select id="eb-manager">' +
                        '<option value="">Unassigned</option>' +
                        companyUsers.map(function (u) {
                            return '<option value="' + u.id + '"' + (u.id === branch.manager_id ? ' selected' : '') + '>' + u.full_name + '</option>';
                        }).join('') +
                    '</select>' +
                '</div>' +
                '<button class="btn btn-primary mt-2" onclick="saveBranchEdit()">Save Branch</button>' +
                '<button class="btn btn-secondary" onclick="document.getElementById(\'branch-edit-panel\').remove()">Cancel</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
        document.getElementById('phone').appendChild(modal);
    };

    window.saveBranchEdit = function () {
        var name = (document.getElementById('eb-name').value || '').trim();
        if (!name) { alert('Enter a branch name.'); return; }
        DB.update('branches', branch.id, {
            name: name,
            manager_id: document.getElementById('eb-manager').value || null,
        });
        var addrPatch = {
            street: (document.getElementById('eb-street').value || '').trim(),
            city: (document.getElementById('eb-city').value || '').trim(),
            state: (document.getElementById('eb-state').value || '').trim(),
        };
        if (branch.address_id) {
            DB.update('addresses', branch.address_id, addrPatch);
        } else {
            var address = DB.insert('addresses', Object.assign({ company_id: branch.company_id, zip: '', lat: null, lng: null }, addrPatch));
            DB.update('branches', branch.id, { address_id: address.id });
        }
        document.getElementById('branch-edit-panel').remove();
        renderHeader();
    };
})();
</script>
