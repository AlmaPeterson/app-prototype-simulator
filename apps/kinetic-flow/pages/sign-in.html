<div class="page" style="justify-content: center; padding-top: 30px;">
    <div class="text-center mb-6">
        <div class="page-title">Kinetic Flow</div>
        <div class="page-subtitle">Sign in to your account</div>
    </div>

    <div class="form-group">
        <label>Email</label>
        <div class="account-search">
            <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="off"
                onfocus="showAccountSearch()" oninput="filterAccountSearch()" onblur="hideAccountSearch()">
            <div class="account-search-list" id="account-search-list"></div>
        </div>
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
    </div>

    <div class="flex-between mb-4">
        <span></span>
        <button class="text-link">Forgot password?</button>
    </div>

    <button class="btn btn-primary" onclick="signIn()">Sign In</button>

    <div class="divider">or</div>

    <button class="btn btn-google" onclick="signIn()">
        <span style="font-size:1.1rem">G</span> Continue with Google
    </button>

    <div class="text-center mt-4">
        <span style="font-size:0.83rem; color:#64748b;">Don't have an account? </span>
        <button class="text-link" onclick="showSignUp()">Request Access</button>
    </div>
</div>
