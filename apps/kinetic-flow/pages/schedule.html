<div class="page" style="padding-bottom:80px;">
    <div class="flex-between mb-4">
        <div>
            <div class="page-title">Schedule</div>
            <div class="page-subtitle" id="schedule-week-label">Week of Jun 29, 2026</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="showCreateSchedule()">+ Add</button>
    </div>

    <!-- Week nav -->
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
        <button class="btn btn-secondary btn-sm" style="width:auto; padding:6px 12px;">&larr;</button>
        <div style="display:flex; gap:6px;">
            <div id="day-sun" class="chip" onclick="selectDay('sun')">Sun</div>
            <div id="day-mon" class="chip" onclick="selectDay('mon')">Mon</div>
            <div id="day-tue" class="chip" onclick="selectDay('tue')">Tue</div>
            <div id="day-wed" class="chip selected" onclick="selectDay('wed')">Wed</div>
            <div id="day-thu" class="chip" onclick="selectDay('thu')">Thu</div>
            <div id="day-fri" class="chip" onclick="selectDay('fri')">Fri</div>
            <div id="day-sat" class="chip" onclick="selectDay('sat')">Sat</div>
        </div>
        <button class="btn btn-secondary btn-sm" style="width:auto; padding:6px 12px;">&rarr;</button>
    </div>

    <div class="schedule-day">
        <div class="schedule-day-label" id="schedule-day-label">Wednesday, Jul 1</div>
        <div id="schedule-day-list"></div>
    </div>
</div>

<script>
(function () {
    // Week anchored on the Sunday before the seeded schedule_events cluster
    // (Jun 24 – Jul 8, 2026) so the day chips land on real data instead of
    // needing a "today" concept the seed data doesn't consistently support.
    var WEEK_START = new Date('2026-06-29T00:00:00');
    var DAYS = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
    var DAY_LABELS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

    function dateForDay(day) {
        var d = new Date(WEEK_START);
        d.setDate(d.getDate() + DAYS.indexOf(day));
        return d;
    }
    function isoDateOnly(d) { return d.toISOString().slice(0, 10); }
    function fmtShort(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }

    function fmtRange(e) {
        if (e.start_date === e.end_date) return fmtShort(new Date(e.start_date + 'T00:00:00'));
        return fmtShort(new Date(e.start_date + 'T00:00:00')) + ' – ' + fmtShort(new Date(e.end_date + 'T00:00:00'));
    }

    function renderDay(day) {
        var d = dateForDay(day);
        var iso = isoDateOnly(d);
        document.getElementById('schedule-day-label').textContent = DAY_LABELS[DAYS.indexOf(day)] + ', ' + fmtShort(d);
        document.getElementById('schedule-week-label').textContent = 'Week of ' + fmtShort(WEEK_START) + ', ' + WEEK_START.getFullYear();

        // Worker/supplier roles see crew-facing events; the customer role
        // (which also has a Schedule tab, see customerNav in app.js) sees the
        // customer-facing subset instead.
        var viewType = state.role === 'customer' ? 'customer' : 'worker';

        var events = DB.find('schedule_events', function (e) {
            return e.company_id === state.currentCompanyId
                && e.view_type === viewType
                && e.start_date <= iso && e.end_date >= iso;
        });

        document.getElementById('schedule-day-list').innerHTML = events.map(function (e) {
            var job = e.job_id ? DB.getById('jobs', e.job_id) : null;
            var assignee = e.assigned_to ? DB.getById('users', e.assigned_to) : null;
            var clickAttr = job ? ' onclick="openJob(\'' + job.id + '\')"' : '';
            return '<div class="schedule-slot"' + clickAttr + '>' +
                '<div class="slot-title">' + e.title + '</div>' +
                '<div class="slot-time">' + fmtRange(e) + ' &bull; ' + (assignee ? assignee.full_name : 'Unassigned') + '</div>' +
            '</div>';
        }).join('') || '<div style="font-size:0.8rem; color:#94a3b8; padding:8px 0;">No jobs scheduled</div>';
    }

    window.selectDay = function (day) {
        document.querySelectorAll('[id^="day-"]').forEach(function (el) { el.classList.remove('selected'); });
        document.getElementById('day-' + day).classList.add('selected');
        renderDay(day);
    };

    window.showCreateSchedule = function () {
        alert('Create schedule entry — form would open here.');
    };

    renderDay('wed');
})();
</script>
