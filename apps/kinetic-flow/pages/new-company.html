<div class="page">
    <button class="btn btn-secondary btn-sm mb-4" onclick="loadPage('companies')">&larr; Back</button>

    <div class="page-header">
        <div class="page-title">Create a Company</div>
    </div>

    <div class="form-group">
        <label>Company Name</label>
        <input type="text" id="nc-name" placeholder="Acme Field Services Inc.">
    </div>

    <div class="form-group">
        <label>Industry</label>
        <select id="nc-industry">
            <option>Oil &amp; Gas</option>
            <option>Electrical</option>
            <option>Plumbing &amp; HVAC</option>
            <option>Construction</option>
            <option>Landscaping</option>
            <option>IT / Telecom</option>
            <option>Other</option>
        </select>
    </div>

    <div class="form-group">
        <label>Business Address</label>
        <input type="text" id="nc-street" placeholder="123 Main St, Calgary, AB">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>City</label>
            <input type="text" id="nc-city" placeholder="Calgary">
        </div>
        <div class="form-group">
            <label>Province / State</label>
            <input type="text" id="nc-state" placeholder="AB">
        </div>
    </div>

    <div class="form-group">
        <label>Company Size</label>
        <select id="nc-size">
            <option>1&ndash;5 employees</option>
            <option>6&ndash;20 employees</option>
            <option>21&ndash;50 employees</option>
            <option>51&ndash;200 employees</option>
            <option>200+ employees</option>
        </select>
    </div>

    <div class="form-group">
        <label>Business Phone</label>
        <input type="tel" id="nc-phone" placeholder="(555) 000-0000">
    </div>

    <div class="form-group">
        <label>Website (optional)</label>
        <input type="url" id="nc-website" placeholder="www.yourcompany.com">
    </div>

    <button class="btn btn-primary" onclick="submitNewCompany()">Create Company &rarr;</button>
    <button class="btn btn-secondary" onclick="loadPage('companies')">Cancel</button>
</div>
