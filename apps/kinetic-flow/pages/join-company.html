<div class="page">
    <button class="btn btn-secondary btn-sm mb-4" onclick="loadPage('companies')">&larr; Back</button>

    <div class="page-header">
        <div class="page-title">Join a Company</div>
    </div>

    <div class="form-group">
        <label>Company</label>
        <div class="account-search">
            <input type="text" id="jc-search" placeholder="Search companies..." autocomplete="off"
                onfocus="jcShowSearch()" oninput="jcFilterSearch()" onblur="jcHideSearch()">
            <div class="account-search-list" id="jc-search-list"></div>
        </div>
    </div>

    <div class="form-group mt-4">
        <label>Your Role / Position</label>
        <select id="jc-role"></select>
    </div>

    <div class="form-group">
        <label>Message to Admin (optional)</label>
        <textarea id="jc-message" placeholder="Hi, I'm a new hire starting Monday..."></textarea>
    </div>

    <button class="btn btn-primary" onclick="submitJoinRequest()">Send Join Request</button>
    <button class="btn btn-secondary" onclick="loadPage('companies')">Cancel</button>
</div>

<script>
(function () {
    var selectedCompanyId = null;

    function memberCount(companyId) {
        return companyMemberUsers(companyId).length;
    }

    // The role dropdown mirrors the *selected* company's real roles rows —
    // submitJoinRequest() persists the chosen role id on the pending
    // user_roles row so accepting the request needs no extra role choice.
    function renderRoles() {
        var sel = document.getElementById('jc-role');
        if (!selectedCompanyId) {
            sel.innerHTML = '<option value="">Select a company first</option>';
            return;
        }
        var roles = DB.find('roles', function (r) { return r.company_id === selectedCompanyId && !r.deleted_at; });
        sel.innerHTML = roles.map(function (r) {
            return '<option value="' + r.id + '">' + r.name.replace(/\b[a-z]/g, function (c) { return c.toUpperCase(); }) + '</option>';
        }).join('') || '<option value="">No positions defined</option>';
    }

    // Same focus-opens / type-to-filter / mousedown-to-pick dropdown as the
    // sign-in email account picker (reuses its .account-search styles).
    window.jcShowSearch = function () { window.jcFilterSearch(); };

    window.jcHideSearch = function () {
        // Delay so an item's onmousedown selection lands before the list closes.
        setTimeout(function () {
            var list = document.getElementById('jc-search-list');
            if (list) list.classList.remove('open');
        }, 150);
    };

    window.jcFilterSearch = function () {
        var input = document.getElementById('jc-search');
        var list = document.getElementById('jc-search-list');
        if (!input || !list) return;
        var q = input.value.trim().toLowerCase();
        // Typing something other than the picked company's name clears the pick.
        if (selectedCompanyId) {
            var sel = DB.getById('companies', selectedCompanyId);
            if (!sel || sel.name.toLowerCase() !== input.value.trim().toLowerCase()) {
                selectedCompanyId = null;
                renderRoles();
            }
        }
        var matches = DB.find('companies', function (c) {
            if (c.deleted_at) return false;
            return !q || c.name.toLowerCase().indexOf(q) !== -1;
        });
        list.innerHTML = matches.length ? matches.map(function (c) {
            var count = memberCount(c.id);
            return '<div class="account-search-item" onmousedown="jcPickCompany(\'' + c.id + '\')">' +
                '<div class="account-search-name">' + c.name + '</div>' +
                '<div class="account-search-email">' + count + ' member' + (count === 1 ? '' : 's') + '</div>' +
            '</div>';
        }).join('') : '<div class="account-search-empty">No matching companies</div>';
        list.classList.add('open');
    };

    window.jcPickCompany = function (companyId) {
        selectedCompanyId = companyId;
        var company = DB.getById('companies', companyId);
        var input = document.getElementById('jc-search');
        if (input && company) input.value = company.name;
        var list = document.getElementById('jc-search-list');
        if (list) list.classList.remove('open');
        renderRoles();
    };

    // submitJoinRequest() (app.js) reads the pick through this hook.
    window.jcSelectedCompanyId = function () { return selectedCompanyId; };

    renderRoles();
})();
</script>
