<div class="page" style="padding-bottom:80px;">
    <button class="btn btn-secondary btn-sm mb-4" onclick="manageCompany(state.currentCompanyId)">&larr; Company Setup</button>

    <div class="page-header">
        <div class="page-title">Guild Levels</div>
        <div class="page-subtitle">Career ranks workers climb (Entered Apprentice &rarr; Fellow Craft &rarr; Master). Auto-promotion checks the criteria below; manual requires an admin to promote.</div>
    </div>

    <div id="level-list"></div>

    <div class="form-group" style="margin-top:12px;">
        <label>New Level Name</label>
        <input type="text" id="new-level-name" placeholder="e.g. Grand Master">
    </div>
    <button class="btn btn-secondary" onclick="window.addCompanyLevel()">+ Add Level</button>
</div>

<script>
(function () {
    var LEVELS = window.LEVELS;

    function escapeAttr(s) {
        return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    }

    function slugify(name) {
        var base = name.toLowerCase().trim().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'level';
        var slug = base, n = 2;
        while (LEVELS.some(function (l) { return l.slug === slug; })) { slug = base + '_' + n++; }
        return slug;
    }

    function render() {
        var html = '';
        LEVELS.forEach(function (lvl, i) {
            var isAuto = lvl.promotionType === 'auto';
            html += '<div class="card" style="cursor:default; padding:10px 12px; margin-bottom:8px;">';

            html += '<div style="display:flex; align-items:center; gap:10px;">';
            html += '<div style="display:flex; flex-direction:column; gap:1px;">';
            html += '<button class="text-link" style="font-size:0.65rem; line-height:1; padding:0;"' + (i === 0 ? ' disabled' : '') + ' onclick="window.moveCompanyLevel(' + i + ', -1)">&#9650;</button>';
            html += '<button class="text-link" style="font-size:0.65rem; line-height:1; padding:0;"' + (i === LEVELS.length - 1 ? ' disabled' : '') + ' onclick="window.moveCompanyLevel(' + i + ', 1)">&#9660;</button>';
            html += '</div>';
            html += '<span style="color:#94a3b8; font-size:0.75rem; min-width:18px;">' + (i + 1) + '</span>';
            html += '<div style="flex:1;">';
            html += '<input type="text" value="' + escapeAttr(lvl.name) + '" style="width:100%; border:none; background:transparent; font-weight:600; font-size:0.85rem; padding:2px 0;" onchange="window.renameCompanyLevel(' + i + ', this.value)">';
            html += '<div class="card-subtitle" style="margin:0;">slug: ' + lvl.slug + '</div>';
            html += '</div>';
            html += '<button class="text-link" style="color:#dc2626; font-size:0.75rem; white-space:nowrap;" onclick="window.removeCompanyLevel(' + i + ')">Remove</button>';
            html += '</div>';

            html += '<div style="display:flex; align-items:center; gap:8px; margin-top:8px; padding-left:26px;">';
            html += '<span style="font-size:0.75rem; color:#64748b;">Promotion:</span>';
            html += '<span class="chip' + (!isAuto ? ' selected' : '') + '" onclick="window.setCompanyLevelPromotionType(' + i + ', \'manual\')">Manual</span>';
            html += '<span class="chip' + (isAuto ? ' selected' : '') + '" onclick="window.setCompanyLevelPromotionType(' + i + ', \'auto\')">Auto</span>';
            html += '</div>';

            if (isAuto) {
                var crit = lvl.criteria || {};
                html += '<div class="form-row" style="padding-left:26px; margin-top:8px;">';
                html += '<div class="form-group" style="margin:0; flex:1;"><label>Trailing Days</label>';
                html += '<input type="number" min="0" value="' + (crit.trailingDays != null ? crit.trailingDays : '') + '" onchange="window.updateCompanyLevelCriteria(' + i + ', \'trailingDays\', this.value)"></div>';
                html += '<div class="form-group" style="margin:0; flex:1;"><label>Scorecard %</label>';
                html += '<input type="number" min="0" max="100" value="' + (crit.scorecardPct != null ? crit.scorecardPct : '') + '" onchange="window.updateCompanyLevelCriteria(' + i + ', \'scorecardPct\', this.value)"></div>';
                html += '</div>';
            }

            html += '</div>';
        });
        document.getElementById('level-list').innerHTML = html;
    }

    window.addCompanyLevel = function () {
        var input = document.getElementById('new-level-name');
        var name = input.value.trim();
        if (!name) return;
        LEVELS.push({ slug: slugify(name), name: name, promotionType: 'manual', criteria: null });
        input.value = '';
        render();
    };
    window.removeCompanyLevel = function (i) {
        LEVELS.splice(i, 1);
        render();
    };
    window.moveCompanyLevel = function (i, dir) {
        var j = i + dir;
        if (j < 0 || j >= LEVELS.length) return;
        var tmp = LEVELS[i]; LEVELS[i] = LEVELS[j]; LEVELS[j] = tmp;
        render();
    };
    window.renameCompanyLevel = function (i, val) {
        val = val.trim();
        if (val) LEVELS[i].name = val;
        render();
    };
    window.setCompanyLevelPromotionType = function (i, type) {
        LEVELS[i].promotionType = type;
        if (type === 'auto' && !LEVELS[i].criteria) LEVELS[i].criteria = { trailingDays: 30, scorecardPct: 100 };
        if (type === 'manual') LEVELS[i].criteria = null;
        render();
    };
    window.updateCompanyLevelCriteria = function (i, field, val) {
        if (!LEVELS[i].criteria) LEVELS[i].criteria = {};
        LEVELS[i].criteria[field] = val === '' ? null : Number(val);
        render();
    };

    render();
})();
</script>
