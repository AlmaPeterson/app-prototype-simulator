<div class="page" style="padding-bottom:80px;">
    <button class="btn btn-secondary btn-sm mb-4" onclick="loadPage('manage-users')">&larr; Manage Users</button>

    <div class="page-header">
        <div class="page-title">Bid Divisions</div>
        <div class="page-subtitle">Divisions appear on every new bid in this order. Turn one off to hide it without losing history.</div>
    </div>

    <div id="division-list"></div>

    <div class="form-row" style="margin-top:12px;">
        <div class="form-group" style="margin:0; flex:1;">
            <input type="text" id="new-division-name" placeholder="New division name...">
        </div>
        <button class="btn btn-secondary" style="width:auto; margin:0;" onclick="window.addCompanyDivision()">+ Add</button>
    </div>
</div>

<script>
(function () {
    // Every action reads/writes the real `divisions` table via
    // companyDivisions() (app.js), so edits persist like everything else.
    function rows() { return companyDivisions(state.currentCompanyId); }

    function render() {
        var list = rows();
        var html = '';
        list.forEach(function (d, i) {
            html += '<div class="card" style="cursor:default; padding:8px 12px; margin-bottom:6px; display:flex; align-items:center; gap:10px;">';

            html += '<div style="display:flex; flex-direction:column; gap:1px;">';
            html += '<button class="text-link" style="font-size:0.65rem; line-height:1; padding:0;"' + (i === 0 ? ' disabled' : '') + ' onclick="window.moveCompanyDivision(\'' + jsArg(d.id) + '\', -1)">&#9650;</button>';
            html += '<button class="text-link" style="font-size:0.65rem; line-height:1; padding:0;"' + (i === list.length - 1 ? ' disabled' : '') + ' onclick="window.moveCompanyDivision(\'' + jsArg(d.id) + '\', 1)">&#9660;</button>';
            html += '</div>';

            html += '<span style="color:#94a3b8; font-size:0.75rem; min-width:18px;">' + (i + 1) + '</span>';
            html += '<input type="text" value="' + esc(d.name) + '" style="flex:1; border:none; background:transparent; font-weight:600; font-size:0.85rem; padding:4px 0;" onchange="window.renameCompanyDivision(\'' + jsArg(d.id) + '\', this.value)">';
            html += '<div class="toggle-switch' + (d.is_active ? ' on' : '') + '" onclick="window.toggleCompanyDivisionActive(\'' + jsArg(d.id) + '\')"><div class="toggle-switch-knob"></div></div>';
            html += '<button class="text-link" style="color:#dc2626; font-size:0.75rem; white-space:nowrap;" onclick="window.removeCompanyDivision(\'' + jsArg(d.id) + '\')">Remove</button>';

            html += '</div>';
        });
        document.getElementById('division-list').innerHTML = html;
    }

    window.addCompanyDivision = function () {
        var input = document.getElementById('new-division-name');
        var name = input.value.trim();
        if (!name) return;
        var maxOrder = rows().reduce(function (m, d) { return Math.max(m, d.sort_order || 0); }, -1);
        DB.insert('divisions', {
            company_id: state.currentCompanyId, division_number: null,
            name: name, sort_order: maxOrder + 1, is_active: true,
        });
        input.value = '';
        render();
    };
    window.removeCompanyDivision = function (id) {
        DB.softDelete('divisions', id);
        render();
    };
    window.toggleCompanyDivisionActive = function (id) {
        var d = DB.getById('divisions', id);
        if (d) DB.update('divisions', id, { is_active: !d.is_active });
        render();
    };
    window.moveCompanyDivision = function (id, dir) {
        var list = rows();
        var i = list.findIndex(function (d) { return d.id === id; });
        var j = i + dir;
        if (i < 0 || j < 0 || j >= list.length) return;
        // Swap the two rows' sort_order values (normalizing them to their
        // list positions first, in case of gaps or duplicates).
        DB.update('divisions', list[i].id, { sort_order: j });
        DB.update('divisions', list[j].id, { sort_order: i });
        render();
    };
    window.renameCompanyDivision = function (id, val) {
        val = val.trim();
        if (val) DB.update('divisions', id, { name: val });
        render();
    };

    render();
})();
</script>
