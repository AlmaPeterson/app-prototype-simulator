<div class="page">
    <button class="btn btn-secondary btn-sm mb-4" onclick="saveDivision()">&larr; Bid Creation</button>

    <div id="div-name-label" style="font-size:1.2rem; font-weight:800; color:#0f172a; margin-bottom:2px;"></div>
    <div id="div-num-label" style="font-size:0.78rem; color:#64748b; margin-bottom:12px;"></div>

    <!-- Stats row -->
    <div id="div-stats" style="font-size:0.85rem; color:#475569; border:1px solid #e2e8f0; border-radius:6px; padding:10px 12px; margin-bottom:16px; display:flex; flex-wrap:wrap; gap:12px;"></div>

    <!-- Settings -->
    <div class="card" style="cursor:default; padding:12px; margin-bottom:12px;">
        <div class="form-row">
            <div class="form-group" style="margin:0; flex:1;">
                <label>Labor Rate ($/hr)</label>
                <input type="number" id="labor-rate" min="1" step="1">
            </div>
            <div class="form-group" style="margin:0; flex:1;">
                <label>Guys on Site</label>
                <input type="number" id="guys-count" min="1" step="1">
            </div>
        </div>
    </div>

    <!-- Division scope -->
    <div class="form-group" style="margin-bottom:16px;">
        <label>Division Scope <span style="font-weight:400; color:#94a3b8;">(shown on proposal)</span></label>
        <textarea id="div-scope" rows="2" placeholder="Brief description shown on the bid proposal..."></textarea>
    </div>

    <!-- Kits & carts required -->
    <div class="section-header">
        <span class="section-title">Kits &amp; Carts Required</span>
    </div>
    <p style="font-size:0.78rem; color:#64748b; margin:0 0 8px 0;">Shown to the crew on Job Home so they know what to grab before heading out.</p>
    <input class="search-bar mb-2" type="text" id="div-kit-search" placeholder="Search kits &amp; carts..." oninput="window.filterDivKits(this.value)">
    <div id="div-kit-chips" style="margin-bottom:16px;"></div>

    <!-- Tasks -->
    <div class="section-header">
        <span class="section-title">Tasks</span>
        <button class="section-action" onclick="window.addTask()">+ Add Task</button>
    </div>

    <div id="task-list"></div>

    <!-- Division total -->
    <div id="div-totals"></div>

    <button class="btn btn-primary" style="margin-top:8px;" onclick="saveDivision()">Save &amp; Return to Bid</button>
</div>

<script>
(function initDivisionPage() {

    // ── Load the real bid_divisions row, and rebuild the nested
    // task->materials working shape this page's UI edits, from the flatter
    // bid_line_items table. bid_line_items has no native task-grouping
    // column beyond description/quantity/unit/unit_cost/line_total/type/
    // sort_order, so this app's schema (see db/bid_line_items.json) adds a
    // handful of nullable columns to preserve the task shape losslessly:
    //   task_key       — groups one labor row + N material rows into a task
    //   task_category, task_scope, task_included, qty_type, task_qty,
    //   hrs_each       — the task's own fields, carried on its labor row
    //   supplier       — carried on material rows
    // Every task is stored as exactly one 'labor'-type row (representing the
    // task itself, even if its hours are 0) plus zero or more 'material'-type
    // rows sharing the same task_key — written by persistDivision() below.
    var divRow = DB.getById('bid_divisions', state.currentDivisionId);
    var bidId  = divRow.bid_id;

    var NAMES = companyDivisions(state.currentCompanyId)
        .filter(function (d) { return d.is_active; })
        .map(function (d) { return d.name; });
    var idx   = NAMES.indexOf(divRow.division_name);

    var formData = divRow.form_data || {};

    function buildTasksFromLineItems() {
        var items = DB.find('bid_line_items', function (li) {
            return li.bid_division_id === divRow.id && !li.deleted_at;
        }).slice().sort(function (a, b) { return (a.sort_order || 0) - (b.sort_order || 0); });

        var laborRate = formData.laborRate || 120;
        var groups = {};
        var order = [];

        items.forEach(function (li) {
            var key = li.task_key;
            if (key == null) {
                // Legacy/seeded rows predate this per-task grouping model —
                // real seed data (e.g. Riverside HVAC Retrofit's "Rough HVAC"
                // division) was written as flat labor/material lines with no
                // task concept.
                // Give every such row its own synthetic one-row task so
                // nothing is silently merged or dropped; the user can
                // reorganize into real multi-material tasks from here.
                key = '__legacy_' + li.id;
            }
            if (!groups[key]) { groups[key] = { labor: null, materials: [], legacyMaterial: null }; order.push(key); }
            if (li.type === 'labor') {
                groups[key].labor = li;
            } else if (li.task_key == null) {
                groups[key].legacyMaterial = li;
            } else {
                groups[key].materials.push(li);
            }
        });

        return order.map(function (key) {
            var g = groups[key];

            if (g.legacyMaterial) {
                var m = g.legacyMaterial;
                return {
                    category: '', name: m.description || '(legacy material)', included: true, scope: '',
                    qtyType: 'EA', qty: 0, hrsEach: 0,
                    materials: [{ item: m.description || '', supplier: m.supplier || '', price: m.unit_cost || 0, qty: m.quantity || 0 }],
                };
            }

            var labor = g.labor;
            var qtyType, qty, hrsEach;
            if (labor.hrs_each != null) {
                qtyType = labor.qty_type || 'C';
                qty = labor.task_qty != null ? labor.task_qty : (labor.quantity || 0);
                hrsEach = labor.hrs_each;
            } else {
                // Legacy labor row: real seed data carries its own per-line
                // $/hr rate (unit_cost), but this UI only has one shared
                // laborRate per division. Back out an hrsEach so
                // qty * hrsEach * laborRate reproduces this row's original
                // line_total exactly under the division's shared rate.
                qtyType = 'HR';
                qty = labor.quantity || 0;
                hrsEach = laborRate ? (labor.unit_cost || 0) / laborRate : 0;
            }

            return {
                category: labor.task_category || '',
                name: labor.description || '',
                included: labor.task_included !== false,
                scope: labor.task_scope || '',
                qtyType: qtyType, qty: qty, hrsEach: hrsEach,
                materials: g.materials.map(function (m) {
                    return { item: m.description || '', supplier: m.supplier || '', price: m.unit_cost || 0, qty: m.quantity || 0 };
                }),
            };
        });
    }

    // Page-local working copy — edited freely while this page is open (same
    // responsive-editing UX as before), committed to bid_line_items only on
    // Save (see window.saveDivision at the bottom).
    var div = {
        name: divRow.division_name,
        laborRate: formData.laborRate || 120,
        guys: formData.guys || 1,
        scope: formData.scope || '',
        tasks: buildTasksFromLineItems(),
        requiredKitIds: (divRow.required_kit_ids || []).slice(),
    };
    // Also reachable as window.divWorking: the task/material card markup
    // below is injected via innerHTML, so its inline oninput/onclick
    // attributes run in global scope and can't close over the local `div`
    // var the way the real closures (addTask, calcDiv, saveDivision, ...)
    // below do — they need a window-scoped handle onto the same object.
    window.divWorking = div;

    // Header
    document.getElementById('div-name-label').textContent = div.name;
    document.getElementById('div-num-label').textContent  = 'Division ' + (idx >= 0 ? idx + 1 : '?') + ' of ' + NAMES.length;

    // Populate settings
    var rateEl  = document.getElementById('labor-rate');
    var guysEl  = document.getElementById('guys-count');
    var scopeEl = document.getElementById('div-scope');
    rateEl.value  = div.laborRate;
    guysEl.value  = div.guys;
    scopeEl.value = div.scope;
    rateEl.addEventListener('input',  function() { div.laborRate = +this.value || 120; window.bidRecalcDiv(); });
    guysEl.addEventListener('input',  function() { div.guys      = +this.value || 1;   window.bidRecalcDiv(); });
    scopeEl.addEventListener('input', function() { div.scope = this.value; });

    // ── Helpers ───────────────────────────────────────────────────────────
    function fmt(n) {
        return '$' + n.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
    }
    function esc(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function calcTask(t) {
        // Hours round to the nearest quarter hour (15 min) — matches how
        // time is actually estimated/billed in the field.
        var hrs = Math.round((t.qty || 0) * (t.hrsEach || 0) * 4) / 4;
        var lc  = hrs * (div.laborRate || 120);
        var mc  = (t.materials || []).reduce(function(s, m) { return s + (m.price||0)*(m.qty||0); }, 0);
        return { hrs: hrs, lc: lc, mc: mc };
    }
    function calcDiv() {
        var labor = 0, mat = 0, hours = 0;
        (div.tasks || []).forEach(function(t) {
            if (!t.included) return;
            var c = calcTask(t);
            labor += c.lc; mat += c.mc; hours += c.hrs;
        });
        var conL = labor * 0.10, conM = mat * 0.10;
        var total = labor + mat + conL + conM;
        var days = Math.ceil(hours / (8 * (div.guys || 1))) || 0;
        return { labor:labor, mat:mat, hours:hours, days:days, conL:conL, conM:conM, total:total };
    }

    // ── Stats display ─────────────────────────────────────────────────────
    function updateStats() {
        var c = calcDiv();
        document.getElementById('div-stats').innerHTML =
            '<span>Total: <strong style="color:#0f172a;" id="stat-total">' + fmt(c.total) + '</strong></span>' +
            '<span>Labor: <strong id="stat-labor">' + fmt(c.labor) + '</strong></span>' +
            '<span>Materials: <strong id="stat-mat">' + fmt(c.mat) + '</strong></span>' +
            '<span>Hours: <strong id="stat-hours">' + c.hours.toFixed(2) + '</strong></span>' +
            '<span>Days: <strong id="stat-days">' + c.days + '</strong></span>';

        // Update per-task calc values in DOM
        (div.tasks || []).forEach(function(t, ti) {
            var tc = calcTask(t);
            var hrsEl   = document.querySelector('[data-task-hrs="'   + ti + '"]');
            var lcEl    = document.querySelector('[data-task-lc="'    + ti + '"]');
            var totEl   = document.querySelector('[data-task-total="' + ti + '"]');
            if (hrsEl) hrsEl.textContent = tc.hrs.toFixed(2);
            if (lcEl)  lcEl.textContent  = fmt(tc.lc);
            if (totEl) totEl.textContent = fmt(tc.lc + tc.mc);
            (t.materials || []).forEach(function(m, mi) {
                var mEl = document.querySelector('[data-mat-total="' + ti + '-' + mi + '"]');
                if (mEl) mEl.textContent = fmt((m.price||0)*(m.qty||0));
            });
        });

        renderTotals(c);
    }
    window.bidRecalcDiv = updateStats;

    // ── Division totals ───────────────────────────────────────────────────
    function renderTotals(c) {
        document.getElementById('div-totals').innerHTML =
            '<div style="border:1px solid #e2e8f0; border-radius:6px; padding:12px; margin:12px 0;">' +
            '<div style="display:flex; justify-content:space-between; padding:3px 0; font-size:0.85rem;"><span>Labor Subtotal</span><span>' + fmt(c.labor) + '</span></div>' +
            '<div style="display:flex; justify-content:space-between; padding:3px 0; font-size:0.85rem;"><span>Materials Subtotal</span><span>' + fmt(c.mat) + '</span></div>' +
            '<div style="display:flex; justify-content:space-between; padding:3px 0; font-size:0.85rem; color:#94a3b8;"><span>Contingency — Labor (10%)</span><span>' + fmt(c.conL) + '</span></div>' +
            '<div style="display:flex; justify-content:space-between; padding:3px 0 8px 0; font-size:0.85rem; color:#94a3b8; border-bottom:1px solid #e2e8f0;"><span>Contingency — Materials (10%)</span><span>' + fmt(c.conM) + '</span></div>' +
            '<div style="display:flex; justify-content:space-between; padding:8px 0 0 0;"><strong>Division Total</strong><strong style="color:#0f172a; font-size:1.05rem;">' + fmt(c.total) + '</strong></div>' +
            '</div>';
    }

    // ── Kits & carts required ───────────────────────────────────────────────
    // Grouped by category (same taxonomy kits.html's drawer uses) instead of
    // one long flat list — a division only ever needs a handful of a
    // company's 30+ kits/carts, and scanning past every trade's kits to find
    // the relevant few doesn't scale. No attempt to auto-filter by matching
    // division name to kit category: those are two independent free-text
    // taxonomies (see docs/kinetic-flow-materials-kit-unification-plan.md)
    // with no reliable mapping between them — a wrong guess that hides a
    // kit someone needs is worse than an extra tap to find it via search.
    var kitCategories = (function () {
        var kits = DB.find('inventory_kits', function (k) {
            return k.company_id === state.currentCompanyId && !k.deleted_at;
        }).slice().sort(function (a, b) { return a.name.localeCompare(b.name); });
        var byCat = {};
        var order = [];
        kits.forEach(function (k) {
            var cat = k.category || 'Uncategorized';
            if (!byCat[cat]) { byCat[cat] = []; order.push(cat); }
            byCat[cat].push(k);
        });
        order.sort();
        return order.map(function (name) { return { name: name, kits: byCat[name] }; });
    })();

    function renderKitChips(query) {
        var el = document.getElementById('div-kit-chips');
        if (kitCategories.length === 0) {
            el.innerHTML = '<p style="font-size:0.78rem; color:#94a3b8; margin:0;">No kits or carts set up yet.</p>';
            return;
        }
        var q = (query || '').trim().toLowerCase();
        var html = '';
        kitCategories.forEach(function (cat) {
            var kits = !q ? cat.kits : cat.kits.filter(function (k) {
                return k.name.toLowerCase().indexOf(q) !== -1 || cat.name.toLowerCase().indexOf(q) !== -1;
            });
            if (kits.length === 0) return;
            html += '<div style="font-size:0.72rem; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:0.03em; margin:10px 0 4px;">' + esc(cat.name) + '</div>';
            html += '<div style="display:flex; flex-wrap:wrap; gap:6px;">' + kits.map(function (k) {
                var selected = div.requiredKitIds.indexOf(k.id) !== -1;
                return '<div class="chip' + (selected ? ' selected' : '') + '" onclick="window.toggleRequiredKit(\'' + k.id + '\')">' +
                    esc(k.name) + (k.kind === 'cart' ? ' (Cart)' : '') + '</div>';
            }).join('') + '</div>';
        });
        el.innerHTML = html || '<p style="font-size:0.78rem; color:#94a3b8; margin:0;">No kits or carts match &quot;' + esc(query) + '&quot;.</p>';
    }

    window.filterDivKits = function (query) { renderKitChips(query); };

    window.toggleRequiredKit = function (kitId) {
        var i = div.requiredKitIds.indexOf(kitId);
        if (i === -1) div.requiredKitIds.push(kitId); else div.requiredKitIds.splice(i, 1);
        renderKitChips(document.getElementById('div-kit-search').value);
    };

    // ── Materials HTML for one task ───────────────────────────────────────
    function buildMatsHTML(t, ti) {
        var html = '';
        if (!t.materials || t.materials.length === 0) {
            return '<p style="font-size:0.78rem; color:#94a3b8; margin:4px 0;">No materials yet.</p>';
        }
        t.materials.forEach(function(m, mi) {
            html +=
                '<div style="border:1px solid #e2e8f0; border-radius:4px; padding:8px; margin-bottom:6px; position:relative;">' +
                '<button onclick="window.removeMaterial(' + ti + ',' + mi + ')" ' +
                'style="position:absolute; top:4px; right:6px; background:none; border:none; cursor:pointer; color:#94a3b8; font-size:1rem; padding:0; line-height:1;">&times;</button>' +
                '<div class="form-row" style="margin-bottom:6px;">' +
                '<div class="form-group" style="margin:0; flex:2;">' +
                '<label>Item</label>' +
                '<input type="text" value="' + esc(m.item) + '" placeholder="Item name" ' +
                'oninput="window.divWorking.tasks[' + ti + '].materials[' + mi + '].item=this.value;">' +
                '</div>' +
                '<div class="form-group" style="margin:0; flex:1;">' +
                '<label>Supplier</label>' +
                '<input type="text" value="' + esc(m.supplier) + '" placeholder="Supplier" ' +
                'oninput="window.divWorking.tasks[' + ti + '].materials[' + mi + '].supplier=this.value;">' +
                '</div>' +
                '</div>' +
                '<div class="form-row" style="align-items:center;">' +
                '<div class="form-group" style="margin:0; flex:1;">' +
                '<label>Price</label>' +
                '<input type="number" min="0" step="0.01" value="' + (m.price||'') + '" placeholder="0.00" ' +
                'oninput="window.divWorking.tasks[' + ti + '].materials[' + mi + '].price=+this.value; window.bidRecalcDiv();">' +
                '</div>' +
                '<div class="form-group" style="margin:0; flex:1;">' +
                '<label>Qty</label>' +
                '<input type="number" min="0" step="1" value="' + (m.qty||'') + '" placeholder="0" ' +
                'oninput="window.divWorking.tasks[' + ti + '].materials[' + mi + '].qty=+this.value; window.bidRecalcDiv();">' +
                '</div>' +
                '<div style="padding-top:18px; min-width:64px; text-align:right;">' +
                '<strong data-mat-total="' + ti + '-' + mi + '">' + fmt((m.price||0)*(m.qty||0)) + '</strong>' +
                '</div>' +
                '</div>' +
                '</div>';
        });
        return html;
    }

    // ── Build one task card ───────────────────────────────────────────────
    function buildTaskCard(t, ti) {
        var tc = calcTask(t);
        return '<div style="border:1px solid #e2e8f0; border-radius:6px; padding:12px; margin-bottom:10px;">' +

            // Header: toggle + category + name + total + remove
            '<div style="display:flex; align-items:flex-start; gap:8px; margin-bottom:10px;">' +
            '<input type="checkbox"' + (t.included ? ' checked' : '') +
            ' style="width:16px; height:16px; margin-top:3px; flex-shrink:0;"' +
            ' onchange="window.divWorking.tasks[' + ti + '].included=this.checked; window.bidRecalcDiv();">' +
            '<div style="flex:1; min-width:0;">' +
            '<input type="text" value="' + esc(t.category) + '" placeholder="Category" ' +
            'style="font-size:0.75rem; color:#64748b; border:none; background:transparent; width:100%; padding:0; outline:none;"' +
            ' oninput="window.divWorking.tasks[' + ti + '].category=this.value;">' +
            '<input type="text" value="' + esc(t.name) + '" placeholder="Task name" ' +
            'style="font-size:0.92rem; font-weight:600; border:none; background:transparent; width:100%; padding:2px 0 0 0; outline:none;"' +
            ' oninput="window.divWorking.tasks[' + ti + '].name=this.value;">' +
            '</div>' +
            '<strong data-task-total="' + ti + '" style="white-space:nowrap; color:#0f172a;">' + fmt(tc.lc + tc.mc) + '</strong>' +
            '<button onclick="window.removeTask(' + ti + ')" ' +
            'style="background:none; border:none; color:#94a3b8; font-size:1.1rem; cursor:pointer; padding:0; line-height:1;">&times;</button>' +
            '</div>' +

            // Scope
            '<div class="form-group" style="margin-bottom:10px;">' +
            '<label>Scope of Task</label>' +
            '<textarea rows="2" placeholder="Describe the work for this task..."' +
            ' oninput="window.divWorking.tasks[' + ti + '].scope=this.value;">' + esc(t.scope) + '</textarea>' +
            '</div>' +

            // Labor
            '<div style="border-top:1px solid #f1f5f9; padding-top:10px; margin-bottom:10px;">' +
            '<strong style="font-size:0.8rem; display:block; margin-bottom:8px;">Labor</strong>' +
            '<div class="form-row">' +
            '<div class="form-group" style="margin:0; flex:1;">' +
            '<label>Qty Type</label>' +
            // Full names in the dropdown (the old SF/LF/C/EA/HR codes were
            // hard to read); the short code is still what's stored/persisted.
            '<select oninput="window.divWorking.tasks[' + ti + '].qtyType=this.value;">' +
            [['SF','Square Feet'],['LF','Linear Feet'],['C','Count'],['EA','Each'],['HR','Hours']].map(function(o){
                return '<option value="' + o[0] + '"' + (t.qtyType===o[0]?' selected':'') + '>' + o[1] + '</option>';
            }).join('') +
            '</select></div>' +
            '<div class="form-group" style="margin:0; flex:1;">' +
            '<label>Qty</label>' +
            '<input type="number" min="0" step="1" value="' + (t.qty||'') + '" placeholder="0"' +
            ' oninput="window.divWorking.tasks[' + ti + '].qty=+this.value; window.bidRecalcDiv();"></div>' +
            '<div class="form-group" style="margin:0; flex:1;">' +
            '<label>Hrs / Each</label>' +
            '<input type="number" min="0" step="0.25" value="' + (t.hrsEach||'') + '" placeholder="0"' +
            ' oninput="window.divWorking.tasks[' + ti + '].hrsEach=+this.value; window.bidRecalcDiv();"></div>' +
            '</div>' +
            '<div style="display:flex; gap:16px; font-size:0.85rem; margin-top:4px;">' +
            '<span>Total Hrs: <strong data-task-hrs="' + ti + '">' + tc.hrs.toFixed(2) + '</strong></span>' +
            '<span>Labor Cost: <strong data-task-lc="'  + ti + '">' + fmt(tc.lc) + '</strong></span>' +
            '</div>' +
            '</div>' +

            // Materials
            '<div style="border-top:1px solid #f1f5f9; padding-top:10px;">' +
            '<strong style="font-size:0.8rem; display:block; margin-bottom:8px;">Materials</strong>' +
            '<div id="mats-' + ti + '">' + buildMatsHTML(t, ti) + '</div>' +
            '<button onclick="window.addMaterial(' + ti + ')" class="btn btn-secondary btn-sm" style="margin-top:4px;">+ Add Material</button>' +
            '</div>' +

            '</div>';
    }

    // ── Render all tasks ──────────────────────────────────────────────────
    function renderTasks() {
        var list = document.getElementById('task-list');
        if (!div.tasks || div.tasks.length === 0) {
            list.innerHTML =
                '<div style="padding:20px; text-align:center; border:1px dashed #e2e8f0; border-radius:6px; margin-bottom:12px; color:#94a3b8;">' +
                '<p style="margin:0 0 10px 0;">No tasks yet.</p>' +
                '<button class="btn btn-primary btn-sm" onclick="window.addTask()">+ Add First Task</button>' +
                '</div>';
            updateStats();
            return;
        }
        list.innerHTML = div.tasks.map(buildTaskCard).join('');
        updateStats();
    }

    // ── Task / material actions ───────────────────────────────────────────
    // These are real closures (assigned as function objects, not injected
    // via innerHTML), so they can reference the local `div` var directly —
    // unlike the card markup's inline oninput/onclick attributes above,
    // which go through window.divWorking instead (see its declaration up top).
    window.addTask = function() {
        div.tasks.push({ category:'', name:'', included:true, scope:'', qtyType:'C', qty:0, hrsEach:0, materials:[] });
        renderTasks();
    };
    window.removeTask = function(ti) {
        div.tasks.splice(ti, 1);
        renderTasks();
    };
    window.addMaterial = function(ti) {
        div.tasks[ti].materials.push({ item:'', supplier:'', price:0, qty:0 });
        document.getElementById('mats-' + ti).innerHTML = buildMatsHTML(div.tasks[ti], ti);
        updateStats();
    };
    window.removeMaterial = function(ti, mi) {
        div.tasks[ti].materials.splice(mi, 1);
        document.getElementById('mats-' + ti).innerHTML = buildMatsHTML(div.tasks[ti], ti);
        updateStats();
    };

    // ── Save: flatten the working `div` object back into real bid_line_items
    // rows, recompute this division's labor_cost/material_cost rollup, then
    // bubble the bid-level rollup via the shared app.js helper. Shadows
    // app.js's window.saveDivision for as long as this page is displayed —
    // same pattern this file already uses for addTask/bidRecalcDiv/etc.
    window.saveDivision = function() {
        var old = DB.find('bid_line_items', function (li) {
            return li.bid_division_id === divRow.id && !li.deleted_at;
        });
        old.forEach(function (li) { DB.softDelete('bid_line_items', li.id); });

        var laborRate = div.laborRate || 120;
        var sortOrder = 0;
        var laborTotal = 0, materialTotal = 0;

        div.tasks.forEach(function (t, ti) {
            var taskKey = 'task-' + ti;
            // Same quarter-hour rounding as calcTask(), so what's persisted
            // matches what the page displayed.
            var hrs = Math.round((t.qty || 0) * (t.hrsEach || 0) * 4) / 4;
            var laborLineTotal = hrs * laborRate;
            var matSum = 0;
            (t.materials || []).forEach(function (m) { matSum += (m.price || 0) * (m.qty || 0); });

            DB.insert('bid_line_items', {
                company_id: state.currentCompanyId, bid_division_id: divRow.id,
                description: t.name || '', quantity: hrs, unit: 'hr', unit_cost: laborRate,
                line_total: laborLineTotal, type: 'labor', sort_order: sortOrder++,
                task_key: taskKey, task_category: t.category || null, task_scope: t.scope || null,
                task_included: !!t.included, qty_type: t.qtyType || null, task_qty: t.qty || 0,
                hrs_each: t.hrsEach || 0, supplier: null,
            });

            (t.materials || []).forEach(function (m) {
                DB.insert('bid_line_items', {
                    company_id: state.currentCompanyId, bid_division_id: divRow.id,
                    description: m.item || '', quantity: m.qty || 0, unit: 'each', unit_cost: m.price || 0,
                    line_total: (m.price || 0) * (m.qty || 0), type: 'material', sort_order: sortOrder++,
                    task_key: taskKey, task_category: null, task_scope: null,
                    task_included: null, qty_type: null, task_qty: null, hrs_each: null,
                    supplier: m.supplier || null,
                });
            });

            if (t.included) { laborTotal += laborLineTotal; materialTotal += matSum; }
        });

        DB.update('bid_divisions', divRow.id, {
            labor_cost: laborTotal,
            material_cost: materialTotal,
            form_data: { scope: div.scope || '', laborRate: laborRate, guys: div.guys || 1 },
            required_kit_ids: div.requiredKitIds,
        });

        recalcBidTotals(bidId);
        loadPage('bid');
    };

    renderTasks();
    renderKitChips();

})();
</script>
