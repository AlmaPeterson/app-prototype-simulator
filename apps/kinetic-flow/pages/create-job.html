<div class="page">
    <button class="btn btn-secondary btn-sm mb-4" onclick="loadPage('jobs')">&larr; Back</button>

    <div class="page-header">
        <div class="page-title">Create a Job</div>
        <div class="page-subtitle">Enter the job details. You can add a bid and schedule after.</div>
    </div>

    <div class="form-group">
        <label>Job Name</label>
        <input type="text" placeholder="e.g. Riverside HVAC Retrofit">
    </div>

    <div class="form-group">
        <label>Customer / Client</label>
        <select>
            <option value="">Select customer...</option>
            <option>Riverside Properties</option>
            <option>Westgate Commercial</option>
            <option>Summit Corp</option>
            <option>+ Add New Customer</option>
        </select>
    </div>

    <div class="form-group">
        <label>Job Type</label>
        <select>
            <option>Installation</option>
            <option>Maintenance</option>
            <option>Repair</option>
            <option>Inspection</option>
            <option>Emergency</option>
            <option>New Construction</option>
        </select>
    </div>

    <div class="form-group">
        <label>Site Address</label>
        <input type="text" placeholder="123 Main St, Calgary, AB">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Start Date</label>
            <input type="date">
        </div>
        <div class="form-group">
            <label>End Date</label>
            <input type="date">
        </div>
    </div>

    <div class="form-group">
        <label>Priority</label>
        <select>
            <option>Normal</option>
            <option>High</option>
            <option>Urgent</option>
            <option>Low</option>
        </select>
    </div>

    <div class="form-group">
        <label>Assign Team Members</label>
        <div style="display:flex; flex-wrap:wrap; margin-top:4px;">
            <span class="chip selected" onclick="toggleChip(this)">J. Smith</span>
            <span class="chip" onclick="toggleChip(this)">A. Chen</span>
            <span class="chip" onclick="toggleChip(this)">T. Wong</span>
            <span class="chip" onclick="toggleChip(this)">R. Davis</span>
            <span class="chip" onclick="toggleChip(this)">+ Invite</span>
        </div>
    </div>

    <div class="form-group">
        <label>Job Notes</label>
        <textarea placeholder="Special instructions, access codes, hazard notes..."></textarea>
    </div>

    <div class="form-group">
        <label>Create Bid with this Job?</label>
        <select id="create-bid-opt">
            <option value="later">No, I'll add a bid later</option>
            <option value="now">Yes, take me to bid creation</option>
        </select>
    </div>

    <button class="btn btn-primary" onclick="handleCreateJob()">Create Job</button>
    <button class="btn btn-secondary" onclick="loadPage('jobs')">Cancel</button>
</div>

<script>
function handleCreateJob() {
    const opt = document.getElementById('create-bid-opt').value;
    if (opt === 'now') { openBid(); } else { submitJob(); }
}
</script>
