<div class="page" style="padding-bottom:80px;">
    <button class="btn btn-secondary btn-sm mb-4" onclick="loadPage('jobs')">&larr; Jobs</button>

    <div class="page-title" id="job-home-title">Job</div>
    <!-- Sticky job context made visible: this is your job until you switch;
         tapping just opens the jobs list — only picking another job changes it. -->
    <div class="page-subtitle mb-4" id="job-home-subtitle" onclick="loadPage('jobs')" style="cursor:pointer;">&nbsp;</div>

    <button class="btn btn-primary mb-4" id="job-home-clock-btn" onclick="openFieldClock()">Clock In / Out</button>

    <div class="section-header">
        <span class="section-title">Quick Actions</span>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;">
        <button class="btn btn-secondary" style="margin:0;" onclick="openSchedule()">Schedule</button>
        <button class="btn btn-secondary" style="margin:0;" onclick="openKits()">Kits</button>
        <button class="btn btn-secondary" style="margin:0;" id="job-home-bid-btn" onclick="openBid()">View Bid</button>
        <button class="btn btn-secondary" style="margin:0;" onclick="openTimeSheet()">Time Sheet</button>
    </div>

    <!-- Today's Required Training (JIT Training QA note): every item due
         today must be watched before Clock In is allowed — toggleClock()
         redirects here if any are pending. -->
    <div id="training-today-section" style="display:none; margin-bottom:16px;">
        <div class="section-header">
            <span class="section-title">Today's Required Training</span>
        </div>
        <p style="font-size:0.78rem; color:#64748b; margin:0 0 8px 0;">Complete these before you clock in.</p>
        <div id="training-today-list"></div>
    </div>

    <!-- Prep for the next work day (QA note): training videos for this job's
         upcoming scheduled tasks, watchable the night before. A fresh watch
         (today or yesterday) satisfies the on-site video gate, so the next
         work day starts with the task itself, not a video. -->
    <div id="training-next-section" style="display:none; margin-bottom:16px;">
        <div class="section-header">
            <span class="section-title" id="training-next-title">Prep for Tomorrow</span>
        </div>
        <p style="font-size:0.78rem; color:#64748b; margin:0 0 8px 0;">Watch tonight &mdash; start the task on-site without stopping for videos.</p>
        <div id="training-next-list"></div>
    </div>

    <!-- Kits & Carts Needed: pulled from the job's bid divisions
         (bid-division.html's "Kits & Carts Required" picker) so the crew
         knows what to grab before heading out, and can mark it checked out
         right from here. -->
    <div id="job-kits-section" style="display:none; margin-bottom:16px;">
        <div class="section-header">
            <span class="section-title">Kits &amp; Carts Needed</span>
        </div>
        <div id="job-kits-list"></div>
    </div>

    <div class="card" onclick="openJob(state.currentJobId)">
        <div class="card-row">
            <div class="card-body">
                <div class="card-title">Full Job Details</div>
                <div class="card-subtitle">Progress, team, bid &amp; finance, training</div>
            </div>
            <span class="card-arrow">&#8250;</span>
        </div>
    </div>
</div>

<script>
(function () {
    var job = state.currentJobId ? DB.getById('jobs', state.currentJobId) : null;
    var isNoBid = !job || job.bid_id === null;

    var titleEl = document.getElementById('job-home-title');
    var subEl = document.getElementById('job-home-subtitle');
    var bidBtn = document.getElementById('job-home-bid-btn');

    // Suppliers view jobs for material planning; they don't clock in.
    if (userIsSupplier()) document.getElementById('job-home-clock-btn').style.display = 'none';

    if (titleEl) titleEl.textContent = job ? job.name : 'No Job Selected';
    if (subEl) subEl.innerHTML = (isNoBid ? 'No Bid Yet' : 'Active')
        + ' &bull; <span style="color:#2563eb;">Switch job</span>';
    if (bidBtn) bidBtn.textContent = isNoBid ? '+ Create Bid' : 'View Bid';

    // ── JIT Training: today (required to clock in) + next work day (prep) ──
    // trainingDueForJobOnDate() (app.js) scopes each list to a real calendar
    // date; nextWorkDayIso() skips Saturday and Sunday (see schedule.html).
    if (job && !userIsSupplier()) {
        var today = new Date().toISOString().slice(0, 10);
        var nextWorkDay = nextWorkDayIso(today);

        var todayTraining = trainingDueForJobOnDate(job, today);
        if (todayTraining.length) {
            document.getElementById('training-today-list').innerHTML = todayTraining.map(function (t) {
                return '<div class="card" style="margin-bottom:8px;' + (t.fresh ? ' cursor:default;' : '') + '"' +
                    (t.fresh ? '' : ' onclick="openPrepVideo(\'' + t.taskModuleId + '\')"') + '>' +
                    '<div class="card-row">' +
                        '<div class="card-body">' +
                            '<div class="card-title">' + esc(t.eventTitle) + '</div>' +
                            '<div class="card-subtitle">' + (t.fresh
                                ? 'Watched &mdash; ready to clock in'
                                : esc(t.trainingTitle)) + '</div>' +
                        '</div>' +
                        '<span class="badge ' + (t.fresh ? 'badge-green' : 'badge-gray') + '">' + (t.fresh ? 'Done' : 'Pending') + '</span>' +
                    '</div>' +
                '</div>';
            }).join('');
            document.getElementById('training-today-section').style.display = 'block';
        }

        var nextTraining = trainingDueForJobOnDate(job, nextWorkDay);
        if (nextTraining.length) {
            var nextLabel = new Date(nextWorkDay + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long' });
            document.getElementById('training-next-title').textContent = 'Prep for ' + nextLabel;
            document.getElementById('training-next-list').innerHTML = nextTraining.map(function (t) {
                return '<div class="card" style="margin-bottom:8px;' + (t.fresh ? ' cursor:default;' : '') + '"' +
                    (t.fresh ? '' : ' onclick="openPrepVideo(\'' + t.taskModuleId + '\')"') + '>' +
                    '<div class="card-row">' +
                        '<div class="card-body">' +
                            '<div class="card-title">' + esc(t.eventTitle) + '</div>' +
                            '<div class="card-subtitle">' + (t.fresh
                                ? 'watched &mdash; no video needed on-site'
                                : esc(t.trainingTitle)) + '</div>' +
                        '</div>' +
                        '<span class="badge ' + (t.fresh ? 'badge-green' : 'badge-gray') + '">' + (t.fresh ? 'Ready' : 'Watch') + '</span>' +
                    '</div>' +
                '</div>';
            }).join('');
            document.getElementById('training-next-section').style.display = 'block';
        }
    }

    // ── Kits & Carts Needed ───────────────────────────────────────────────
    function renderJobKits() {
        if (!job) return;
        var kits = requiredKitsForJob(job);
        if (kits.length === 0) return;
        document.getElementById('job-kits-list').innerHTML = kits.map(function (k) {
            var checkout = getOpenCheckout(k.id);
            var kindLabel = k.kind === 'cart' ? 'Cart' : 'Kit';
            if (checkout && checkout.job_id === job.id) {
                return '<div class="card mb-2" style="cursor:default;">' +
                    '<div class="card-row">' +
                        '<div class="card-body"><div class="card-title">' + esc(k.name) + '</div><div class="card-subtitle">' + kindLabel + '</div></div>' +
                        '<span class="badge badge-green">Checked Out</span>' +
                    '</div>' +
                    '<button class="btn btn-outline btn-sm mt-2" onclick="jkCheckIn(\'' + k.id + '\')">Check In</button>' +
                    '</div>';
            }
            if (checkout) {
                var otherJob = DB.getById('jobs', checkout.job_id);
                return '<div class="card mb-2" style="cursor:default;">' +
                    '<div class="card-row">' +
                        '<div class="card-body"><div class="card-title">' + esc(k.name) + '</div><div class="card-subtitle">' + kindLabel + '</div></div>' +
                        '<span class="badge badge-gray">In Use' + (otherJob ? ' &mdash; ' + esc(otherJob.name) : '') + '</span>' +
                    '</div></div>';
            }
            return '<div class="card mb-2" style="cursor:default;">' +
                '<div class="card-row">' +
                    '<div class="card-body"><div class="card-title">' + esc(k.name) + '</div><div class="card-subtitle">' + kindLabel + '</div></div>' +
                    '<span class="badge badge-gray">Needed</span>' +
                '</div>' +
                '<button class="btn btn-primary btn-sm mt-2" onclick="jkCheckOut(\'' + k.id + '\')">Check Out</button>' +
                '</div>';
        }).join('');
        document.getElementById('job-kits-section').style.display = 'block';
    }

    window.jkCheckOut = function (kitId) {
        checkOutKitToJob(kitId, job.id);
        renderJobKits();
    };

    window.jkCheckIn = function (kitId) {
        checkInKit(kitId);
        renderJobKits();
    };

    renderJobKits();
})();
</script>
