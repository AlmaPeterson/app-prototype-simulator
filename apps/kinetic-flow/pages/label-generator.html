<div class="page" style="padding-bottom:80px;">
    <button class="btn btn-secondary btn-sm mb-4" onclick="loadPage('kits')">&larr; Kits</button>

    <div class="page-title">Labels</div>
    <div class="page-subtitle mb-4">Select kits, tools, or materials and hand them off to the Label Maker app to design and print.</div>

    <!-- Templates saved here (uploaded .labeltemplate files + a preview
         image). Tap one to select it as the template for the items picked
         below, then hand both off to Label Designer together. -->
    <div class="section-header">
        <span class="section-title">Saved Templates</span>
        <span class="kit-row-count">tap to select, or upload a new one</span>
    </div>
    <div id="label-templates" style="display:flex; gap:10px; overflow-x:auto; padding-bottom:6px; margin-bottom:14px;"></div>

    <div class="section-header">
        <span class="section-title">Pick Items to Label</span>
    </div>
    <input class="search-bar" type="text" id="kit-search" placeholder="Search kits, tools, materials..." oninput="filterLabelKits(this.value)">

    <div id="label-list" class="mt-4"></div>

    <div class="card label-footer" style="cursor:default;">
        <div class="flex-between">
            <div>
                <div class="card-title" id="label-count">0 labels selected</div>
                <div class="card-subtitle" id="label-template-status">No template selected — tap one above (optional)</div>
            </div>
        </div>
        <label style="display:flex; align-items:center; gap:6px; font-size:0.78rem; color:#475569; margin-top:10px;">
            <input type="checkbox" id="label-include-image" checked onchange="toggleIncludeImageColumn(this.checked)">
            Include image filename column (e.g. "Cool Hammer" &rarr; cool-hammer.png)
        </label>
        <div style="display:flex; gap:8px; margin-top:10px;">
            <button class="btn btn-secondary" style="margin:0;" onclick="clearLabelSelection()">Clear</button>
            <button class="btn btn-primary" style="margin:0;" onclick="sendToLabelMaker()">Open in Label Maker</button>
        </div>
    </div>
</div>

<script>
(function () {

    // Group real inventory_kits rows by category, and resolve each kit's
    // tools/materials from the materials table (kit_id-tagged rows) — same
    // data source as kits.html, adapted here to add per-tool/per-material
    // checkboxes.
    function loadCategories() {
        var kits = DB.find('inventory_kits', function (k) {
            return k.company_id === state.currentCompanyId && !k.deleted_at;
        });
        var byCat = {};
        var order = [];
        kits.forEach(function (k) {
            var cat = k.category || 'Uncategorized';
            if (!byCat[cat]) { byCat[cat] = []; order.push(cat); }
            // Kept as full material rows (not pre-formatted strings) so a
            // selected tool/material can carry its real sku/qty/id through to
            // the Label Maker handoff — itemDisplayText() renders them.
            var tools = DB.find('materials', function (m) { return m.kit_id === k.id && m.item_type === 'tool' && !m.deleted_at; });
            var materials = DB.find('materials', function (m) { return m.kit_id === k.id && m.item_type === 'material' && !m.deleted_at; });
            byCat[cat].push({ id: k.id, name: k.name, tools: tools, materials: materials });
        });
        return order.map(function (name) { return { name: name, kits: byCat[name] }; });
    }

    // Tools/materials that aren't part of any kit — e.g. big shelf tools kept
    // on a trailer (drills, band saw, batteries) rather than bundled into a
    // job kit. Grouped by `location` (shop/truck_1/trailer/...) since that's
    // the only organizing field standalone materials have.
    function loadStandaloneGroups() {
        var standalone = DB.find('materials', function (m) {
            return m.company_id === state.currentCompanyId && !m.deleted_at && !m.kit_id;
        });
        var byLoc = {};
        var order = [];
        standalone.forEach(function (m) {
            var loc = m.location || 'shop';
            if (!byLoc[loc]) { byLoc[loc] = []; order.push(loc); }
            byLoc[loc].push(m);
        });
        return order.sort().map(function (loc) { return { location: loc, items: byLoc[loc] }; });
    }

    function locationLabel(loc) {
        return loc.replace(/_/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
    }

    var CATEGORIES = loadCategories();
    var STANDALONE_GROUPS = loadStandaloneGroups();
    var appState = { expandedCats: new Set(), expandedKits: new Set(), expandedLocations: new Set(), searchQuery: '', selectedTemplateId: null, includeImageColumn: true };

    window.toggleIncludeImageColumn = function (checked) { appState.includeImageColumn = checked; };

    // "Cool Hammer" -> "cool-hammer" — a predictable slug so it can be
    // matched against an image library filename (…png) inside Label
    // Designer's own asset store. Non-alphanumeric runs (spaces, punctuation)
    // collapse to a single hyphen.
    function slugify(text) {
        return String(text || '').toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    }
    var selected = new Map(); // id -> label text

    function clearSearchInput() {
        var search = document.getElementById('kit-search');
        if (search) search.value = '';
    }

    function renderFooter() {
        var el = document.getElementById('label-count');
        var n = selected.size;
        el.textContent = n + ' label' + (n !== 1 ? 's' : '') + ' selected';
        var statusEl = document.getElementById('label-template-status');
        if (statusEl) {
            var t = appState.selectedTemplateId ? DB.getById('label_templates', appState.selectedTemplateId) : null;
            statusEl.textContent = t ? ('Template: ' + t.name) : 'No template selected — tap one above (optional)';
        }
    }

    function itemDisplayText(row) {
        return row.stock_qty && row.stock_qty !== 1 ? (row.name + ' (' + row.stock_qty + ')') : row.name;
    }

    // Every label's URL column — same link for every item for now (no
    // per-item pages yet), but breaking it out as a column rather than a
    // literal means templates can already bind a {URL} text field or QR
    // value to it today and it'll start varying per item later for free.
    var LABEL_URL = 'https://almapeterson.github.io/app-prototype-simulator/index.html';

    // What gets handed off per selected item — one row per label, shaped as
    // plain { ColumnName: value } so Label Designer can bind {Name}/{SKU}/…
    // text placeholders directly, no schema negotiation needed on this end.
    function materialRecord(row, extra) {
        return Object.assign({
            Name: row.name,
            Brand: row.brand || '',
            Type: row.item_type === 'tool' ? 'Tool' : 'Material',
            SKU: row.sku || '',
            Qty: row.stock_qty != null ? row.stock_qty : '',
            Location: row.location || '',
            QR: row.id,
            URL: LABEL_URL,
        }, extra);
    }

    function kitRecord(kit, categoryName) {
        return { Name: kit.name, Type: 'Kit', Category: categoryName, QR: kit.id, URL: LABEL_URL };
    }

    function itemGroupHtml(title, kind, ci, ki, items) {
        var html = '<div class="label-section-title">' + title + '</div>';
        if (!items || items.length === 0) {
            html += '<div class="kit-empty" style="padding-left:40px;">No ' + title.toLowerCase() + ' listed.</div>';
            return html;
        }
        html += items.map(function (row, i) {
            var id = kind + '|' + ci + '|' + ki + '|' + i;
            var checked = selected.has(id) ? ' checked' : '';
            return '<div class="label-row label-row-item">' +
                '<input type="checkbox"' + checked + ' class="label-checkbox" onclick="toggleLabelItem(\'' + kind + '\',' + ci + ',' + ki + ',' + i + ')">' +
                '<span class="label-name">' + esc(itemDisplayText(row)) + '</span></div>';
        }).join('');
        return html;
    }

    function kitHtml(ci, kit, ki) {
        var key = ci + '|' + ki;
        var expanded = appState.expandedKits.has(key);
        var checked = selected.has('K|' + ci + '|' + ki);
        var html = '<div class="label-kit" id="kit-' + ci + '-' + ki + '">';
        html += '<div class="label-row label-row-kit">' +
            '<input type="checkbox"' + (checked ? ' checked' : '') + ' class="label-checkbox" onclick="toggleLabelKit(' + ci + ',' + ki + ')">' +
            '<button class="label-toggle" onclick="toggleKitExpand(' + ci + ',' + ki + ')">' +
            '<span class="label-name">' + kit.name + '</span>' +
            '<span class="label-chevron">' + (expanded ? '&#9660;' : '&#9654;') + '</span>' +
            '</button></div>';
        if (expanded) {
            html += '<div class="label-kit-detail">' +
                itemGroupHtml('Tools', 'T', ci, ki, kit.tools) +
                itemGroupHtml('Materials', 'M', ci, ki, kit.materials) +
                '</div>';
        }
        html += '</div>';
        return html;
    }

    function categoryHtml(cat, ci) {
        var expanded = appState.expandedCats.has(ci);
        var html = '<div class="label-cat">';
        html += '<div class="label-row label-row-cat">' +
            '<button class="label-toggle" onclick="toggleCatExpand(' + ci + ')">' +
            '<span class="label-name">' + cat.name + '</span>' +
            '<span class="label-count">' + cat.kits.length + ' kit' + (cat.kits.length !== 1 ? 's' : '') + '</span>' +
            '<span class="label-chevron">' + (expanded ? '&#9660;' : '&#9654;') + '</span>' +
            '</button></div>';
        if (expanded) {
            html += '<div class="label-kits">' + cat.kits.map(function (k, ki) { return kitHtml(ci, k, ki); }).join('') + '</div>';
        }
        html += '</div>';
        return html;
    }

    function standaloneGroupHtml(group, gi) {
        var expanded = appState.expandedLocations.has(gi);
        var html = '<div class="label-cat">';
        html += '<div class="label-row label-row-cat">' +
            '<button class="label-toggle" onclick="toggleLocationExpand(' + gi + ')">' +
            '<span class="label-name">' + locationLabel(group.location) + '</span>' +
            '<span class="label-count">' + group.items.length + ' item' + (group.items.length !== 1 ? 's' : '') + '</span>' +
            '<span class="label-chevron">' + (expanded ? '&#9660;' : '&#9654;') + '</span>' +
            '</button></div>';
        if (expanded) {
            html += '<div class="label-kit-detail">' + group.items.map(function (m) {
                var id = 'S|' + m.id;
                var checked = selected.has(id) ? ' checked' : '';
                return '<div class="label-row label-row-item">' +
                    '<input type="checkbox"' + checked + ' class="label-checkbox" onclick="toggleStandaloneItem(\'' + m.id + '\')">' +
                    '<span class="label-name">' + m.name + '</span></div>';
            }).join('') + '</div>';
        }
        html += '</div>';
        return html;
    }

    function treeHtml() {
        var html = '<div class="label-tree">' + CATEGORIES.map(categoryHtml).join('') + '</div>';
        if (STANDALONE_GROUPS.length) {
            html += '<div class="section-header mt-2"><span class="section-title">Standalone Tools &amp; Materials</span>' +
                '<span class="kit-row-count">not in a kit</span></div>';
            html += '<div class="label-tree">' + STANDALONE_GROUPS.map(standaloneGroupHtml).join('') + '</div>';
        }
        return html;
    }

    function searchResultsHtml(query) {
        var q = query.toLowerCase();
        var results = [];
        CATEGORIES.forEach(function (cat, ci) {
            cat.kits.forEach(function (k, ki) {
                if (k.name.toLowerCase().indexOf(q) !== -1) results.push({ cat: cat, ci: ci, k: k, ki: ki });
            });
        });
        var standaloneMatches = [];
        STANDALONE_GROUPS.forEach(function (group) {
            group.items.forEach(function (m) {
                if (m.name.toLowerCase().indexOf(q) !== -1) standaloneMatches.push(m);
            });
        });
        var html = '<div class="section-header"><span class="section-title">Search Results</span>' +
            '<span class="kit-row-count">' + (results.length + standaloneMatches.length) + ' found</span></div>';
        if (results.length === 0 && standaloneMatches.length === 0) {
            html += '<div class="kit-empty">No kits, tools, or materials match &quot;' + query + '&quot;.</div>';
            return html;
        }
        html += '<div class="label-tree">' + results.map(function (r) {
            var checked = selected.has('K|' + r.ci + '|' + r.ki) ? ' checked' : '';
            return '<div class="label-row label-row-kit">' +
                '<input type="checkbox"' + checked + ' class="label-checkbox" onclick="toggleLabelKit(' + r.ci + ',' + r.ki + ')">' +
                '<button class="label-toggle" onclick="jumpToKit(' + r.ci + ',' + r.ki + ')">' +
                '<span class="label-name">' + r.k.name + '<br><span class="label-subtext">' + r.cat.name + '</span></span>' +
                '</button></div>';
        }).join('') + standaloneMatches.map(function (m) {
            var checked = selected.has('S|' + m.id) ? ' checked' : '';
            return '<div class="label-row label-row-item">' +
                '<input type="checkbox"' + checked + ' class="label-checkbox" onclick="toggleStandaloneItem(\'' + m.id + '\')">' +
                '<span class="label-name">' + m.name + '<br><span class="label-subtext">' + locationLabel(m.location || 'shop') + '</span></span></div>';
        }).join('') + '</div>';
        return html;
    }

    function render() {
        var el = document.getElementById('label-list');
        el.innerHTML = appState.searchQuery ? searchResultsHtml(appState.searchQuery) : treeHtml();
        renderFooter();
    }

    window.toggleCatExpand = function (ci) {
        if (appState.expandedCats.has(ci)) appState.expandedCats.delete(ci);
        else appState.expandedCats.add(ci);
        render();
    };

    window.toggleKitExpand = function (ci, ki) {
        var key = ci + '|' + ki;
        if (appState.expandedKits.has(key)) appState.expandedKits.delete(key);
        else appState.expandedKits.add(key);
        render();
    };

    window.jumpToKit = function (ci, ki) {
        appState.searchQuery = '';
        clearSearchInput();
        appState.expandedCats.add(ci);
        appState.expandedKits.add(ci + '|' + ki);
        render();
        var el = document.getElementById('kit-' + ci + '-' + ki);
        if (el) el.scrollIntoView({ block: 'center' });
    };

    window.filterLabelKits = function (query) {
        appState.searchQuery = query.trim();
        render();
    };

    window.toggleLabelKit = function (ci, ki) {
        var id = 'K|' + ci + '|' + ki;
        if (selected.has(id)) selected.delete(id);
        else selected.set(id, kitRecord(CATEGORIES[ci].kits[ki], CATEGORIES[ci].name));
        render();
    };

    window.toggleLabelItem = function (kind, ci, ki, i) {
        var id = kind + '|' + ci + '|' + ki + '|' + i;
        if (selected.has(id)) {
            selected.delete(id);
        } else {
            var cat = CATEGORIES[ci];
            var kit = cat.kits[ki];
            var row = kind === 'T' ? kit.tools[i] : kit.materials[i];
            selected.set(id, materialRecord(row, { Kit: kit.name, Category: cat.name }));
        }
        render();
    };

    window.toggleLocationExpand = function (gi) {
        if (appState.expandedLocations.has(gi)) appState.expandedLocations.delete(gi);
        else appState.expandedLocations.add(gi);
        render();
    };

    window.toggleStandaloneItem = function (materialId) {
        var id = 'S|' + materialId;
        if (selected.has(id)) {
            selected.delete(id);
        } else {
            var m = DB.getById('materials', materialId);
            if (m) selected.set(id, materialRecord(m, {}));
        }
        render();
    };

    window.clearLabelSelection = function () {
        selected.clear();
        render();
    };

    // Resolves a saved template's raw .labeltemplate JSON, regardless of
    // whether it's a seed file on disk or a user upload sitting in IndexedDB
    // (see Assets in app.js) — same source downloadLabelTemplate() reads.
    function resolveTemplateDesignJSON(templateId) {
        var t = DB.getById('label_templates', templateId);
        if (!t) return Promise.resolve(null);
        var urlPromise = t.template_asset_id
            ? Assets.url(t.template_asset_id)
            : Promise.resolve('apps/kinetic-flow/db/' + t.template_path);
        return urlPromise.then(function (url) {
            if (!url) throw new Error('Template file not found.');
            return fetch(url).then(function (r) { return r.json(); });
        });
    }

    // Real handoff: stages the chosen template's design JSON (if any) plus
    // one data record per selected kit/tool/material on a well-known window
    // global, then opens Label Designer — its adapter (apps/label-designer/
    // app.js) picks the handoff up in start() and loads it via the module's
    // loadHandoff(). Both apps run in the same page/window (no iframes), so
    // this is just a plain global rather than postMessage or a server round
    // trip. Template is optional: with none selected, the designer still
    // opens with the picked items as data the user can bind by hand.
    window.sendToLabelMaker = function () {
        if (selected.size === 0) {
            alert('Select at least one category, kit, tool, or material to label.');
            return;
        }
        var records = Array.from(selected.values()).map(function (r) {
            return appState.includeImageColumn ? Object.assign({}, r, { Image: slugify(r.Name) + '.png' }) : r;
        });
        var templateId = appState.selectedTemplateId;
        var designDone = templateId ? resolveTemplateDesignJSON(templateId) : Promise.resolve(null);
        designDone.then(function (design) {
            window.LabelDesignerHandoff = { design: design, records: records };
            openApp('label-designer');
        }).catch(function (err) {
            console.error('Failed to load template for Label Maker handoff:', err);
            alert('Could not load that template file. Try again or pick a different template.');
        });
    };

    // Saved templates come from the real label_templates table now: the seed
    // row (Avery 5163) plus whatever the user has uploaded here. Template
    // files are big JSON blobs (label_templates/*.labeltemplate on disk for
    // seeds, IndexedDB Assets for uploads) — same asset split inventory.html
    // uses for photos/videos, so neither blows through localStorage's quota.
    function templateCardHtml(t) {
        var isSelected = appState.selectedTemplateId === t.id;
        var preview = t.preview_image_asset_id
            ? '<img data-asset-id="' + t.preview_image_asset_id + '" style="width:100%; height:44px; object-fit:cover; border-radius:6px; margin-bottom:6px; background:#f1f5f9;" alt="">'
            : '<div style="border:1px dashed #cbd5e1; border-radius:6px; height:44px; display:flex; align-items:center; justify-content:center; color:#94a3b8; font-size:0.65rem; margin-bottom:6px;">Preview</div>';
        return '<div class="card' + (isSelected ? ' card-selected' : '') + '" style="min-width:130px; flex:0 0 auto; margin:0; cursor:pointer; position:relative;" onclick="selectLabelTemplate(\'' + t.id + '\')">' +
            '<button type="button" style="position:absolute; top:4px; right:4px; width:20px; height:20px; border:none; border-radius:50%; background:rgba(255,255,255,0.9); color:#64748b; font-size:0.85rem; line-height:1; cursor:pointer; padding:0;" title="Template options" onclick="event.stopPropagation(); openTemplateActions(\'' + t.id + '\')">&#8942;</button>' +
            (isSelected ? '<div style="position:absolute; top:4px; left:4px; width:16px; height:16px; border-radius:50%; background:#2563eb; color:#fff; font-size:0.65rem; display:flex; align-items:center; justify-content:center;">&#10003;</div>' : '') +
            preview +
            '<div style="font-size:0.75rem; font-weight:600;">' + esc(t.name) + '</div>' +
            '<div style="font-size:0.68rem; color:#94a3b8;">' + esc(t.size_label || '') + '</div>' +
        '</div>';
    }

    // Tapping a card selects it as the template for "Open in Label Maker"
    // below (tap again to deselect); the small ⋯ button opens the actions
    // sheet for download/remove without stealing the tap-to-select gesture.
    window.selectLabelTemplate = function (templateId) {
        appState.selectedTemplateId = appState.selectedTemplateId === templateId ? null : templateId;
        renderTemplates();
        renderFooter();
    };

    function uploadTileHtml() {
        return '<div class="card" style="min-width:100px; flex:0 0 auto; margin:0; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; border:1px dashed #cbd5e1;" onclick="openUploadTemplatePanel()">' +
            '<div style="font-size:1.4rem; color:#94a3b8; line-height:1; margin-bottom:2px;">+</div>' +
            '<div style="font-size:0.7rem; color:#64748b; text-align:center;">Upload<br>Template</div>' +
        '</div>';
    }

    function renderTemplates() {
        var rows = DB.find('label_templates', function (t) {
            return t.company_id === state.currentCompanyId && !t.deleted_at;
        });
        var el = document.getElementById('label-templates');
        el.innerHTML = rows.map(templateCardHtml).join('') + uploadTileHtml();
        hydrateAssetMedia(el);
    }

    window.downloadLabelTemplate = function (templateId) {
        var t = DB.getById('label_templates', templateId);
        if (!t) return;
        var urlPromise = t.template_asset_id
            ? Assets.url(t.template_asset_id)
            : fetch('apps/kinetic-flow/db/' + t.template_path).then(function (r) { return r.blob(); }).then(function (blob) { return URL.createObjectURL(blob); });
        urlPromise.then(function (url) {
            if (!url) { alert('Template file not found.'); return; }
            var a = document.createElement('a');
            a.href = url;
            a.download = (t.name || 'label-template').replace(/[^a-z0-9\-_ ]/gi, '').trim() + '.labeltemplate';
            document.body.appendChild(a);
            a.click();
            a.remove();
        });
    };

    window.removeLabelTemplate = function (templateId) {
        var t = DB.getById('label_templates', templateId);
        if (!confirm('Remove ' + (t ? '“' + t.name + '”' : 'this template') + '? This can\'t be undone.')) return;
        DB.softDelete('label_templates', templateId);
        if (appState.selectedTemplateId === templateId) appState.selectedTemplateId = null;
        var sheet = document.getElementById('lt-action-sheet');
        if (sheet) sheet.remove();
        renderTemplates();
        renderFooter();
    };

    // Reads which data columns a template's elements actually bind to, so a
    // template can be checked against the fields Label Generator hands off
    // (Name, Brand, SKU, Qty, Location, QR, Image…) before opening it.
    // {ColumnName}/<ColumnName> text placeholders carry their real name, but
    // this is a design-only file (no "data" section — see fileFormat.js), so
    // an image/QR placeholder's binding is just a bare columnId with no name
    // attached; those show up generically as "Image"/"QR" instead of a raw id.
    function extractTemplateColumns(design) {
        var VARIABLE_REGEX = /\{([^{}]+)\}|<([^<>]+)>/g;
        var textColumns = [];
        var needsImage = false;
        var needsQr = false;

        function scanElements(elements) {
            (elements || []).forEach(function (el) {
                if (el.type === 'text' && el.content) {
                    var m;
                    VARIABLE_REGEX.lastIndex = 0;
                    while ((m = VARIABLE_REGEX.exec(el.content))) {
                        var name = (m[1] || m[2] || '').trim();
                        if (name && textColumns.indexOf(name) === -1) textColumns.push(name);
                    }
                } else if (el.type === 'placeholder') {
                    if (el.placeholderType === 'image' && el.imageNameBinding) needsImage = true;
                    if (el.placeholderType === 'qrCode' && el.qrValueBinding) needsQr = true;
                }
            });
        }

        var d = design && design.design;
        if (d) {
            scanElements(d.masterLabel && d.masterLabel.elements);
            (d.labelOverrides || []).forEach(function (o) {
                scanElements(o && o.override && o.override.additionalElements);
            });
        }
        return { textColumns: textColumns, needsImage: needsImage, needsQr: needsQr };
    }

    function describeTemplateColumns(design) {
        var cols = extractTemplateColumns(design);
        var parts = cols.textColumns.slice();
        if (cols.needsImage) parts.push('Image (filename)');
        if (cols.needsQr) parts.push('QR (code value)');
        return parts.length ? parts.join(', ') : 'No data-bound fields in this template.';
    }

    window.openTemplateActions = function (templateId) {
        var t = DB.getById('label_templates', templateId);
        if (!t) return;
        var isSelected = appState.selectedTemplateId === t.id;
        var existing = document.getElementById('lt-action-sheet');
        if (existing) existing.remove();
        var modal = document.createElement('div');
        modal.id = 'lt-action-sheet';
        modal.className = 'modal-overlay';
        modal.setAttribute('data-template-id', t.id);
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div class="page-title-sm mb-2">' + esc(t.name) + '</div>' +
                '<div class="card-subtitle mb-2">' + esc(t.size_label || '') + '</div>' +
                '<div class="card-subtitle mb-4"><strong>Columns used:</strong> <span id="lt-columns-info">loading…</span></div>' +
                '<button class="btn btn-primary" onclick="document.getElementById(\'lt-action-sheet\').remove(); selectLabelTemplate(\'' + t.id + '\')">' + (isSelected ? 'Deselect Template' : 'Use for Selected Items') + '</button>' +
                '<button class="btn btn-outline" onclick="downloadLabelTemplate(\'' + t.id + '\')">Download Template File</button>' +
                '<button class="btn btn-secondary" style="color:#dc2626;" onclick="removeLabelTemplate(\'' + t.id + '\')">Remove Template</button>' +
                '<button class="btn btn-secondary" onclick="document.getElementById(\'lt-action-sheet\').remove()">Cancel</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
        document.getElementById('phone').appendChild(modal);

        resolveTemplateDesignJSON(t.id).then(function (design) {
            var sheet = document.getElementById('lt-action-sheet');
            var infoEl = document.getElementById('lt-columns-info');
            if (!sheet || sheet.getAttribute('data-template-id') !== t.id || !infoEl) return;
            infoEl.textContent = describeTemplateColumns(design);
        }).catch(function (err) {
            console.error('Failed to read template columns:', err);
            var infoEl = document.getElementById('lt-columns-info');
            if (infoEl) infoEl.textContent = 'Could not read this template’s fields.';
        });
    };

    // Upload flow — file staged here until Save, same pattern as
    // inventory.html's pendingImageFile (Assets.save() only happens once, on
    // submit, so Cancel never leaves an orphaned blob in IndexedDB).
    var pendingTemplateFile = null;
    var pendingTemplatePreviewFile = null;

    window.handleTemplateFileChange = function (input) {
        var file = input.files && input.files[0];
        if (!file) return;
        pendingTemplateFile = file;
        document.getElementById('lt-file-name').textContent = file.name;
        var nameField = document.getElementById('lt-name');
        var sizeField = document.getElementById('lt-size');
        var reader = new FileReader();
        reader.onload = function () {
            // Best-effort autofill from a Label Designer .labeltemplate's
            // own metadata — falls back to manual entry for any file this
            // shape doesn't match (or isn't JSON at all).
            try {
                var parsed = JSON.parse(reader.result);
                var tpl = parsed && parsed.design && parsed.design.template;
                if (tpl) {
                    if (!nameField.value && tpl.name) nameField.value = tpl.name;
                    if (!sizeField.value) {
                        var perSheet = (tpl.rows && tpl.columns) ? (tpl.rows * tpl.columns) + '/sheet' : '';
                        sizeField.value = [tpl.description, perSheet].filter(Boolean).join(' — ');
                    }
                }
            } catch (e) { /* not introspectable — user fills in name/size manually */ }
        };
        reader.readAsText(file);
    };

    window.handleTemplatePreviewChange = function (input) {
        var file = input.files && input.files[0];
        if (!file) return;
        pendingTemplatePreviewFile = file;
        var preview = document.getElementById('lt-preview-img');
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        document.getElementById('lt-preview-empty').style.display = 'none';
    };

    window.openUploadTemplatePanel = function () {
        pendingTemplateFile = null;
        pendingTemplatePreviewFile = null;
        var existing = document.getElementById('lt-upload-panel');
        if (existing) existing.remove();
        var modal = document.createElement('div');
        modal.id = 'lt-upload-panel';
        modal.className = 'modal-overlay';
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div class="page-title-sm mb-2">Upload Template</div>' +
                '<div class="form-group"><label>Template File</label>' +
                    '<div style="display:flex; align-items:center; gap:10px;">' +
                        '<button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById(\'lt-file-input\').click()">Choose File</button>' +
                        '<span id="lt-file-name" style="font-size:0.78rem; color:#64748b;">No file chosen</span>' +
                    '</div>' +
                    '<input type="file" id="lt-file-input" accept=".labeltemplate,.json,application/json" style="display:none;" onchange="handleTemplateFileChange(this)">' +
                '</div>' +
                '<div class="form-group"><label>Preview Image (optional)</label>' +
                    '<div style="display:flex; align-items:center; gap:10px;">' +
                        '<img id="lt-preview-img" style="width:56px; height:56px; border-radius:8px; object-fit:cover; background:#f1f5f9; display:none;" alt="">' +
                        '<span id="lt-preview-empty" style="font-size:0.78rem; color:#94a3b8;">No image</span>' +
                        '<button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById(\'lt-preview-input\').click()">Choose Image</button>' +
                    '</div>' +
                    '<input type="file" id="lt-preview-input" accept="image/*" style="display:none;" onchange="handleTemplatePreviewChange(this)">' +
                '</div>' +
                '<div class="form-group"><label>Name</label><input type="text" id="lt-name" placeholder="e.g. Avery 5163"></div>' +
                '<div class="form-group"><label>Size / Description</label><input type="text" id="lt-size" placeholder="e.g. Shipping Labels (2&quot; × 4&quot;) — 10/sheet"></div>' +
                '<button class="btn btn-primary mt-2" onclick="saveLabelTemplate()">Save Template</button>' +
                '<button class="btn btn-secondary" onclick="document.getElementById(\'lt-upload-panel\').remove()">Cancel</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
        document.getElementById('phone').appendChild(modal);
    };

    window.saveLabelTemplate = function () {
        if (!pendingTemplateFile) { alert('Choose a template file to upload.'); return; }
        var name = (document.getElementById('lt-name').value || '').trim();
        if (!name) { alert('Enter a name for this template.'); return; }
        var sizeLabel = (document.getElementById('lt-size').value || '').trim();

        var templateAssetDone = Assets.save(pendingTemplateFile).then(function (asset) { return asset.id; });
        var previewAssetDone = pendingTemplatePreviewFile
            ? Assets.save(pendingTemplatePreviewFile).then(function (asset) { return asset.id; })
            : Promise.resolve(null);

        Promise.all([templateAssetDone, previewAssetDone]).then(function (ids) {
            DB.insert('label_templates', {
                company_id: state.currentCompanyId,
                name: name,
                size_label: sizeLabel,
                template_path: null,
                template_asset_id: ids[0],
                preview_image_asset_id: ids[1],
            });
            var panel = document.getElementById('lt-upload-panel');
            if (panel) panel.remove();
            renderTemplates();
            showToast('Template Added', [name + ' is now available in Saved Templates.'], '#16a34a');
        });
    };

    renderTemplates();
    render();
})();
</script>
