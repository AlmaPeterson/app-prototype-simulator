<div class="page" style="padding-bottom:80px;">
    <button class="btn btn-secondary btn-sm mb-4" onclick="loadPage('kits')">&larr; Kits</button>

    <div class="page-title">Generate Labels</div>
    <div class="page-subtitle mb-4">Select kits, tools, and materials, then generate a printable label sheet PDF.</div>

    <input class="search-bar" type="text" id="kit-search" placeholder="Search kits..." oninput="filterLabelKits(this.value)">

    <div class="kit-browser">
        <div class="kit-sidebar" id="kit-sidebar"></div>
        <div class="kit-content" id="kit-content"></div>
    </div>

    <div class="card" style="cursor:default; margin-top:14px;">
        <div class="flex-between">
            <div>
                <div class="card-title" id="label-count">0 labels selected</div>
                <div class="card-subtitle">One label per item, 30 per sheet.</div>
            </div>
        </div>
        <div style="display:flex; gap:8px; margin-top:10px;">
            <button class="btn btn-secondary" style="margin:0;" onclick="clearLabelSelection()">Clear</button>
            <button class="btn btn-primary" style="margin:0;" onclick="generateLabelsPDF()">Generate PDF</button>
        </div>
    </div>
</div>

<script>
(function () {

    var KIT_CATEGORIES = window.KIT_CATEGORIES;
    var state = { catIndex: 0, kitIndex: null, searchQuery: '' };
    var selected = new Map(); // id -> label text

    function clearSearchInput() {
        var search = document.getElementById('kit-search');
        if (search) search.value = '';
    }

    function renderSidebar() {
        var el = document.getElementById('kit-sidebar');
        el.innerHTML = KIT_CATEGORIES.map(function (cat, i) {
            var active = !state.searchQuery && state.catIndex === i;
            return '<button class="kit-sidebar-item' + (active ? ' active' : '') + '" onclick="selectLabelCategory(' + i + ')">' + cat.name + '</button>';
        }).join('');
    }

    function renderFooter() {
        var el = document.getElementById('label-count');
        var n = selected.size;
        el.textContent = n + ' label' + (n !== 1 ? 's' : '') + ' selected';
    }

    function kitRowHtml(ci, ki, name, sub) {
        var id = 'K|' + ci + '|' + ki;
        var checked = selected.has(id) ? ' checked' : '';
        return '<div class="kit-row">' +
            '<input type="checkbox"' + checked + ' style="width:16px;height:16px;flex-shrink:0;cursor:pointer;" onclick="toggleLabelKit(event,' + ci + ',' + ki + ')">' +
            '<span class="kit-row-name" style="cursor:pointer;" onclick="openLabelDetail(' + ci + ',' + ki + ')">' + name +
            (sub ? '<br><span style="font-size:0.7rem; font-weight:500; color:#94a3b8;">' + sub + '</span>' : '') + '</span>' +
            '<span class="card-arrow" style="cursor:pointer;" onclick="openLabelDetail(' + ci + ',' + ki + ')">&rsaquo;</span></div>';
    }

    function kitListHtml(cat, catIndex) {
        var html = '<div class="section-header"><span class="section-title">' + cat.name + '</span>' +
            '<span class="kit-row-count">' + cat.kits.length + ' kit' + (cat.kits.length !== 1 ? 's' : '') + '</span></div>';
        html += '<div class="card" style="cursor:default; padding:0 14px;">';
        html += cat.kits.map(function (k, ki) { return kitRowHtml(catIndex, ki, k.name, ''); }).join('');
        html += '</div>';
        return html;
    }

    function itemRowsHtml(ci, ki, kind, items) {
        if (!items || items.length === 0) return '<div class="kit-empty">No ' + (kind === 'T' ? 'tools' : 'materials') + ' listed.</div>';
        var html = '<div class="card" style="cursor:default; padding:0 14px;">';
        html += items.map(function (text, i) {
            var id = kind + '|' + ci + '|' + ki + '|' + i;
            var checked = selected.has(id) ? ' checked' : '';
            return '<div class="kit-row" style="cursor:default;">' +
                '<input type="checkbox"' + checked + ' style="width:16px;height:16px;flex-shrink:0;cursor:pointer;" onclick="toggleLabelItem(event,\'' + kind + '\',' + ci + ',' + ki + ',' + i + ')">' +
                '<span class="kit-row-name">' + text + '</span></div>';
        }).join('');
        html += '</div>';
        return html;
    }

    function kitDetailHtml(cat, catIndex, kit, kitIndex) {
        var html = '<button class="btn btn-secondary btn-sm mb-4" onclick="closeLabelDetail()">&larr; ' + cat.name + '</button>';
        html += '<div class="page-title-sm mb-4">' + kit.name + '</div>';
        html += '<div class="section-header"><span class="section-title">Tools</span></div>';
        html += itemRowsHtml(catIndex, kitIndex, 'T', kit.tools);
        html += '<div class="section-header mt-4"><span class="section-title">Materials</span></div>';
        html += itemRowsHtml(catIndex, kitIndex, 'M', kit.materials);
        return html;
    }

    function searchResultsHtml(query) {
        var q = query.toLowerCase();
        var results = [];
        KIT_CATEGORIES.forEach(function (cat, ci) {
            cat.kits.forEach(function (k, ki) {
                if (k.name.toLowerCase().indexOf(q) !== -1) results.push({ cat: cat, ci: ci, k: k, ki: ki });
            });
        });
        var html = '<div class="section-header"><span class="section-title">Search Results</span>' +
            '<span class="kit-row-count">' + results.length + ' found</span></div>';
        if (results.length === 0) {
            html += '<div class="kit-empty">No kits match &quot;' + query + '&quot;.</div>';
            return html;
        }
        html += '<div class="card" style="cursor:default; padding:0 14px;">';
        html += results.map(function (r) { return kitRowHtml(r.ci, r.ki, r.k.name, r.cat.name); }).join('');
        html += '</div>';
        return html;
    }

    function render() {
        renderSidebar();
        var content = document.getElementById('kit-content');
        if (state.kitIndex !== null) {
            content.innerHTML = kitDetailHtml(KIT_CATEGORIES[state.catIndex], state.catIndex, KIT_CATEGORIES[state.catIndex].kits[state.kitIndex], state.kitIndex);
        } else if (state.searchQuery) {
            content.innerHTML = searchResultsHtml(state.searchQuery);
        } else {
            content.innerHTML = kitListHtml(KIT_CATEGORIES[state.catIndex], state.catIndex);
        }
        renderFooter();
    }

    window.selectLabelCategory = function (i) {
        state.catIndex = i;
        state.kitIndex = null;
        state.searchQuery = '';
        clearSearchInput();
        render();
    };

    window.openLabelDetail = function (ci, ki) {
        state.catIndex = ci;
        state.kitIndex = ki;
        state.searchQuery = '';
        clearSearchInput();
        render();
    };

    window.closeLabelDetail = function () {
        state.kitIndex = null;
        render();
    };

    window.filterLabelKits = function (query) {
        state.searchQuery = query.trim();
        if (state.searchQuery) state.kitIndex = null;
        render();
    };

    window.toggleLabelKit = function (e, ci, ki) {
        e.stopPropagation();
        var id = 'K|' + ci + '|' + ki;
        if (selected.has(id)) selected.delete(id);
        else selected.set(id, KIT_CATEGORIES[ci].kits[ki].name);
        render();
    };

    window.toggleLabelItem = function (e, kind, ci, ki, i) {
        e.stopPropagation();
        var id = kind + '|' + ci + '|' + ki + '|' + i;
        if (selected.has(id)) {
            selected.delete(id);
        } else {
            var kit = KIT_CATEGORIES[ci].kits[ki];
            var text = kind === 'T' ? kit.tools[i] : kit.materials[i];
            selected.set(id, text);
        }
        render();
    };

    window.clearLabelSelection = function () {
        selected.clear();
        render();
    };

    window.generateLabelsPDF = function () {
        if (selected.size === 0) {
            alert('Select at least one kit, tool, or material to generate labels.');
            return;
        }
        if (!window.jspdf) {
            alert('PDF library did not load — check your internet connection and try again.');
            return;
        }
        var jsPDF = window.jspdf.jsPDF;
        var doc = new jsPDF({ unit: 'in', format: 'letter' });

        var cols = 3, rows = 10, perPage = cols * rows;
        var marginX = 0.19, marginY = 0.5;
        var labelW = 2.63, labelH = 1.0, gapX = 0.12;

        Array.from(selected.values()).forEach(function (text, idx) {
            var posOnPage = idx % perPage;
            if (idx > 0 && posOnPage === 0) doc.addPage();
            var col = posOnPage % cols;
            var row = Math.floor(posOnPage / cols);
            var x = marginX + col * (labelW + gapX);
            var y = marginY + row * labelH;

            doc.setDrawColor(200);
            doc.rect(x, y, labelW, labelH);

            doc.setFont(undefined, 'bold');
            doc.setFontSize(11);
            var lines = doc.splitTextToSize(text, labelW - 0.24);
            doc.text(lines, x + labelW / 2, y + labelH / 2, { align: 'center', baseline: 'middle' });

            doc.setFont(undefined, 'normal');
            doc.setFontSize(7);
            doc.setTextColor(140);
            doc.text('Building Forward LLC', x + labelW / 2, y + labelH - 0.12, { align: 'center' });
            doc.setTextColor(0);
        });

        doc.save('kit-labels.pdf');
    };

    render();
})();
</script>
