<div class="page" style="padding-bottom:80px;">
    <div class="flex-between mb-4">
        <div>
            <div class="page-title">Inventory</div>
            <div class="page-subtitle">Stock &amp; Supplies</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="addInventoryItem()">+ Add</button>
    </div>

    <input class="search-bar" type="text" id="inventory-search" placeholder="Search inventory..." oninput="filterInventory(this.value)">

    <div class="stats-grid" style="margin-bottom:16px;">
        <div class="stat-card">
            <div class="stat-value" id="inv-total-count">0</div>
            <div class="stat-label">Total Items</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="inv-low-count">0</div>
            <div class="stat-label">Low Stock</div>
        </div>
    </div>

    <div class="tab-bar" id="inv-tab-bar"></div>

    <div class="section-header">
        <span class="section-title">Low Stock Alerts</span>
        <span class="badge badge-gray" id="inv-low-badge">0 items</span>
    </div>

    <div class="card" style="cursor:default;" id="inv-low-list"></div>

    <div class="section-header mt-2">
        <span class="section-title">All Items</span>
    </div>

    <div class="card" style="cursor:default;" id="inv-all-list"></div>
</div>

<script>
(function () {

    // materials.json doesn't have a `category` column, so it's inferred from
    // each item's SKU prefix (HVAC-/ELE-/PLB-/...) — good enough to power the
    // category tabs without adding a new persisted field for this one page.
    var SKU_CATEGORY = {
        HVAC: 'HVAC', ELE: 'Electrical', PLB: 'Plumbing', CAR: 'Carpentry',
        DRY: 'Drywall', PNT: 'Painting', FLR: 'Flooring', FAS: 'Fasteners', SAF: 'Safety',
    };
    function categoryFor(material) {
        var prefix = (material.sku || '').split('-')[0];
        return SKU_CATEGORY[prefix] || 'Other';
    }

    var appState = { activeTab: 'All', searchQuery: '' };

    function loadMaterials() {
        return DB.find('materials', function (m) {
            return m.company_id === state.currentCompanyId && !m.deleted_at;
        });
    }

    var ALL_MATERIALS = loadMaterials();
    var TABS = ['All'].concat(Array.from(new Set(ALL_MATERIALS.map(categoryFor))).sort());

    // Re-query after any insert/update — ALL_MATERIALS is a snapshot, so
    // edits made through the panels below wouldn't show up otherwise.
    function refresh() {
        ALL_MATERIALS = loadMaterials();
        TABS = ['All'].concat(Array.from(new Set(ALL_MATERIALS.map(categoryFor))).sort());
        if (TABS.indexOf(appState.activeTab) === -1) appState.activeTab = 'All';
        render();
    }

    function itemRowHtml(m, opts) {
        opts = opts || {};
        var right = opts.lowStock
            ? '<div class="list-item-value">' + m.stock_qty + ' left</div><div class="list-item-detail">Min: ' + m.reorder_qty + '</div>'
            : '<div class="list-item-value">' + m.stock_qty + '</div><div class="list-item-detail">$' + Number(m.unit_cost).toLocaleString() + ' ea</div>';
        return '<div class="list-item" style="padding:8px 0; cursor:pointer;" onclick="editInventoryItem(\'' + m.id + '\')">' +
            '<div class="list-item-body" style="margin-left:10px;">' +
            '<div class="list-item-title">' + m.name + '</div>' +
            '<div class="list-item-sub">' + categoryFor(m) + ' &bull; ' + m.sku + '</div>' +
            '</div><div class="list-item-right">' + right + '</div></div>';
    }

    function render() {
        var q = appState.searchQuery.toLowerCase();
        var scoped = ALL_MATERIALS.filter(function (m) {
            if (appState.activeTab !== 'All' && categoryFor(m) !== appState.activeTab) return false;
            if (q && m.name.toLowerCase().indexOf(q) === -1) return false;
            return true;
        });
        var low = scoped.filter(function (m) { return m.stock_qty < m.reorder_qty; });

        document.getElementById('inv-tab-bar').innerHTML = TABS.map(function (t) {
            return '<button class="tab-btn' + (t === appState.activeTab ? ' active' : '') + '" onclick="setInventoryTab(\'' + t + '\')">' + t + '</button>';
        }).join('');

        document.getElementById('inv-total-count').textContent = scoped.length;
        document.getElementById('inv-low-count').textContent = low.length;
        document.getElementById('inv-low-badge').textContent = low.length + ' item' + (low.length !== 1 ? 's' : '');

        var lowList = document.getElementById('inv-low-list');
        lowList.innerHTML = low.length
            ? low.map(function (m) { return itemRowHtml(m, { lowStock: true }); }).join('')
            : '<div class="kit-empty">No low-stock items.</div>';

        var allList = document.getElementById('inv-all-list');
        allList.innerHTML = scoped.length
            ? scoped.map(function (m) { return itemRowHtml(m); }).join('')
            : '<div class="kit-empty">No items match.</div>';
    }

    window.setInventoryTab = function (tab) {
        appState.activeTab = tab;
        render();
    };

    window.filterInventory = function (query) {
        appState.searchQuery = query.trim();
        render();
    };

    // One sheet serves both add (materialId null) and edit/adjust.
    function openItemPanel(materialId) {
        var m = materialId ? DB.getById('materials', materialId) : null;
        var existing = document.getElementById('inv-item-panel');
        if (existing) existing.remove();
        var modal = document.createElement('div');
        modal.id = 'inv-item-panel';
        modal.className = 'modal-overlay';
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div class="page-title-sm mb-2">' + (m ? 'Update Item' : 'New Inventory Item') + '</div>' +
                '<div class="form-group"><label>Name</label><input type="text" id="ii-name" value="' + (m ? m.name : '') + '" placeholder="e.g. 200A Panel"></div>' +
                '<div class="form-row">' +
                    '<div class="form-group"><label>SKU</label><input type="text" id="ii-sku" value="' + (m ? m.sku : '') + '" placeholder="ELE-PNL-200"></div>' +
                    '<div class="form-group"><label>Unit</label><input type="text" id="ii-unit" value="' + (m ? (m.unit || 'each') : 'each') + '"></div>' +
                '</div>' +
                '<div class="form-row">' +
                    '<div class="form-group"><label>In Stock</label><input type="number" id="ii-stock" min="0" step="1" value="' + (m ? m.stock_qty : 0) + '"></div>' +
                    '<div class="form-group"><label>Reorder At</label><input type="number" id="ii-reorder" min="0" step="1" value="' + (m ? m.reorder_qty : 1) + '"></div>' +
                '</div>' +
                '<div class="form-group"><label>Unit Cost ($)</label><input type="number" id="ii-cost" min="0" step="0.01" value="' + (m ? m.unit_cost : '') + '" placeholder="0.00"></div>' +
                '<button class="btn btn-primary mt-2" onclick="saveInventoryItem(' + (m ? '\'' + m.id + '\'' : 'null') + ')">' + (m ? 'Save Changes' : 'Add Item') + '</button>' +
                (m ? '<button class="btn btn-secondary" style="color:#dc2626;" onclick="removeInventoryItem(\'' + m.id + '\')">Remove Item</button>' : '') +
                '<button class="btn btn-secondary" onclick="document.getElementById(\'inv-item-panel\').remove()">Cancel</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
        document.getElementById('phone').appendChild(modal);
    }

    function closeItemPanel() {
        var p = document.getElementById('inv-item-panel');
        if (p) p.remove();
    }

    window.addInventoryItem = function () { openItemPanel(null); };
    window.editInventoryItem = function (materialId) { openItemPanel(materialId); };

    window.saveInventoryItem = function (materialId) {
        var name = (document.getElementById('ii-name').value || '').trim();
        if (!name) { alert('Enter an item name.'); return; }
        var patch = {
            name: name,
            sku: (document.getElementById('ii-sku').value || '').trim().toUpperCase(),
            unit: (document.getElementById('ii-unit').value || 'each').trim(),
            stock_qty: Math.max(0, parseInt(document.getElementById('ii-stock').value, 10) || 0),
            reorder_qty: Math.max(0, parseInt(document.getElementById('ii-reorder').value, 10) || 0),
            unit_cost: Math.max(0, parseFloat(document.getElementById('ii-cost').value) || 0),
        };
        if (materialId) {
            DB.update('materials', materialId, patch);
        } else {
            DB.insert('materials', Object.assign({
                company_id: state.currentCompanyId,
                location: 'shop',
            }, patch));
        }
        closeItemPanel();
        refresh();
    };

    window.removeInventoryItem = function (materialId) {
        var m = DB.getById('materials', materialId);
        if (!confirm('Remove ' + (m ? m.name : 'this item') + ' from inventory?')) return;
        DB.softDelete('materials', materialId);
        closeItemPanel();
        refresh();
    };

    render();
})();
</script>
