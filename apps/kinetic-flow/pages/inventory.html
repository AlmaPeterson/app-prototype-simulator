<div class="page" style="padding-bottom:80px;">
    <div class="flex-between mb-4">
        <div>
            <div class="page-title">Inventory</div>
            <div class="page-subtitle">Stock &amp; Supplies &bull; kit contents are managed from Kits</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="addInventoryItem()">+ Add</button>
    </div>

    <input class="search-bar" type="text" id="inventory-search" placeholder="Search inventory..." oninput="filterInventory(this.value)">

    <div class="stats-grid" style="margin-bottom:16px;">
        <div class="stat-card">
            <div class="stat-value" id="inv-total-count">0</div>
            <div class="stat-label">Total Items</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="inv-low-count">0</div>
            <div class="stat-label">Low Stock</div>
        </div>
    </div>

    <div class="tab-bar" id="inv-tab-bar"></div>

    <div class="section-header">
        <span class="section-title">Low Stock Alerts</span>
        <span class="badge badge-gray" id="inv-low-badge">0 items</span>
    </div>

    <div class="card" style="cursor:default;" id="inv-low-list"></div>

    <div class="section-header mt-2">
        <span class="section-title">All Items</span>
    </div>

    <div class="card" style="cursor:default;" id="inv-all-list"></div>
</div>

<script>
(function () {

    // materials.json doesn't have a `category` column, so it's inferred from
    // each item's SKU prefix (HVAC-/ELE-/PLB-/...) — good enough to power the
    // category tabs without adding a new persisted field for this one page.
    var SKU_CATEGORY = {
        HVAC: 'HVAC', ELE: 'Electrical', PLB: 'Plumbing', CAR: 'Carpentry',
        DRY: 'Drywall', PNT: 'Painting', FLR: 'Flooring', FAS: 'Fasteners', SAF: 'Safety',
        TRL: 'Tools',
    };
    function categoryFor(material) {
        var prefix = (material.sku || '').split('-')[0];
        return SKU_CATEGORY[prefix] || 'Other';
    }

    // Brands aren't a managed list like locations — just whatever's already
    // been typed somewhere in this company's materials (kit-owned rows
    // included, so "Milwaukee" used on a kit tool still suggests itself here)
    // — so this is a plain live query, not a table to keep in sync.
    function companyBrands() {
        var seen = {};
        DB.find('materials', function (m) { return m.company_id === state.currentCompanyId && !m.deleted_at && m.brand; })
            .forEach(function (m) { seen[m.brand] = true; });
        return Object.keys(seen).sort();
    }

    // A standalone item can also live "with" a kit (e.g. a spare battery kept
    // in the kit bag) without being one of the kit's official contents (that's
    // kit_id, set from Kits, not this). Kit names are suggested alongside real
    // locations but never written into the locations table — they're read
    // live off inventory_kits so a rename here can't leave a stale copy.
    function companyKitNames() {
        return DB.find('inventory_kits', function (k) { return k.company_id === state.currentCompanyId && !k.deleted_at; })
            .map(function (k) { return k.name; });
    }

    var appState = { activeTab: 'All', searchQuery: '' };

    // Kit-owned rows (kit_id set) are browsed/edited from Kits, not here —
    // this page is standalone stock only, matching how it worked before
    // kit_tools/kit_items folded into materials (see docs/kinetic-flow-
    // materials-kit-unification-plan.md section E). Suppliers only restock
    // the shop, so their scope narrows further to location === 'shop' (not
    // trucks or trailer).
    function loadMaterials() {
        return DB.find('materials', function (m) {
            if (m.company_id !== state.currentCompanyId || m.deleted_at || m.kit_id) return false;
            if (userIsSupplier() && m.location !== 'shop') return false;
            return true;
        });
    }

    var ALL_MATERIALS = loadMaterials();
    var TABS = ['All'].concat(Array.from(new Set(ALL_MATERIALS.map(categoryFor))).sort());

    // Re-query after any insert/update — ALL_MATERIALS is a snapshot, so
    // edits made through the panels below wouldn't show up otherwise.
    function refresh() {
        ALL_MATERIALS = loadMaterials();
        TABS = ['All'].concat(Array.from(new Set(ALL_MATERIALS.map(categoryFor))).sort());
        if (TABS.indexOf(appState.activeTab) === -1) appState.activeTab = 'All';
        render();
    }

    // A material's photo is either a user upload (image_asset_id, resolved
    // from IndexedDB via Assets/hydrateAssetMedia) or a seed-provided static
    // image (image_url, a plain path shipped with the app) — the upload
    // takes priority since it's the more recent, intentional choice.
    function thumbHtml(m) {
        var style = 'width:36px; height:36px; border-radius:8px; object-fit:cover; background:#f1f5f9; flex-shrink:0;';
        if (m.image_asset_id) return '<img data-asset-id="' + m.image_asset_id + '" style="' + style + '" alt="">';
        if (m.image_url) return '<img src="' + esc(m.image_url) + '" style="' + style + '" alt="">';
        return '<div style="' + style + '"></div>';
    }

    function itemRowHtml(m, opts) {
        opts = opts || {};
        var right = opts.lowStock
            ? '<div class="list-item-value">' + m.stock_qty + ' left</div><div class="list-item-detail">Min: ' + m.reorder_qty + '</div>'
            : '<div class="list-item-value">' + m.stock_qty + '</div><div class="list-item-detail">$' + Number(m.unit_cost).toLocaleString() + ' ea</div>';
        return '<div class="list-item" style="padding:8px 0; cursor:pointer; display:flex; align-items:center;" onclick="editInventoryItem(\'' + m.id + '\')">' +
            thumbHtml(m) +
            '<div class="list-item-body" style="margin-left:10px;">' +
            '<div class="list-item-title">' + m.name + (m.video_asset_id
                ? ' <span style="cursor:pointer;" onclick="event.stopPropagation(); openMaterialVideo(\'' + m.id + '\')">&#127916;</span>'
                : '') + '</div>' +
            '<div class="list-item-sub">' + categoryFor(m) + (m.brand ? ' &bull; ' + esc(m.brand) : '') + ' &bull; ' + m.sku + ' &bull; ' + (m.location || 'shop') + '</div>' +
            '</div><div class="list-item-right">' + right + '</div></div>';
    }

    function render() {
        var q = appState.searchQuery.toLowerCase();
        var scoped = ALL_MATERIALS.filter(function (m) {
            if (appState.activeTab !== 'All' && categoryFor(m) !== appState.activeTab) return false;
            if (q && m.name.toLowerCase().indexOf(q) === -1) return false;
            return true;
        });
        var low = scoped.filter(function (m) { return m.stock_qty < m.reorder_qty; });

        document.getElementById('inv-tab-bar').innerHTML = TABS.map(function (t) {
            return '<button class="tab-btn' + (t === appState.activeTab ? ' active' : '') + '" onclick="setInventoryTab(\'' + t + '\')">' + t + '</button>';
        }).join('');

        document.getElementById('inv-total-count').textContent = scoped.length;
        document.getElementById('inv-low-count').textContent = low.length;
        document.getElementById('inv-low-badge').textContent = low.length + ' item' + (low.length !== 1 ? 's' : '');

        var lowList = document.getElementById('inv-low-list');
        lowList.innerHTML = low.length
            ? low.map(function (m) { return itemRowHtml(m, { lowStock: true }); }).join('')
            : '<div class="kit-empty">No low-stock items.</div>';

        var allList = document.getElementById('inv-all-list');
        allList.innerHTML = scoped.length
            ? scoped.map(function (m) { return itemRowHtml(m); }).join('')
            : '<div class="kit-empty">No items match.</div>';

        hydrateAssetMedia(document.getElementById('inventory-search').closest('.page'));
    }

    window.setInventoryTab = function (tab) {
        appState.activeTab = tab;
        render();
    };

    window.filterInventory = function (query) {
        appState.searchQuery = query.trim();
        render();
    };

    // Photo/video the user picked for the item currently open in the panel,
    // staged here until Save — Assets.save() only happens once, on submit, so
    // Cancel never leaves an orphaned blob in IndexedDB.
    var pendingImageFile = null;
    var pendingImageRemoved = false;
    var pendingVideoFile = null;
    var pendingVideoRemoved = false;
    var pendingVideoPreviewUrl = null; // local blob: url so "Play" works before Save
    var currentPanelMaterial = null;

    window.handleInventoryPhotoChange = function (input) {
        var file = input.files && input.files[0];
        if (!file) return;
        pendingImageFile = file;
        pendingImageRemoved = false;
        var preview = document.getElementById('ii-photo-preview');
        preview.removeAttribute('data-asset-id');
        preview.src = URL.createObjectURL(file);
    };

    window.clearInventoryItemPhoto = function () {
        pendingImageFile = null;
        pendingImageRemoved = true;
        var preview = document.getElementById('ii-photo-preview');
        preview.removeAttribute('data-asset-id');
        preview.removeAttribute('src');
    };

    function showVideoPlayer(url, title) {
        var existing = document.getElementById('inv-video-panel');
        if (existing) existing.remove();
        var modal = document.createElement('div');
        modal.id = 'inv-video-panel';
        modal.className = 'modal-overlay';
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div class="page-title-sm mb-2">' + title + '</div>' +
                '<video controls autoplay playsinline style="width:100%; border-radius:10px; background:#000;" src="' + url + '"></video>' +
                '<button class="btn btn-secondary mt-2" onclick="document.getElementById(\'inv-video-panel\').remove()">Close</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
        document.getElementById('phone').appendChild(modal);
    }

    window.handleInventoryVideoChange = function (input) {
        var file = input.files && input.files[0];
        if (!file) return;
        pendingVideoFile = file;
        pendingVideoRemoved = false;
        if (pendingVideoPreviewUrl) URL.revokeObjectURL(pendingVideoPreviewUrl);
        pendingVideoPreviewUrl = URL.createObjectURL(file);
        document.getElementById('ii-video-play-btn').style.display = 'inline-block';
        document.getElementById('ii-video-empty-label').style.display = 'none';
        document.getElementById('ii-video-remove-btn').style.display = 'inline-block';
    };

    window.clearInventoryItemVideo = function () {
        pendingVideoFile = null;
        pendingVideoRemoved = true;
        if (pendingVideoPreviewUrl) { URL.revokeObjectURL(pendingVideoPreviewUrl); pendingVideoPreviewUrl = null; }
        document.getElementById('ii-video-play-btn').style.display = 'none';
        document.getElementById('ii-video-empty-label').style.display = 'inline';
        document.getElementById('ii-video-remove-btn').style.display = 'none';
    };

    // A file just picked in this sheet has no persisted asset id yet, so it
    // gets a quick inline preview instead of the real material-video.html
    // page. A video already saved to the item gets its own page — same
    // pattern as tapping the &#127916; marker on the list row.
    window.playInventoryItemVideo = function () {
        if (pendingVideoPreviewUrl) { showVideoPlayer(pendingVideoPreviewUrl, 'Preview'); return; }
        if (!currentPanelMaterial || !currentPanelMaterial.video_asset_id) return;
        var materialId = currentPanelMaterial.id;
        closeItemPanel();
        openMaterialVideo(materialId);
    };

    window.openMaterialVideo = function (materialId) {
        state.materialVideoId = materialId;
        loadPage('material-video');
    };

    // One sheet serves both add (materialId null) and edit/adjust.
    function openItemPanel(materialId) {
        var m = materialId ? DB.getById('materials', materialId) : null;
        currentPanelMaterial = m;
        pendingImageFile = null;
        pendingImageRemoved = false;
        pendingVideoFile = null;
        pendingVideoRemoved = false;
        if (pendingVideoPreviewUrl) { URL.revokeObjectURL(pendingVideoPreviewUrl); pendingVideoPreviewUrl = null; }
        var existing = document.getElementById('inv-item-panel');
        if (existing) existing.remove();
        var modal = document.createElement('div');
        modal.id = 'inv-item-panel';
        modal.className = 'modal-overlay';
        modal.innerHTML =
            '<div class="modal-sheet">' +
                '<div class="modal-handle"></div>' +
                '<div class="page-title-sm mb-2">' + (m ? 'Update Item' : 'New Inventory Item') + '</div>' +
                '<div class="form-group"><label>Photo</label>' +
                    '<div style="display:flex; align-items:center; gap:10px;">' +
                        '<img id="ii-photo-preview" ' + (m && m.image_asset_id ? 'data-asset-id="' + m.image_asset_id + '"' : (m && m.image_url ? 'src="' + esc(m.image_url) + '"' : '')) +
                            ' style="width:56px; height:56px; border-radius:10px; object-fit:cover; background:#f1f5f9;" alt="">' +
                        '<button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById(\'ii-photo-input\').click()">Choose Photo</button>' +
                        (m && (m.image_asset_id || m.image_url) ? '<button type="button" class="btn btn-outline btn-sm" style="color:#dc2626;" onclick="clearInventoryItemPhoto()">Remove</button>' : '') +
                    '</div>' +
                    '<input type="file" id="ii-photo-input" accept="image/*" style="display:none;" onchange="handleInventoryPhotoChange(this)">' +
                '</div>' +
                '<div class="form-group"><label>How-To Video</label>' +
                    '<div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">' +
                        '<button type="button" id="ii-video-play-btn" class="btn btn-outline btn-sm" style="display:' + (m && m.video_asset_id ? 'inline-block' : 'none') + ';" onclick="playInventoryItemVideo()">&#9654; Play</button>' +
                        '<span id="ii-video-empty-label" style="font-size:0.78rem; color:#94a3b8; display:' + (m && m.video_asset_id ? 'none' : 'inline') + ';">No video</span>' +
                        '<button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById(\'ii-video-input\').click()">Choose Video</button>' +
                        '<button type="button" id="ii-video-remove-btn" class="btn btn-outline btn-sm" style="color:#dc2626; display:' + (m && m.video_asset_id ? 'inline-block' : 'none') + ';" onclick="clearInventoryItemVideo()">Remove</button>' +
                    '</div>' +
                    (m && m.reference_url ? '<div style="margin-top:6px;"><a href="' + esc(m.reference_url) + '" target="_blank" rel="noopener" style="font-size:0.78rem;">&#128279; Reference video (YouTube)</a></div>' : '') +
                    '<input type="file" id="ii-video-input" accept="video/*" style="display:none;" onchange="handleInventoryVideoChange(this)">' +
                '</div>' +
                '<div class="form-group"><label>Name</label><input type="text" id="ii-name" value="' + (m ? m.name : '') + '" placeholder="e.g. 200A Panel"></div>' +
                '<div class="form-row">' +
                    '<div class="form-group"><label>SKU</label><input type="text" id="ii-sku" value="' + (m ? m.sku : '') + '" placeholder="ELE-PNL-200"></div>' +
                    '<div class="form-group"><label>Unit</label><input type="text" id="ii-unit" value="' + (m ? (m.unit || 'each') : 'each') + '"></div>' +
                '</div>' +
                '<div class="form-group"><label>Brand</label><input type="text" id="ii-brand" list="ii-brand-list" value="' + (m && m.brand ? esc(m.brand) : '') + '" placeholder="Search or type a brand"><datalist id="ii-brand-list">' +
                    companyBrands().map(function (b) { return '<option value="' + esc(b) + '">'; }).join('') +
                    '</datalist></div>' +
                '<div class="form-group"><label>Location</label><input type="text" id="ii-location" list="ii-location-list" value="' + (m ? esc(m.location || 'shop') : '') + '" placeholder="Search or type a location"><datalist id="ii-location-list">' +
                    companyLocations(state.currentCompanyId).map(function (l) { return '<option value="' + esc(l.name) + '">'; }).join('') +
                    companyKitNames().map(function (name) { return '<option value="' + esc(name) + '">'; }).join('') +
                    '</datalist></div>' +
                '<div class="form-row">' +
                    '<div class="form-group"><label>In Stock</label><input type="number" id="ii-stock" min="0" step="1" value="' + (m ? m.stock_qty : 0) + '"></div>' +
                    '<div class="form-group"><label>Reorder At</label><input type="number" id="ii-reorder" min="0" step="1" value="' + (m ? m.reorder_qty : 1) + '"></div>' +
                '</div>' +
                '<div class="form-group"><label>Unit Cost ($)</label><input type="number" id="ii-cost" min="0" step="0.01" value="' + (m ? m.unit_cost : '') + '" placeholder="0.00"></div>' +
                '<button class="btn btn-primary mt-2" onclick="saveInventoryItem(' + (m ? '\'' + m.id + '\'' : 'null') + ')">' + (m ? 'Save Changes' : 'Add Item') + '</button>' +
                (m ? '<button class="btn btn-secondary" style="color:#dc2626;" onclick="removeInventoryItem(\'' + m.id + '\')">Remove Item</button>' : '') +
                '<button class="btn btn-secondary" onclick="document.getElementById(\'inv-item-panel\').remove()">Cancel</button>' +
            '</div>';
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
        document.getElementById('phone').appendChild(modal);
        hydrateAssetMedia(modal);
    }

    function closeItemPanel() {
        var p = document.getElementById('inv-item-panel');
        if (p) p.remove();
    }

    window.addInventoryItem = function () { openItemPanel(null); };
    window.editInventoryItem = function (materialId) { openItemPanel(materialId); };

    window.saveInventoryItem = function (materialId) {
        var name = (document.getElementById('ii-name').value || '').trim();
        if (!name) { alert('Enter an item name.'); return; }
        var locationName = (document.getElementById('ii-location').value || '').trim() || 'shop';
        // A location matching a live kit name resolves to that kit's own
        // name rather than going through findOrCreateLocation — it's not a
        // physical place to add to the locations list, just "stored with
        // this kit" (see companyKitNames() above).
        var matchingKit = DB.findOne('inventory_kits', function (k) {
            return k.company_id === state.currentCompanyId && !k.deleted_at && k.name.toLowerCase() === locationName.toLowerCase();
        });
        var patch = {
            name: name,
            sku: (document.getElementById('ii-sku').value || '').trim().toUpperCase(),
            unit: (document.getElementById('ii-unit').value || 'each').trim(),
            brand: (document.getElementById('ii-brand').value || '').trim() || null,
            location: matchingKit ? matchingKit.name : findOrCreateLocation(state.currentCompanyId, locationName).name,
            stock_qty: Math.max(0, parseInt(document.getElementById('ii-stock').value, 10) || 0),
            reorder_qty: Math.max(0, parseInt(document.getElementById('ii-reorder').value, 10) || 0),
            unit_cost: Math.max(0, parseFloat(document.getElementById('ii-cost').value) || 0),
        };

        var imageDone = pendingImageFile
            ? Assets.save(pendingImageFile).then(function (asset) { patch.image_asset_id = asset.id; })
            : Promise.resolve().then(function () { if (pendingImageRemoved) patch.image_asset_id = null; });

        var videoDone = pendingVideoFile
            ? Assets.save(pendingVideoFile).then(function (asset) { patch.video_asset_id = asset.id; })
            : Promise.resolve().then(function () { if (pendingVideoRemoved) patch.video_asset_id = null; });

        Promise.all([imageDone, videoDone]).then(function () {
            if (materialId) {
                DB.update('materials', materialId, patch);
            } else {
                DB.insert('materials', Object.assign({ company_id: state.currentCompanyId, kit_id: null, item_type: 'material' }, patch));
            }
            closeItemPanel();
            refresh();
        });
    };

    window.removeInventoryItem = function (materialId) {
        var m = DB.getById('materials', materialId);
        if (!confirm('Remove ' + (m ? m.name : 'this item') + ' from inventory?')) return;
        DB.softDelete('materials', materialId);
        closeItemPanel();
        refresh();
    };

    render();

    // Landed here from kits.html's "Edit in Inventory" (a standalone tool has
    // kit_id: null, so its only editor is this page) — open straight to that
    // item's sheet instead of the bare list.
    if (state.inventoryEditMaterialId) {
        var materialToEdit = state.inventoryEditMaterialId;
        state.inventoryEditMaterialId = null;
        editInventoryItem(materialToEdit);
    }
})();
</script>
