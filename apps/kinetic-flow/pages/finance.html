<div class="page" style="padding-bottom:80px;">
    <div class="page-title">Finance</div>
    <div class="page-subtitle mb-4" id="finance-tier-subtitle">&nbsp;</div>

    <!-- View tier: how much of the org this dashboard is scoped to -->
    <div class="tab-bar mb-2">
        <button class="tab-btn active" id="tier-btn-nationwide" onclick="selectFinanceTier('nationwide')">Nationwide</button>
        <button class="tab-btn" id="tier-btn-branch" onclick="selectFinanceTier('branch')">Branch</button>
        <button class="tab-btn" id="tier-btn-job" onclick="selectFinanceTier('job')">Job</button>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" id="view-btn-overview" onclick="selectFinanceView('overview')">Overview</button>
        <button class="tab-btn" id="view-btn-invoices" onclick="selectFinanceView('invoices')">Invoices</button>
        <button class="tab-btn" id="view-btn-expenses" onclick="selectFinanceView('expenses')">Expenses</button>
    </div>

    <div id="finance-view-overview">
        <!-- Revenue Hero -->
        <div class="hero-stat">
            <div style="font-size:0.78rem; opacity:0.7;" id="finance-hero-label">Revenue This Month</div>
            <div class="hero-stat-value" id="finance-hero-value">$0</div>
            <div style="font-size:0.82rem; opacity:0.8; margin-top:4px;" id="finance-hero-note"></div>
        </div>

        <div class="stats-grid" style="margin-bottom:16px;">
            <div class="stat-card">
                <div class="stat-value" id="finance-revenue">$0</div>
                <div class="stat-label">Revenue</div>
                <div class="stat-change" id="finance-revenue-change"></div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="finance-expenses">$0</div>
                <div class="stat-label">Expenses</div>
                <div class="stat-change" id="finance-expenses-change"></div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="finance-profit">$0</div>
                <div class="stat-label">Profit</div>
                <div class="stat-change" id="finance-profit-change"></div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="finance-outstanding">$0</div>
                <div class="stat-label">Outstanding</div>
                <div class="stat-change" id="finance-outstanding-change"></div>
            </div>
        </div>
    </div>

    <!-- Outstanding Invoices -->
    <div id="finance-view-invoices">
        <div class="section-header">
            <span class="section-title">Outstanding Invoices</span>
            <span class="badge badge-gray" id="finance-invoices-badge">0 pending</span>
        </div>

        <div id="finance-invoices-list" style="border:1px solid #e2e8f0; padding:0 14px; margin-bottom:16px;"></div>
    </div>

    <!-- Expense Breakdown -->
    <div id="finance-view-expenses">
        <div class="section-header">
            <span class="section-title">Expense Breakdown</span>
        </div>

        <div id="finance-expense-breakdown" style="border:1px solid #e2e8f0; padding:14px; margin-bottom:16px;"></div>
    </div>

    <button class="btn btn-outline" onclick="alert('Report export is coming soon.')" title="Download a PDF of this report">&#8595; Export Report (PDF)</button>
</div>

<script>
(function () {
    // ── Synthetic invoices are computed (not persisted) from bids.total_cost
    // via the shared computeSyntheticPaymentSchedule() helper — see app.js.
    // "Paid" vs "Due" is a simple heuristic: a signed bid has collected its
    // deposit + first draw; a merely-sent bid has collected nothing yet;
    // drafts never appear on an invoice because no bid has gone out.
    function dueAmountForBid(bid) {
        var sched = computeSyntheticPaymentSchedule(bid.total_cost);
        if (bid.status === 'signed') return sched.draw2 + sched.final;
        return bid.total_cost; // sent, not yet signed — nothing collected
    }

    function fmtMoney(n) { return '$' + Math.round(n).toLocaleString(); }
    function fmtMoneyK(n) { return '$' + (n / 1000).toFixed(0) + 'K'; }

    // ── Role → finance_dashboard_permissions gating ─────────────────────────
    function getFinancePermission() {
        var userRole = DB.findOne('user_roles', function (ur) { return ur.user_id === state.currentUserId && ur.status === 'active'; });
        var fallback = { can_view_nationwide: false, can_view_branch: false, can_view_job: true };
        if (!userRole) return fallback;
        var perm = DB.findOne('finance_dashboard_permissions', function (p) {
            return p.role_id === userRole.role_id && p.company_id === state.currentCompanyId;
        });
        return perm || fallback;
    }

    function latestSnapshot(pred) {
        var rows = DB.find('finance_snapshots', pred).slice().sort(function (a, b) { return new Date(b.snapshot_month) - new Date(a.snapshot_month); });
        return rows[0] || null;
    }

    function targetJobId() {
        if (state.currentJobId) return state.currentJobId;
        var companyJobs = DB.find('jobs', function (j) { return j.company_id === state.currentCompanyId && !j.deleted_at; });
        return companyJobs.length ? companyJobs[0].id : null;
    }

    function renderExpenseBreakdown(entries) {
        var sums = { employee: 0, material: 0, overhead: 0 };
        entries.forEach(function (e) { sums[e.category] = (sums[e.category] || 0) + e.amount; });
        var total = sums.employee + sums.material + sums.overhead || 1;
        var rows = [
            { label: 'Labour', amount: sums.employee },
            { label: 'Materials', amount: sums.material },
            { label: 'Equipment & Overhead', amount: sums.overhead },
        ];
        document.getElementById('finance-expense-breakdown').innerHTML = rows.map(function (r, i) {
            var pct = Math.round((r.amount / total) * 100);
            var isLast = i === rows.length - 1;
            return '<div style="margin-bottom:' + (isLast ? '0' : '10px') + ';">' +
                '<div class="flex-between mb-2">' +
                    '<span style="font-size:0.85rem;">' + r.label + '</span>' +
                    '<span style="font-size:0.82rem; color:#64748b;">' + fmtMoney(r.amount) + ' &bull; ' + pct + '%</span>' +
                '</div>' +
                '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%;"></div></div>' +
            '</div>';
        }).join('');
    }

    function renderInvoices(bids) {
        var billable = bids.filter(function (b) { return b.status === 'sent' || b.status === 'signed'; });
        document.getElementById('finance-invoices-badge').textContent = billable.length + ' pending';
        document.getElementById('finance-invoices-list').innerHTML = billable.map(function (b, i) {
            var customer = DB.getById('customers', b.customer_id);
            var due = dueAmountForBid(b);
            var isLast = i === billable.length - 1;
            return '<div class="list-item"' + (isLast ? ' style="border-bottom:none;"' : '') + '>' +
                '<div class="list-item-body">' +
                    '<div class="list-item-title">' + (customer ? customer.full_name : 'Unknown') + '</div>' +
                    '<div class="list-item-sub">' + b.title + ' &bull; ' + (b.status === 'signed' ? 'Signed' : 'Sent, awaiting signature') + '</div>' +
                '</div>' +
                '<div class="list-item-right">' +
                    '<div class="list-item-value">' + fmtMoney(due) + '</div>' +
                    '<div class="list-item-detail">' + (b.status === 'signed' ? 'Balance due' : 'Full amount due') + '</div>' +
                '</div>' +
            '</div>';
        }).join('') || '<div class="list-item" style="border-bottom:none;"><div class="list-item-body" style="color:#94a3b8;">No outstanding invoices.</div></div>';

        var outstandingTotal = billable.reduce(function (sum, b) { return sum + dueAmountForBid(b); }, 0);
        return { total: outstandingTotal, count: billable.length };
    }

    function renderTier(view) {
        document.getElementById('finance-tier-subtitle').innerHTML = view.subtitle;
        document.getElementById('finance-hero-label').textContent = view.heroLabel;
        document.getElementById('finance-hero-value').textContent = view.heroValue;
        document.getElementById('finance-hero-note').innerHTML = view.heroNote;
        document.getElementById('finance-revenue').textContent = view.revenue;
        document.getElementById('finance-revenue-change').textContent = view.revenueChange;
        document.getElementById('finance-expenses').textContent = view.expenses;
        document.getElementById('finance-expenses-change').textContent = view.expensesChange;
        document.getElementById('finance-profit').textContent = view.profit;
        document.getElementById('finance-profit-change').textContent = view.profitChange;

        var invoiceSummary = renderInvoices(view.bids);
        document.getElementById('finance-outstanding').textContent = fmtMoneyK(invoiceSummary.total);
        document.getElementById('finance-outstanding-change').textContent = invoiceSummary.count + ' invoice' + (invoiceSummary.count === 1 ? '' : 's');

        renderExpenseBreakdown(view.expenseEntries);
    }

    window.selectFinanceTier = function (tier) {
        var perm = getFinancePermission();
        if (tier === 'nationwide' && !perm.can_view_nationwide) return;
        if (tier === 'branch' && !perm.can_view_branch) return;
        if (tier === 'job' && !perm.can_view_job) return;

        ['nationwide', 'branch', 'job'].forEach(function (key) {
            var btn = document.getElementById('tier-btn-' + key);
            if (btn) btn.classList.toggle('active', key === tier);
        });

        var company = DB.getById('companies', state.currentCompanyId);

        if (tier === 'nationwide') {
            var snap = latestSnapshot(function (s) { return s.company_id === state.currentCompanyId && s.branch_id === null; });
            var bids = DB.find('bids', function (b) { return b.company_id === state.currentCompanyId && !b.deleted_at; });
            var expenses = DB.find('expense_entries', function (e) { return e.company_id === state.currentCompanyId; });
            var revenue = snap ? snap.actual_revenue : 0;
            var expensesTotal = snap ? snap.total_expenses : 0;
            var net = snap ? snap.net : 0;
            renderTier({
                subtitle: (snap ? new Date(snap.snapshot_month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' }) : 'This Month') + ' &bull; ' + (company ? company.name : 'All Branches') + ' &mdash; All Branches',
                heroLabel: 'Revenue This Month',
                heroValue: fmtMoney(revenue),
                heroNote: snap ? ('Projected: ' + fmtMoney(snap.projected_revenue)) : '',
                revenue: fmtMoneyK(revenue), revenueChange: 'Actual',
                expenses: fmtMoneyK(expensesTotal), expensesChange: 'Total',
                profit: fmtMoneyK(net), profitChange: revenue ? (Math.round((net / revenue) * 100 * 10) / 10 + '% margin') : '—',
                bids: bids, expenseEntries: expenses,
            });
        } else if (tier === 'branch') {
            var branch = DB.getById('branches', state.currentBranchId);
            var bsnap = latestSnapshot(function (s) { return s.branch_id === state.currentBranchId; });
            var bbids = DB.find('bids', function (b) { return b.branch_id === state.currentBranchId && !b.deleted_at; });
            var bexpenses = DB.find('expense_entries', function (e) { return e.branch_id === state.currentBranchId; });
            var brevenue = bsnap ? bsnap.actual_revenue : 0;
            var bexpTotal = bsnap ? bsnap.total_expenses : 0;
            var bnet = bsnap ? bsnap.net : 0;
            renderTier({
                subtitle: (bsnap ? new Date(bsnap.snapshot_month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' }) : 'This Month') + ' &bull; ' + (company ? company.name : '') + ' &mdash; ' + (branch ? branch.name : 'Branch'),
                heroLabel: 'Revenue This Month',
                heroValue: fmtMoney(brevenue),
                heroNote: bsnap ? ('Projected: ' + fmtMoney(bsnap.projected_revenue)) : '',
                revenue: fmtMoneyK(brevenue), revenueChange: 'Actual',
                expenses: fmtMoneyK(bexpTotal), expensesChange: 'Total',
                profit: fmtMoneyK(bnet), profitChange: brevenue ? (Math.round((bnet / brevenue) * 100 * 10) / 10 + '% margin') : '—',
                bids: bbids, expenseEntries: bexpenses,
            });
        } else {
            var jobId = targetJobId();
            var job = jobId ? DB.getById('jobs', jobId) : null;
            var bid = job && job.bid_id ? DB.getById('bids', job.bid_id) : null;
            var jexpenses = DB.find('expense_entries', function (e) { return e.job_id === jobId; });
            var jexpTotal = jexpenses.reduce(function (sum, e) { return sum + e.amount; }, 0);
            var revenueVal = bid ? bid.total_cost : 0;
            var profitVal = revenueVal - jexpTotal;
            renderTier({
                subtitle: (job ? job.name : 'Job') + (bid ? ' &bull; ' + bid.title : ''),
                heroLabel: 'Contract Value',
                heroValue: fmtMoney(revenueVal),
                heroNote: bid ? (bid.status === 'signed' ? 'Signed' : 'Sent, awaiting signature') : 'No bid yet',
                revenue: fmtMoney(revenueVal), revenueChange: 'Bid total',
                expenses: fmtMoney(jexpTotal), expensesChange: 'Logged expenses',
                profit: fmtMoney(profitVal), profitChange: revenueVal ? (Math.round((profitVal / revenueVal) * 100) + '% margin') : '—',
                bids: bid ? [bid] : [], expenseEntries: jexpenses,
            });
        }
    };

    // ── Overview / Invoices / Expenses view switch ──────────────────────────
    // Purely a display filter over the sections rendered by selectFinanceTier
    // above — it doesn't refetch or recompute anything, just shows/hides the
    // three blocks that are already on the page.
    window.selectFinanceView = function (view) {
        ['overview', 'invoices', 'expenses'].forEach(function (key) {
            document.getElementById('view-btn-' + key).classList.toggle('active', key === view);
            document.getElementById('finance-view-' + key).style.display = key === view ? '' : 'none';
        });
    };

    // ── Gate tier tabs per role permission ──────────────────────────────────
    var perm = getFinancePermission();
    if (!perm.can_view_nationwide) document.getElementById('tier-btn-nationwide').style.display = 'none';
    if (!perm.can_view_branch) document.getElementById('tier-btn-branch').style.display = 'none';
    if (!perm.can_view_job) document.getElementById('tier-btn-job').style.display = 'none';

    var initialTier = perm.can_view_nationwide ? 'nationwide' : (perm.can_view_branch ? 'branch' : 'job');
    selectFinanceTier(initialTier);
    selectFinanceView('overview');
})();
</script>
